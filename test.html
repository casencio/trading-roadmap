<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Finanzas - Chensio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #1557b0; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; color: #5f6368; }
        #status { text-align: center; margin: 10px 0; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mi Cartera en Tiempo Real</h2>
    
    <div id="status">Conectando con Google Sheets...</div>

    <!-- Formulario para escribir datos -->
    <div class="form-group">
        <label>Acción / Activo</label>
        <input type="text" id="accion" placeholder="Ej: AAPL o Ethereum">
    </div>
    <div class="form-group">
        <label>Cantidad</label>
        <input type="number" id="cantidad" step="any" placeholder="0.00">
    </div>
    <div class="form-group">
        <label>Precio Unitario</label>
        <input type="number" id="precio" step="any" placeholder="0.00">
    </div>
    <button onclick="guardarDato()">Guardar Inversión</button>

    <!-- Tabla para leer datos -->
    <table>
        <thead>
            <tr>
                <th>Activo</th>
                <th>Cant.</th>
                <th>Precio</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            <!-- Los datos aparecerán aquí -->
        </tbody>
    </table>
</div>

<script>
    const URL_APP = "https://script.google.com/macros/s/AKfycbyLhad_WEwbi8tzebCIv-D9mDjXyRhbNnHXlegswJzXPISP6dfJCwwODBHheNno-K42iw/exec";

    // Función para LEER datos
    async function cargarDatos() {
        try {
            const respuesta = await fetch(URL_APP);
            const datos = await respuesta.json();
            const cuerpo = document.getElementById("cuerpoTabla");
            cuerpo.innerHTML = "";

            datos.forEach(fila => {
                cuerpo.innerHTML += `
                    <tr>
                        <td>${fila.Accion}</td>
                        <td>${fila.Cantidad}</td>
                        <td>$${Number(fila.Precio).toLocaleString()}</td>
                    </tr>`;
            });
            document.getElementById("status").innerText = "Datos actualizados";
        } catch (error) {
            document.getElementById("status").innerText = "Error al leer datos";
            console.error(error);
        }
    }

    // Función para ESCRIBIR datos
    async function guardarDato() {
        const btn = document.querySelector("button");
        const status = document.getElementById("status");
        
        const nuevaEntrada = {
            accion: document.getElementById("accion").value,
            cantidad: document.getElementById("cantidad").value,
            precio: document.getElementById("precio").value
        };

        if(!nuevaEntrada.accion || !nuevaEntrada.cantidad || !nuevaEntrada.precio) {
            alert("Por favor, rellena todos los campos");
            return;
        }

        status.innerText = "Guardando en la nube...";
        btn.disabled = true;

        try {
            // Usamos mode: 'no-cors' porque Google Apps Script redirige la petición
            await fetch(URL_APP, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(nuevaEntrada)
            });

            // Limpiamos y recargamos
            document.getElementById("accion").value = "";
            document.getElementById("cantidad").value = "";
            document.getElementById("precio").value = "";
            
            setTimeout(() => {
                cargarDatos();
                btn.disabled = false;
            }, 2000); // Esperamos 2 seg para dar tiempo a Google a procesar

        } catch (error) {
            status.innerText = "Error al guardar";
            btn.disabled = false;
        }
    }

    // Cargar datos al abrir la página
    cargarDatos();
</script>

</body>
</html>
