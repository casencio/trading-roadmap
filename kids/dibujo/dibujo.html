<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dibujar</title>
<style>
*{margin:0;padding:0;-webkit-box-sizing:border-box;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#f0ece4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
#app{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;height:100%;overflow:hidden;}
#canvas-wrap{-webkit-box-flex:1;-webkit-flex:1;flex:1;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;background:#f0ece4;overflow:hidden;}
#drawing-canvas{background:#fff;display:block;-webkit-touch-callout:none;touch-action:none;border:2px solid #ddd;}
#toolbar{background:#fff;border-top:2px solid #ddd;padding:7px 6px;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;gap:6px;-webkit-flex-shrink:0;flex-shrink:0;}
.row{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;gap:5px;}
.c-dot{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;-webkit-appearance:none;outline:none;flex-shrink:0;position:relative;display:inline-block;}
.c-dot.active::after{content:'';position:absolute;top:-5px;left:-5px;right:-5px;bottom:-5px;border-radius:50%;border:3px solid #222;}
.sz-btn{width:44px;height:44px;border-radius:50%;background:#f0ece4;border:2px solid #d0c8bc;cursor:pointer;-webkit-appearance:none;outline:none;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;flex-shrink:0;}
.sz-btn.active{background:#222;border-color:#000;}
.sz-dot{border-radius:50%;background:#888;display:block;}
.sz-btn.active .sz-dot{background:#fff;}
.act-btn{height:42px;border-radius:21px;border:2px solid #d0c8bc;background:#f0ece4;cursor:pointer;-webkit-appearance:none;outline:none;padding:0 13px;font-size:14px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#444;white-space:nowrap;-webkit-box-flex:1;flex:1;max-width:84px;}
.act-btn:active{background:#ddd;}
#eraser-btn.active{background:#ffeb99;border-color:#ccaa00;color:#665500;}
#save-btn{background:#d4f0d4;border-color:#88bb88;color:#224422;}
.sep{width:1px;height:30px;background:#ddd;flex-shrink:0;}
#picker-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:200;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;}
#picker-overlay.open{display:-webkit-box;display:flex;}
#picker-box{background:#fff;border-radius:16px;padding:16px;text-align:center;width:260px;}
#picker-box canvas{display:block;margin:0 auto;border-radius:50%;cursor:crosshair;-webkit-touch-callout:none;touch-action:none;}
#picker-preview-row{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;gap:12px;margin-top:12px;}
#picker-preview{width:44px;height:44px;border-radius:50%;border:3px solid #ddd;display:inline-block;}
#picker-ok{height:40px;border-radius:20px;border:2px solid #88bb88;background:#d4f0d4;color:#224422;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:15px;padding:0 24px;cursor:pointer;-webkit-appearance:none;}
#picker-cancel{height:40px;border-radius:20px;border:2px solid #d0c8bc;background:#f0ece4;color:#555;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:15px;padding:0 16px;cursor:pointer;-webkit-appearance:none;}
#confirm-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;}
#confirm-overlay.open{display:-webkit-box;display:flex;}
#confirm-box{background:#fff;border-radius:16px;padding:24px 20px;max-width:240px;width:85%;text-align:center;}
#confirm-box p{font-size:15px;color:#444;margin-bottom:18px;line-height:1.4;}
.confirm-btns{display:-webkit-box;display:flex;gap:10px;-webkit-box-pack:center;justify-content:center;}
.confirm-btns button{border-radius:20px;border:2px solid;padding:8px 18px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;cursor:pointer;-webkit-appearance:none;}
#confirm-yes{background:#ffe0e0;border-color:#cc6666;color:#883333;}
#confirm-no{background:#f0ece4;border-color:#d0c8bc;color:#555;}
#save-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:200;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;}
#save-overlay.open{display:-webkit-box;display:flex;}
#save-box{background:#fff;border-radius:16px;padding:20px;max-width:280px;width:88%;text-align:center;}
#save-box img{max-width:100%;border-radius:8px;border:1px solid #ddd;margin-bottom:12px;}
#save-box p{font-size:14px;color:#555;line-height:1.5;margin-bottom:14px;}
#save-box button{background:#f0ece4;border:2px solid #d0c8bc;border-radius:20px;padding:8px 24px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;color:#444;cursor:pointer;-webkit-appearance:none;}
</style>
</head>
<body>
<div id="app">
  <div id="canvas-wrap">
    <canvas id="drawing-canvas"></canvas>
  </div>
  <div id="toolbar">
    <div class="row">
      <button class="c-dot active" style="background:#111111" data-color="#111111"></button>
      <button class="c-dot" style="background:#555555" data-color="#555555"></button>
      <button class="c-dot" style="background:#e74c3c" data-color="#e74c3c"></button>
      <button class="c-dot" style="background:#c0392b" data-color="#c0392b"></button>
      <button class="c-dot" style="background:#e67e22" data-color="#e67e22"></button>
      <button class="c-dot" style="background:#f39c12" data-color="#f39c12"></button>
      <button class="c-dot" style="background:#f1c40f" data-color="#f1c40f"></button>
      <button class="c-dot" style="background:#d4ac0d" data-color="#d4ac0d"></button>
      <button class="c-dot" style="background:#27ae60" data-color="#27ae60"></button>
      <button class="c-dot" style="background:#1abc9c" data-color="#1abc9c"></button>
      <button class="c-dot" style="background:#2980b9" data-color="#2980b9"></button>
      <button class="c-dot" style="background:#5dade2" data-color="#5dade2"></button>
      <button class="c-dot" style="background:#8e44ad" data-color="#8e44ad"></button>
      <button class="c-dot" style="background:#e91e8c" data-color="#e91e8c"></button>
      <button class="c-dot" style="background:#ffffff;border-color:#bbb;" data-color="#ffffff"></button>
      <button class="c-dot" id="custom-dot" style="background:#aaaaaa;" data-color="#aaaaaa">
        <svg width="14" height="14" viewBox="0 0 16 16" style="position:absolute;top:50%;left:50%;margin:-7px 0 0 -7px;pointer-events:none;" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="6" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.5"/>
          <line x1="8" y1="4" x2="8" y2="12" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="4" y1="8" x2="12" y2="8" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="row">
      <button class="sz-btn active" data-size="3"><span class="sz-dot" style="width:4px;height:4px;"></span></button>
      <button class="sz-btn" data-size="8"><span class="sz-dot" style="width:9px;height:9px;"></span></button>
      <button class="sz-btn" data-size="16"><span class="sz-dot" style="width:17px;height:17px;"></span></button>
      <button class="sz-btn" data-size="28"><span class="sz-dot" style="width:28px;height:28px;"></span></button>
      <button class="sz-btn" data-size="44"><span class="sz-dot" style="width:40px;height:40px;"></span></button>
      <div class="sep"></div>
      <button class="act-btn" id="eraser-btn">Borrar</button>
      <button class="act-btn" id="undo-btn">Undo</button>
      <button class="act-btn" id="clear-btn">Nuevo</button>
      <button class="act-btn" id="save-btn">Guardar</button>
    </div>
  </div>
</div>

<div id="picker-overlay">
  <div id="picker-box">
    <canvas id="wheel-canvas" width="200" height="200"></canvas>
    <div id="picker-preview-row">
      <div id="picker-preview"></div>
      <button id="picker-ok">Usar</button>
      <button id="picker-cancel">Cancelar</button>
    </div>
  </div>
</div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <p>Borrar el dibujo<br>y empezar de nuevo?</p>
    <div class="confirm-btns">
      <button id="confirm-yes">Borrar</button>
      <button id="confirm-no">Cancelar</button>
    </div>
  </div>
</div>

<div id="save-overlay">
  <div id="save-box">
    <img id="preview-img" src="" alt="Tu dibujo"/>
    <p>Manten presionado la imagen<br>y elige <strong>Guardar imagen</strong></p>
    <button id="close-save">Cerrar</button>
  </div>
</div>

<script>
var canvas=document.getElementById('drawing-canvas');
var ctx=canvas.getContext('2d');
var wrap=document.getElementById('canvas-wrap');
var state={drawing:false,color:'#111111',size:3,eraser:false,lastX:0,lastY:0};
var history=[]; var MAX_HIST=8;
var pickedColor='#aaaaaa';

function saveHist(){
  if(history.length>=MAX_HIST) history.shift();
  try{ history.push(ctx.getImageData(0,0,canvas.width,canvas.height)); }catch(e){}
}
function initCanvas(){
  var w=wrap.clientWidth||window.innerWidth;
  var h=wrap.clientHeight||(window.innerHeight-110);
  var cw,ch;
  if(w/h>4/3){ ch=h-16; cw=Math.floor(ch*(4/3)); }
  else{ cw=w-16; ch=Math.floor(cw/(4/3)); }
  canvas.width=cw; canvas.height=ch;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cw,ch);
  ctx.lineCap='round'; ctx.lineJoin='round';
}
function getPos(e){
  var rect=canvas.getBoundingClientRect(); var cx,cy;
  if(e.touches&&e.touches.length>0){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; }
  else if(e.changedTouches&&e.changedTouches.length>0){ cx=e.changedTouches[0].clientX; cy=e.changedTouches[0].clientY; }
  else{ cx=e.clientX; cy=e.clientY; }
  return{ x:(cx-rect.left)*(canvas.width/rect.width), y:(cy-rect.top)*(canvas.height/rect.height) };
}
function drawColor(){ return state.eraser?'#fff':state.color; }
function drawSize(){ return state.eraser?state.size*2.5:state.size; }
function startDraw(e){
  e.preventDefault(); state.drawing=true; saveHist();
  var p=getPos(e); state.lastX=p.x; state.lastY=p.y;
  ctx.beginPath(); ctx.arc(p.x,p.y,drawSize()/2,0,Math.PI*2);
  ctx.fillStyle=drawColor(); ctx.fill();
}
function doDraw(e){
  e.preventDefault(); if(!state.drawing) return;
  var p=getPos(e);
  ctx.beginPath(); ctx.moveTo(state.lastX,state.lastY); ctx.lineTo(p.x,p.y);
  ctx.strokeStyle=drawColor(); ctx.lineWidth=drawSize();
  ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
  state.lastX=p.x; state.lastY=p.y;
}
function endDraw(e){ if(e) e.preventDefault(); state.drawing=false; }
canvas.addEventListener('touchstart',startDraw,false);
canvas.addEventListener('touchmove',doDraw,false);
canvas.addEventListener('touchend',endDraw,false);
canvas.addEventListener('touchcancel',endDraw,false);
canvas.addEventListener('mousedown',startDraw,false);
canvas.addEventListener('mousemove',doDraw,false);
canvas.addEventListener('mouseup',endDraw,false);
canvas.addEventListener('mouseleave',endDraw,false);
document.body.addEventListener('touchmove',function(e){ e.preventDefault(); },false);

var cdots=document.querySelectorAll('.c-dot');
function selectColorDot(btn){
  for(var j=0;j<cdots.length;j++) cdots[j].classList.remove('active');
  btn.classList.add('active');
  state.color=btn.getAttribute('data-color');
  state.eraser=false;
  document.getElementById('eraser-btn').classList.remove('active');
}
for(var i=0;i<cdots.length;i++){
  (function(btn){
    if(btn.id==='custom-dot') return;
    btn.addEventListener('click',function(){ selectColorDot(btn); });
  })(cdots[i]);
}
var sbtns=document.querySelectorAll('.sz-btn');
for(var k=0;k<sbtns.length;k++){
  (function(btn){
    btn.addEventListener('click',function(){
      for(var m=0;m<sbtns.length;m++) sbtns[m].classList.remove('active');
      btn.classList.add('active');
      state.size=parseInt(btn.getAttribute('data-size'));
    });
  })(sbtns[k]);
}
document.getElementById('eraser-btn').addEventListener('click',function(){
  state.eraser=!state.eraser;
  if(state.eraser) this.classList.add('active'); else this.classList.remove('active');
},false);
document.getElementById('undo-btn').addEventListener('click',function(){
  if(history.length===0) return;
  try{ ctx.putImageData(history.pop(),0,0); }catch(e){}
},false);
document.getElementById('clear-btn').addEventListener('click',function(){
  document.getElementById('confirm-overlay').className='open';
},false);
document.getElementById('confirm-yes').addEventListener('click',function(){
  saveHist(); ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  document.getElementById('confirm-overlay').className='';
},false);
document.getElementById('confirm-no').addEventListener('click',function(){
  document.getElementById('confirm-overlay').className='';
},false);
document.getElementById('save-btn').addEventListener('click',function(){
  try{
    var url=canvas.toDataURL('image/jpeg',0.85);
    document.getElementById('preview-img').src=url;
    document.getElementById('save-overlay').className='open';
  }catch(e){ alert('No se pudo generar la imagen.'); }
},false);
document.getElementById('close-save').addEventListener('click',function(){
  document.getElementById('save-overlay').className='';
  document.getElementById('preview-img').src='';
},false);
document.getElementById('save-overlay').addEventListener('click',function(e){
  if(e.target===this){ this.className=''; document.getElementById('preview-img').src=''; }
},false);

var wheelCanvas=document.getElementById('wheel-canvas');
var wctx=wheelCanvas.getContext('2d');
var WR=100;
function drawWheel(){
  var cx=WR,cy=WR;
  for(var angle=0;angle<360;angle+=1){
    var grad=wctx.createRadialGradient(cx,cy,0,cx,cy,WR);
    grad.addColorStop(0,'#ffffff');
    grad.addColorStop(1,'hsl('+angle+',100%,50%)');
    wctx.beginPath(); wctx.moveTo(cx,cy);
    wctx.arc(cx,cy,WR,(angle-1)*Math.PI/180,(angle+1)*Math.PI/180);
    wctx.closePath(); wctx.fillStyle=grad; wctx.fill();
  }
  wctx.beginPath(); wctx.arc(cx,cy,12,0,Math.PI*2);
  wctx.fillStyle='#111'; wctx.fill();
  var dg=wctx.createRadialGradient(cx,cy,WR*0.82,cx,cy,WR);
  dg.addColorStop(0,'rgba(0,0,0,0)'); dg.addColorStop(1,'rgba(0,0,0,0.35)');
  wctx.beginPath(); wctx.arc(cx,cy,WR,0,Math.PI*2);
  wctx.fillStyle=dg; wctx.fill();
}
function getWheelColor(x,y){
  try{ var d=wctx.getImageData(x,y,1,1).data; return 'rgb('+d[0]+','+d[1]+','+d[2]+')'; }
  catch(e){ return '#888'; }
}
function rgbToHex(rgb){
  var m=rgb.match(/\d+/g); if(!m) return '#888888';
  return '#'+('0'+parseInt(m[0]).toString(16)).slice(-2)+
              ('0'+parseInt(m[1]).toString(16)).slice(-2)+
              ('0'+parseInt(m[2]).toString(16)).slice(-2);
}
function wheelPick(e){
  e.preventDefault();
  var rect=wheelCanvas.getBoundingClientRect(); var cx,cy;
  if(e.touches&&e.touches.length>0){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; }
  else{ cx=e.clientX; cy=e.clientY; }
  var x=Math.round((cx-rect.left)*(wheelCanvas.width/rect.width));
  var y=Math.round((cy-rect.top)*(wheelCanvas.height/rect.height));
  var dx=x-WR,dy=y-WR;
  if(dx*dx+dy*dy>WR*WR) return;
  pickedColor=rgbToHex(getWheelColor(x,y));
  document.getElementById('picker-preview').style.background=pickedColor;
}
wheelCanvas.addEventListener('touchstart',wheelPick,false);
wheelCanvas.addEventListener('touchmove',wheelPick,false);
wheelCanvas.addEventListener('mousedown',wheelPick,false);
wheelCanvas.addEventListener('mousemove',function(e){ if(e.buttons>0) wheelPick(e); },false);
document.getElementById('custom-dot').addEventListener('click',function(){
  pickedColor=this.getAttribute('data-color');
  document.getElementById('picker-preview').style.background=pickedColor;
  document.getElementById('picker-overlay').className='open';
  drawWheel();
},false);
document.getElementById('picker-ok').addEventListener('click',function(){
  var dot=document.getElementById('custom-dot');
  dot.style.background=pickedColor; dot.setAttribute('data-color',pickedColor);
  selectColorDot(dot); document.getElementById('picker-overlay').className='';
},false);
document.getElementById('picker-cancel').addEventListener('click',function(){
  document.getElementById('picker-overlay').className='';
},false);

initCanvas();
</script>
</body>
</html>
