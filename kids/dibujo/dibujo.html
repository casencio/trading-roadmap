*{margin:0;padding:0;-webkit-box-sizing:border-box;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{

/* Forzar landscape — rotar si portrait */
@media (orientation:portrait){
  body{
    width:768px;height:1024px;
    -webkit-transform-origin:0 0;
    -webkit-transform:rotate(90deg) translateY(-768px);

/* ── APP SHELL ── */
#app{

  -webkit-flex-shrink:0;flex-shrink:0;

  display:inline-block;
  /* Relieve: highlight arriba + sombra abajo */
  -webkit-box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.55),
    inset 0 -2px 0 rgba(0,0,0,0.18),
    0 3px 6px rgba(0,0,0,0.28),
    0 1px 2px rgba(0,0,0,0.18);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.55),

    0 1px 2px rgba(0,0,0,0.18);

/* Dot centrado con position:absolute — sin flex en Safari antiguo */

<script>
// ── Estado global ──────────────────────────────────────────────
var canvas   = document.getElementById('drawing-canvas');
var ctx      = canvas.getContext('2d');
var wrap     = document.getElementById('canvas-wrap');
var state    = { drawing:false, color:'#111111', size:3, eraser:false, lastX:0, lastY:0 };
var history  = [];
var MAX_HIST = 5;
var pickedColor = '#aaaaaa';
var wheelDrawn  = false;
var WR = 110;

// ── Canvas principal ───────────────────────────────────────────
function initCanvas() {
  var toolbarH = document.getElementById('toolbar').offsetHeight || 120;
  var availH = 768 - toolbarH;
  var cw, ch;
  if (1024 / availH > 4/3) { ch = availH - 16; cw = Math.floor(ch * (4/3)); }
  else                      { cw = 1024 - 16;  ch = Math.floor(cw / (4/3)); }
  canvas.width  = cw;
  canvas.height = ch;
  ctx.fillStyle = '#fffef8';
  ctx.fillRect(0, 0, cw, ch);
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';
}

function saveHist() {
  if (history.length >= MAX_HIST) history.shift();
  try { history.push(ctx.getImageData(0, 0, canvas.width, canvas.height)); } catch(e) {}
}

function getPos(e) {
  var rect = canvas.getBoundingClientRect();
  var cx, cy;
  if (e.touches && e.touches.length > 0) {
    cx = e.touches[0].clientX; cy = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY;
  } else {
    cx = e.clientX; cy = e.clientY;
  }
  return {
    x: (cx - rect.left) * (canvas.width  / rect.width),
    y: (cy - rect.top)  * (canvas.height / rect.height)
  };
}

function drawColor() { return state.eraser ? '#fffef8' : state.color; }
function drawSize()  { return state.eraser ? state.size * 2.5 : state.size; }

function startDraw(e) {
  e.preventDefault();
  state.drawing = true;
  saveHist();
  var p = getPos(e);
  state.lastX = p.x; state.lastY = p.y;
  ctx.beginPath();
  ctx.arc(p.x, p.y, drawSize() / 2, 0, Math.PI * 2);
  ctx.fillStyle = drawColor();
  ctx.fill();
}
function doDraw(e) {
  e.preventDefault();
  if (!state.drawing) return;
  var p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(state.lastX, state.lastY);
  ctx.lineTo(p.x, p.y);
  ctx.strokeStyle = drawColor();
  ctx.lineWidth   = drawSize();
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.stroke();
  state.lastX = p.x; state.lastY = p.y;
}
function endDraw(e) { if (e) e.preventDefault(); state.drawing = false; }

canvas.addEventListener('touchstart',  startDraw, false);
canvas.addEventListener('touchmove',   doDraw,    false);
canvas.addEventListener('touchend',    endDraw,   false);
canvas.addEventListener('touchcancel', endDraw,   false);
canvas.addEventListener('mousedown',   startDraw, false);
canvas.addEventListener('mousemove',   doDraw,    false);
canvas.addEventListener('mouseup',     endDraw,   false);
canvas.addEventListener('mouseleave',  endDraw,   false);

document.body.addEventListener('touchmove', function(e) { e.preventDefault(); }, false);

// ── Helper touchend sin delay 300ms ───────────────────────────
function touchBtn(id, handler) {
  var el = document.getElementById(id);
  el.addEventListener('touchend', function(e) { e.preventDefault(); handler(); }, false);
  el.addEventListener('click', handler, false);
}

// ── Dots de color ─────────────────────────────────────────────
var cdots = document.querySelectorAll('.c-dot');

function selectColorDot(btn) {
  var j;
  for (j = 0; j < cdots.length; j++) cdots[j].classList.remove('active');
  btn.classList.add('active');
  state.color  = btn.getAttribute('data-color');
  state.eraser = false;
  document.getElementById('eraser-btn').classList.remove('active');
}

var i;
for (i = 0; i < cdots.length; i++) {
  (function(btn) {
    if (btn.id === 'custom-dot') return;
    btn.addEventListener('touchend', function(e) { e.preventDefault(); selectColorDot(btn); }, false);
    btn.addEventListener('click', function() { selectColorDot(btn); }, false);
  })(cdots[i]);
}

// ── Dots de grosor ────────────────────────────────────────────
var sbtns = document.querySelectorAll('.sz-btn');
var k;
for (k = 0; k < sbtns.length; k++) {
  (function(btn) {
    function pickSize() {
      var m;
      for (m = 0; m < sbtns.length; m++) sbtns[m].classList.remove('active');
      btn.classList.add('active');
      state.size = parseInt(btn.getAttribute('data-size'), 10);
    }
    btn.addEventListener('touchend', function(e) { e.preventDefault(); pickSize(); }, false);
    btn.addEventListener('click', pickSize, false);
  })(sbtns[k]);
}

// ── Botones de acción ─────────────────────────────────────────
touchBtn('eraser-btn', function() {
  state.eraser = !state.eraser;
  var eb = document.getElementById('eraser-btn');
  if (state.eraser) eb.classList.add('active'); else eb.classList.remove('active');
});

touchBtn('undo-btn', function() {
  if (history.length === 0) return;
  try { ctx.putImageData(history.pop(), 0, 0); } catch(e) {}
});

touchBtn('clear-btn', function() {
  document.getElementById('confirm-overlay').className = 'open';
});

touchBtn('confirm-yes', function() {
  saveHist();
  ctx.fillStyle = '#fffef8';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  document.getElementById('confirm-overlay').className = '';
});

touchBtn('confirm-no', function() {
  document.getElementById('confirm-overlay').className = '';
});

touchBtn('save-btn', function() {
  try {
    var url = canvas.toDataURL('image/jpeg', 0.85);
    document.getElementById('preview-img').src = url;
    document.getElementById('save-overlay').className = 'open';
  } catch(e) { alert('No se pudo generar la imagen.'); }
});

touchBtn('close-save', function() {
  document.getElementById('save-overlay').className = '';
  document.getElementById('preview-img').src = '';
});

// Cerrar overlay al tocar el fondo oscuro — pero SOLO si es tap rápido,
// no long-press (que es el gesto para guardar la imagen)
var saveOverlay = document.getElementById('save-overlay');
var saveTouchStart = 0;
saveOverlay.addEventListener('touchstart', function(e) {
  if (e.target === this) { saveTouchStart = Date.now(); }
}, false);
saveOverlay.addEventListener('touchend', function(e) {
  if (e.target === this) {
    var dur = Date.now() - saveTouchStart;
    if (dur < 350) {
      e.preventDefault();
      this.className = '';
      document.getElementById('preview-img').src = '';
    }
    // Si dur >= 350ms fue long-press — no hacer nada, dejar que Safari
    // muestre su menú contextual sobre la imagen
  }
}, false);
saveOverlay.addEventListener('click', function(e) {
  if (e.target === this) {
    this.className = '';
    document.getElementById('preview-img').src = '';
  }
}, false);

// ── Rueda de color ────────────────────────────────────────────
var wheelCanvas = document.getElementById('wheel-canvas');
var wctx        = wheelCanvas.getContext('2d');

function drawWheel() {
  if (wheelDrawn) return;
  wheelDrawn = true;
  var cx = WR, cy = WR;
  var angle;
  for (angle = 0; angle < 360; angle += 1) {
    var grad = wctx.createRadialGradient(cx, cy, 0, cx, cy, WR);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(1, 'hsl(' + angle + ',100%,50%)');
    wctx.beginPath();
    wctx.moveTo(cx, cy);
    wctx.arc(cx, cy, WR, (angle - 1) * Math.PI / 180, (angle + 1) * Math.PI / 180);
    wctx.closePath();
    wctx.fillStyle = grad;
    wctx.fill();
  }
  wctx.beginPath();
  wctx.arc(cx, cy, 14, 0, Math.PI * 2);
  wctx.fillStyle = '#111';
  wctx.fill();
  var dg = wctx.createRadialGradient(cx, cy, WR * 0.8, cx, cy, WR);
  dg.addColorStop(0, 'rgba(0,0,0,0)');
  dg.addColorStop(1, 'rgba(0,0,0,0.3)');
  wctx.beginPath();
  wctx.arc(cx, cy, WR, 0, Math.PI * 2);
  wctx.fillStyle = dg;
  wctx.fill();
}

function getWheelColor(x, y) {
  try {
    var d = wctx.getImageData(x, y, 1, 1).data;
    return 'rgb(' + d[0] + ',' + d[1] + ',' + d[2] + ')';
  } catch(e) { return '#888'; }
}

function rgbToHex(rgb) {
  var m = rgb.match(/\d+/g);
  if (!m) return '#888888';
  return '#' +
    ('0' + parseInt(m[0], 10).toString(16)).slice(-2) +
    ('0' + parseInt(m[1], 10).toString(16)).slice(-2) +
    ('0' + parseInt(m[2], 10).toString(16)).slice(-2);
}

function wheelPick(e) {
  e.preventDefault();
  var rect = wheelCanvas.getBoundingClientRect();
  var cx, cy;
  if (e.touches && e.touches.length > 0) {
    cx = e.touches[0].clientX; cy = e.touches[0].clientY;
  } else {
    cx = e.clientX; cy = e.clientY;
  }
  var x = Math.round((cx - rect.left) * (wheelCanvas.width  / rect.width));
  var y = Math.round((cy - rect.top)  * (wheelCanvas.height / rect.height));
  var dx = x - WR, dy = y - WR;
  if (dx * dx + dy * dy > WR * WR) return;
  pickedColor = rgbToHex(getWheelColor(x, y));
  document.getElementById('picker-preview').style.background = pickedColor;
}

wheelCanvas.addEventListener('touchstart', wheelPick, false);
wheelCanvas.addEventListener('touchmove',  wheelPick, false);
wheelCanvas.addEventListener('mousedown',  wheelPick, false);
wheelCanvas.addEventListener('mousemove', function(e) { if (e.buttons > 0) wheelPick(e); }, false);

var customDot = document.getElementById('custom-dot');
customDot.addEventListener('touchend', function(e) {
  e.preventDefault();
  pickedColor = this.getAttribute('data-color');
  document.getElementById('picker-preview').style.background = pickedColor;
  document.getElementById('picker-overlay').className = 'open';
  drawWheel();
}, false);
customDot.addEventListener('click', function() {
  pickedColor = this.getAttribute('data-color');
  document.getElementById('picker-preview').style.background = pickedColor;
  document.getElementById('picker-overlay').className = 'open';
  drawWheel();
}, false);

touchBtn('picker-ok', function() {
  var dot = document.getElementById('custom-dot');
  dot.style.background = pickedColor;
  dot.setAttribute('data-color', pickedColor);
  selectColorDot(dot);
  document.getElementById('picker-overlay').className = '';
});

touchBtn('picker-cancel', function() {
  document.getElementById('picker-overlay').className = '';
});

// Pre-render rueda al cargar para evitar lag primer uso
setTimeout(function() { drawWheel(); }, 500);

// ── Init ───────────────────────────────────────────────────────
initCanvas();
</script>
