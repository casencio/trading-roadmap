<title>Mates Gala y Olivia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
:root {
  --o:#FF5C93; --o-soft:#FFE4EF;
  --g:#7C5CE8; --g-soft:#EDE4FF; --g-dark:#5A3DC0;
  --ok:#22C97A; --ok-dark:#17A05F; --err:#FF4757;
  --bg:#F7F4FF; --white:#FFFFFF; --text:#2D2D2D;
  --gray:#C8C8D8; --gray-lt:#EBEBF5;
  --shad:rgba(100,80,180,0.13);
  /* Colores valor posicional — iguales en TODAS las operaciones */
  --col-u:#4A90E2;   /* Unidades: azul */
  --col-d:#E75C3C;   /* Decenas: coral */
  --col-c:#2ECC71;   /* Centenas: verde */
  --col-um:#F1C40F;  /* Millar: amarillo */
  /* Multiplicación nivel 5: filas parciales */
  --mul-pu:#FFB300;  /* fila x unidades */
  --mul-pd:#9B5DE5;  /* fila x decenas */
  --mul-res:#94A3B8; /* resultado final */
}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;
  font-family:'Nunito','Helvetica Neue',Arial,sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;}
.app-wrap{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  height:100%;width:100%;box-sizing:border-box;}

/* ── TOP BAR ── */
.top-bar{background:var(--white);box-shadow:0 2px 10px var(--shad);
  padding:8px 10px;-webkit-flex-shrink:0;flex-shrink:0;z-index:10;}
.main-row{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;}
.ops-group{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-wrap:wrap;flex-wrap:wrap;margin-right:6px;}
.pill{padding:6px 12px;margin:2px 3px 2px 0;border-radius:30px;
  font-size:14px;font-weight:900;color:var(--gray);background:var(--gray-lt);
  cursor:pointer;-webkit-transition:all 0.15s;transition:all 0.15s;white-space:nowrap;}
.pill.on{background:var(--g);color:var(--white);}
.pill.on-o{background:var(--o-soft);color:var(--o);}
.pill.on-g{background:var(--g-soft);color:var(--g);}
.spacer{-webkit-box-flex:1;-webkit-flex:1;flex:1;}
.av{width:22px;height:22px;border-radius:50%;font-size:12px;font-weight:900;
  text-align:center;line-height:22px;margin-right:5px;-webkit-flex-shrink:0;flex-shrink:0;}
.pts-badge{font-size:11px;font-weight:800;background:var(--white);
  border-radius:20px;padding:1px 6px;margin-left:5px;}

/* ── NIVELES ── */
.nav-levels{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  background:var(--g);padding:6px 10px;-webkit-flex-shrink:0;flex-shrink:0;}
.lvl{width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,0.2);color:var(--white);
  font-size:17px;font-weight:900;text-align:center;line-height:38px;
  margin:0 4px;cursor:pointer;-webkit-transition:all 0.15s;transition:all 0.15s;}
.lvl.on{background:var(--white);color:var(--g);box-shadow:0 3px 10px rgba(0,0,0,0.2);}

/* ── EJERCICIO ── */
.ex-area{-webkit-box-flex:1;-webkit-flex:1;flex:1;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  padding:8px 12px;width:100%;box-sizing:border-box;overflow:hidden;}

/* ── CAJAS GENÉRICAS ── */
.box{display:inline-block;width:76px;height:80px;line-height:80px;
  border:4px dashed var(--gray);border-radius:16px;background:var(--white);
  font-size:58px;font-weight:900;text-align:center;vertical-align:middle;
  box-sizing:border-box;-webkit-transition:all 0.15s;transition:all 0.15s;}
.box.full{width:120px;margin:0 8px;}
.box.wide{width:96px;margin:0 5px;}
.box.carry{width:34px;height:34px;border-radius:50%;border:3px solid var(--gray);
  line-height:34px;font-size:19px;color:var(--o);height:34px;}
.box.on{border-color:var(--o);border-style:solid;background:var(--o-soft);
  -webkit-transform:scale(1.06);transform:scale(1.06);
  box-shadow:0 4px 18px rgba(255,92,147,0.28);}
.box.carry.on{border-color:var(--o);border-style:solid;background:var(--o-soft);}
.box.ok{border-color:var(--ok);border-style:solid;color:var(--ok);background:#edfbf3;}
.box.err{border-color:var(--err);border-style:solid;background:#ffeeee;
  -webkit-animation:shake 0.4s;animation:shake 0.4s;}

/* ── TABLA VERTICAL (sumas/restas n>1) ── */
.vt{border-collapse:collapse;margin:0 auto;}
.vt td{width:78px;height:80px;text-align:center;vertical-align:bottom;
  font-size:58px;font-weight:900;}
.vt-sign{color:var(--g);font-size:58px !important;text-align:right;padding-right:14px;}
.vt-line td{border-bottom:6px solid var(--text);padding-bottom:4px;}

/* ── TIPOGRAFÍA OPERACIÓN HORIZONTAL ── */
.h-row{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  -webkit-flex-wrap:wrap;flex-wrap:wrap;
  font-size:80px;font-weight:900;line-height:1;}

/* ── TABLAS MULT NIVEL 1 (tablas con contexto) ── */
.tab-ctx{font-size:38px;font-weight:800;color:#b0a8cc;margin:6px 0;text-align:center;}
.tab-main{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  font-size:72px;font-weight:900;background:var(--white);border-radius:26px;
  padding:14px 28px;box-shadow:0 6px 28px var(--shad);margin:8px 0;}

/* ════════════════════════════════════════════════════════════
   MULTIPLICACIÓN PLANTILLA — tabla HTML con columnas fijas
   Cada columna = 1 posición numérica (U, D, C, DM…)
   Las filas comparten las mismas columnas → alineación perfecta
   ════════════════════════════════════════════════════════════ */
.mt{border-collapse:collapse;}
/* Todas las celdas de datos tienen el mismo ancho fijo */
.mt td{padding:2px;text-align:center;vertical-align:middle;}
.mt td.dc{width:60px;}  /* data column */
.mt td.sc{width:44px;}  /* sign column (×, +) */

/* Cuadrado de número (multiplicando / multiplicador) */
.msq{display:inline-block;width:54px;height:56px;line-height:56px;
  border-radius:10px;font-size:38px;font-weight:900;text-align:center;
  box-sizing:border-box;vertical-align:middle;}
/* Cuadradito carry */
.mcy{display:inline-block;width:28px;height:28px;line-height:28px;
  border:2px solid var(--gray);border-radius:5px;background:var(--white);
  font-size:15px;font-weight:900;text-align:center;color:var(--o);
  box-sizing:border-box;cursor:pointer;}
.mcy.on{border-color:var(--o);background:var(--o-soft);}
/* Cuadrado resultado/parcial (rellenable) */
.mrq{display:inline-block;width:54px;height:56px;line-height:56px;
  border-radius:10px;font-size:38px;font-weight:900;text-align:center;
  box-sizing:border-box;vertical-align:middle;cursor:pointer;
  -webkit-transition:all 0.12s;transition:all 0.12s;}
.mrq.on{border-style:solid;border-color:var(--o);background:var(--o-soft);}
.mrq.ok{border-style:solid;border-color:var(--ok);background:#edfbf3;color:var(--ok);}
.mrq.err{border-style:solid;border-color:var(--err);background:#ffeeee;
  -webkit-animation:shake 0.4s;animation:shake 0.4s;}
/* Celda vacía espaciadora (sin borde) */
.memp{display:inline-block;width:54px;height:56px;}
/* Línea de separación en tabla */
.mt-line td{border-top:5px solid var(--text);}

/* ════════════════════════════════════════════════════════════
   DIVISIONES
   Nivel 1: 4 cajas grandes (plantilla PiruleTEA)
   ════════════════════════════════════════════════════════════ */
/* Las 4 cajas se alinean en un grid 2×2 de ~200px cada celda */
.d1-wrap{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-wrap:wrap;flex-wrap:wrap;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  max-width:400px;}
.d1-cell{width:50%;box-sizing:border-box;padding:6px;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;}
.d1-lbl{font-size:14px;font-weight:900;border-radius:8px;
  padding:3px 12px;margin-bottom:6px;text-align:center;}
.d1-box{width:120px;height:110px;border-radius:20px;
  font-size:64px;font-weight:900;text-align:center;line-height:110px;
  box-sizing:border-box;cursor:pointer;-webkit-transition:all 0.15s;transition:all 0.15s;}
.d1-box.on{-webkit-transform:scale(1.06);transform:scale(1.06);
  box-shadow:0 4px 18px rgba(255,92,147,0.3);border-color:var(--o) !important;
  border-style:solid !important;background:var(--o-soft) !important;color:var(--text);}
.d1-box.ok{border-color:var(--ok) !important;border-style:solid !important;background:#edfbf3 !important;}
.d1-box.err{border-color:var(--err) !important;border-style:solid !important;background:#ffeeee !important;
  -webkit-animation:shake 0.4s;animation:shake 0.4s;}
/* Colores por rol */
.d1-dividendo{background:#e8f4fd;border:4px solid #3498db;color:#3498db;}
.d1-lbl.dividendo{background:#ebf5fb;color:#2980b9;border:2px solid #3498db;}
.d1-divisor{background:#fdedec;border:4px solid var(--err);color:var(--err);}
.d1-lbl.divisor{background:#fdedec;color:var(--err);border:2px solid var(--err);}
.d1-resto{background:#fef9e7;border:4px dashed #e6c200;color:#b8860b;}
.d1-lbl.resto{background:#fef9e7;color:#b8860b;border:2px solid #e6c200;}
.d1-cociente{background:#eafaf1;border:4px dashed var(--ok);color:var(--ok-dark);}
.d1-lbl.cociente{background:#eafaf1;color:var(--ok-dark);border:2px solid var(--ok);}

/* Divisiones niveles 2-5 */
.dN-wrap{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  width:100%;max-width:480px;}
.dN-top{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  background:var(--g-soft);border:3px solid var(--g);border-radius:22px;
  padding:10px 20px;margin-bottom:14px;}
.dN-n{font-size:54px;font-weight:900;margin:0 5px;}
.dN-work{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:flex-start;-webkit-align-items:flex-start;align-items:flex-start;}
.dN-left{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-align:flex-end;-webkit-align-items:flex-end;align-items:flex-end;
  margin-right:8px;}
.dN-digits{display:-webkit-box;display:-webkit-flex;display:flex;margin-bottom:8px;}
.dN-dbox{width:52px;height:56px;line-height:56px;background:#f0ecff;
  border:3px solid var(--g);border-radius:10px;font-size:36px;font-weight:900;
  color:var(--g-dark);text-align:center;margin:0 2px;}
.dN-calc-row{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-bottom:4px;}
.dN-clbl{font-size:14px;font-weight:900;color:var(--gray);width:32px;text-align:right;margin-right:4px;}
.dN-cbox{width:48px;height:52px;line-height:52px;border:3px dashed var(--gray);
  border-radius:10px;background:var(--white);font-size:32px;font-weight:900;
  text-align:center;margin:0 2px;}
.dN-sep{border-top:4px solid var(--gray);margin:5px 0;width:100%;}
.dN-rrow{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-top:4px;}
.dN-right{border-left:6px solid var(--text);border-bottom:6px solid var(--text);
  padding:8px 10px 12px 12px;min-width:74px;}
.dN-rnum{font-size:40px;font-weight:900;color:var(--g);text-align:center;margin-bottom:5px;}
.dN-rline{border-top:3px solid var(--gray);margin-bottom:4px;}
.dN-rhint{font-size:11px;color:var(--gray);font-weight:800;text-align:center;}

/* Botón ayuda + panel flotante */
.ayuda-btn{display:inline-block;padding:5px 14px;border-radius:20px;
  background:var(--o-soft);color:var(--o);font-size:14px;font-weight:900;
  border:2px solid var(--o);cursor:pointer;margin-bottom:8px;}
.ayuda-panel{position:fixed;right:8px;top:50%;margin-top:-170px;
  width:126px;background:var(--white);border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.18);border:2px solid var(--g);
  z-index:200;padding:10px 8px;display:none;}
.ayuda-panel.show{display:block;}
.ayuda-title{font-size:13px;font-weight:900;color:var(--g);text-align:center;margin-bottom:5px;}
.ayuda-nav{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-bottom:5px;}
.ayuda-arr{width:26px;height:26px;border-radius:50%;background:var(--g-soft);
  color:var(--g);font-size:16px;font-weight:900;text-align:center;line-height:26px;cursor:pointer;}
.ayuda-num{font-size:19px;font-weight:900;color:var(--g);margin:0 8px;}
.ayuda-rows{font-size:12px;font-weight:800;line-height:1.65;text-align:center;}
.ayuda-rows b{color:var(--o);}
.ayuda-close{display:block;text-align:center;margin-top:6px;
  font-size:12px;font-weight:900;color:var(--gray);cursor:pointer;}

/* ════════════════════════════════════════════════════════════
   COMBINADAS
   Dos líneas a mismo font-size, centradas, alineadas.
   Línea 1 (ref): el enunciado original, en gris.
   Separador fino.
   Línea 2 (paso): etiqueta pequeña a la izq + expresión igual tamaño.
   ════════════════════════════════════════════════════════════ */
.com-wrap{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  width:100%;}
/* Ambas líneas usan EXACTAMENTE esta clase — mismo tamaño */
.com-line{font-size:60px;font-weight:900;line-height:1.1;
  text-align:center;width:100%;}
.com-line.ref{color:#b0a8cc;}   /* enunciado: gris */
.com-line.act{color:var(--text);}  /* paso activo: negro */
.com-sep{width:80%;border:none;border-top:3px dashed var(--gray-lt);margin:8px auto;}
/* Etiqueta fase: PEQUEÑA, encima del paso activo, a la izquierda */
.com-lbl{font-size:14px;font-weight:900;color:var(--g);
  background:var(--g-soft);border-radius:20px;padding:3px 12px;
  margin-bottom:6px;text-align:left;-webkit-align-self:flex-start;align-self:flex-start;}
/* La caja dentro de la línea activa */
.com-box{display:inline-block;width:100px;height:70px;line-height:70px;
  border:4px dashed var(--o);border-radius:14px;background:var(--o-soft);
  font-size:52px;font-weight:900;text-align:center;vertical-align:middle;
  box-sizing:border-box;-webkit-transition:all 0.15s;transition:all 0.15s;
  cursor:pointer;}
.com-box.on{border-style:solid;-webkit-transform:scale(1.06);transform:scale(1.06);}
.com-box.ok{border-color:var(--ok);border-style:solid;background:#edfbf3;color:var(--ok);}
.com-box.err{border-color:var(--err);border-style:solid;background:#ffeeee;
  -webkit-animation:shake 0.4s;animation:shake 0.4s;}

/* ── TECLADO ── */
.numpad-wrap{background:var(--white);box-shadow:0 -2px 14px var(--shad);
  padding:7px 8px 10px 8px;-webkit-flex-shrink:0;flex-shrink:0;}
.numpad{display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-wrap:wrap;flex-wrap:wrap;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  max-width:460px;margin:0 auto;}
.nk{width:85px;height:56px;margin:4px;background:var(--gray-lt);
  border-radius:14px;box-shadow:0 4px 0 #d0c8e8;font-size:28px;font-weight:900;
  color:var(--text);display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  cursor:pointer;-webkit-transition:-webkit-transform 0.08s,box-shadow 0.08s;
  transition:transform 0.08s,box-shadow 0.08s;}
.nk:active{-webkit-transform:translateY(4px);transform:translateY(4px);box-shadow:0 0 0 #d0c8e8;}
.nk.del{background:#ffe4ef;color:var(--o);box-shadow:0 4px 0 #f0c0d0;font-size:20px;}
.nk.ok {background:var(--ok);color:var(--white);box-shadow:0 4px 0 var(--ok-dark);width:184px;font-size:20px;}
.nk.nxt{background:var(--g);color:var(--white);box-shadow:0 4px 0 var(--g-dark);width:184px;font-size:18px;}

/* ── EFECTOS ── */
@-webkit-keyframes shake{
  0%,100%{-webkit-transform:translateX(0);}20%{-webkit-transform:translateX(-9px);}
  40%{-webkit-transform:translateX(9px);}60%{-webkit-transform:translateX(-6px);}
  80%{-webkit-transform:translateX(6px);}}
@keyframes shake{
  0%,100%{transform:translateX(0);}20%{transform:translateX(-9px);}
  40%{transform:translateX(9px);}60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}}
.cfp{position:fixed;top:-30px;width:13px;height:13px;border-radius:3px;
  pointer-events:none;z-index:999;
  -webkit-animation:cffall 2.2s linear forwards;animation:cffall 2.2s linear forwards;}
@-webkit-keyframes cffall{to{-webkit-transform:translateY(110vh) rotate(540deg);opacity:0;}}
@keyframes cffall{to{transform:translateY(110vh) rotate(540deg);opacity:0;}}
.flash-ov{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;
  z-index:500;opacity:0;-webkit-transition:opacity 0.12s;transition:opacity 0.12s;}
.flash-ov.green{background:rgba(34,201,122,0.2);}
.flash-ov.red{background:rgba(255,71,87,0.2);}
.flash-ov.show{opacity:1;}
.pts-pop{position:fixed;left:50%;top:28%;font-size:52px;font-weight:900;color:var(--ok);
  pointer-events:none;z-index:998;
  -webkit-transform:translateX(-50%);transform:translateX(-50%);
  -webkit-animation:ptspop 1.3s ease-out forwards;animation:ptspop 1.3s ease-out forwards;}
@-webkit-keyframes ptspop{
  0%{opacity:0;-webkit-transform:translateX(-50%) scale(0.4);}
  25%{opacity:1;-webkit-transform:translateX(-50%) translateY(-14px) scale(1.2);}
  65%{opacity:1;-webkit-transform:translateX(-50%) translateY(-32px) scale(1);}
  100%{opacity:0;-webkit-transform:translateX(-50%) translateY(-60px) scale(0.8);}}
@keyframes ptspop{
  0%{opacity:0;transform:translateX(-50%) scale(0.4);}
  25%{opacity:1;transform:translateX(-50%) translateY(-14px) scale(1.2);}
  65%{opacity:1;transform:translateX(-50%) translateY(-32px) scale(1);}
  100%{opacity:0;transform:translateX(-50%) translateY(-60px) scale(0.8);}}
.star-pop{position:fixed;left:50%;top:50%;font-size:80px;pointer-events:none;z-index:997;
  -webkit-transform:translate(-50%,-50%) scale(0);transform:translate(-50%,-50%) scale(0);
  -webkit-animation:starpop 0.6s ease-out forwards;animation:starpop 0.6s ease-out forwards;}
@-webkit-keyframes starpop{
  60%{-webkit-transform:translate(-50%,-50%) scale(1.3);opacity:1;}
  100%{-webkit-transform:translate(-50%,-50%) scale(1);opacity:0;}}
@keyframes starpop{
  60%{transform:translate(-50%,-50%) scale(1.3);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0;}}
</style>
</head>
<body>
<div class="app-wrap">
  <div class="top-bar">
    <div class="main-row">
      <div class="ops-group">
        <div class="pill on" id="op_SUM" onclick="setTag('SUM')">Sumas</div>
        <div class="pill" id="op_RES" onclick="setTag('RES')">Restas</div>
        <div class="pill" id="op_MUL" onclick="setTag('MUL')">Mult</div>
        <div class="pill" id="op_DIV" onclick="setTag('DIV')">Div</div>
        <div class="pill" id="op_COM" onclick="setTag('COM')">Comb</div>
        <div class="pill" id="op_RAN" onclick="setTag('RAN')">Random</div>
      </div>
      <div class="spacer"></div>
      <div style="display:-webkit-box;display:-webkit-flex;display:flex;">
        <div class="pill" id="btn_olivia" onclick="setSister('olivia')" style="display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-left:5px;">
          <div class="av" id="av_o" style="background:var(--gray);color:var(--white);">O</div>
          Olivia<span class="pts-badge" id="pts_o">0</span>
        </div>
        <div class="pill" id="btn_gala" onclick="setSister('gala')" style="display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-left:5px;">
          <div class="av" id="av_g" style="background:var(--gray);color:var(--white);">G</div>
          Gala<span class="pts-badge" id="pts_g">0</span>
        </div>
      </div>
    </div>
  </div>
  <div class="nav-levels">
    <div class="lvl on" id="lvl1" onclick="setLevel(1)">1</div>
    <div class="lvl" id="lvl2" onclick="setLevel(2)">2</div>
    <div class="lvl" id="lvl3" onclick="setLevel(3)">3</div>
    <div class="lvl" id="lvl4" onclick="setLevel(4)">4</div>
    <div class="lvl" id="lvl5" onclick="setLevel(5)">5</div>
  </div>
  <div class="ex-area" id="exArea"></div>
  <div class="numpad-wrap"><div class="numpad" id="numpad"></div></div>
</div>

<!-- Panel ayuda tablas -->
<div class="ayuda-panel" id="ayudaPanel">
  <div class="ayuda-title">Tabla del <span id="ayudaN">2</span></div>
  <div class="ayuda-nav">
    <div class="ayuda-arr" onclick="ayudaNav(-1)">&#8249;</div>
    <div class="ayuda-num" id="ayudaND">2</div>
    <div class="ayuda-arr" onclick="ayudaNav(1)">&#8250;</div>
  </div>
  <div class="ayuda-rows" id="ayudaRows"></div>
  <span class="ayuda-close" onclick="closeAyuda()">Cerrar</span>
</div>
<div class="flash-ov" id="fov"></div>

<script>
/* ============================================================
   UTILIDADES ES5 ESTRICTO
   ============================================================ */
function r(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function G(id){return document.getElementById(id);}

/* ============================================================
   COOKIES
   ============================================================ */
function setCK(n,v,h){var d=new Date();d.setTime(d.getTime()+h*3600000);
  document.cookie=n+'='+encodeURIComponent(v)+';expires='+d.toUTCString()+';path=/';}
function getCK(n){var q=n+'=',ca=document.cookie.split(';');
  for(var i=0;i<ca.length;i++){var c=ca[i];
    while(c.charAt(0)===' ')c=c.substring(1);
    if(c.indexOf(q)===0)return decodeURIComponent(c.substring(q.length));}return null;}

/* ============================================================
   ESTADO
   ============================================================ */
var sister='olivia', tag='SUM', lvl=1;
var scores={olivia:0,gala:0};
var exp={}, actId=null;
var tabD={}, comD={}, comOn=false, rndLvl=1;
var ptsT={1:1,2:2,3:3,4:5,5:8};
var ayudaB=2;

window.onload=function(){loadSc();buildPad();genEx();};

/* ── SCORES ── */
function loadSc(){var r2=getCK('mates_scores');
  if(r2){try{var p=JSON.parse(r2);
    if(typeof p.olivia==='number')scores.olivia=p.olivia;
    if(typeof p.gala==='number')scores.gala=p.gala;}catch(e){}}
  updUI();}
function saveSc(){setCK('mates_scores',JSON.stringify(scores),24);}
function addPt(){var l=(tag==='RAN')?rndLvl:lvl,pts=ptsT[l]||1;
  scores[sister]+=pts;saveSc();updUI();showPts('+'+pts+' pts');}
function updUI(){G('pts_o').textContent=scores.olivia;G('pts_g').textContent=scores.gala;}

/* ── NAV ── */
function setSister(s){
  sister=s;
  G('btn_olivia').className='pill'+(s==='olivia'?' on-o':'');
  G('av_o').style.background=(s==='olivia')?'var(--o)':'var(--gray)';
  G('btn_gala').className='pill'+(s==='gala'?' on-g':'');
  G('av_g').style.background=(s==='gala')?'var(--g)':'var(--gray)';}

function setTag(t){tag=t;
  var ts=['SUM','RES','MUL','DIV','COM','RAN'];
  for(var i=0;i<ts.length;i++)G('op_'+ts[i]).className='pill'+(ts[i]===t?' on':'');
  genEx();}

function setLevel(l){lvl=l;
  for(var i=1;i<=5;i++)G('lvl'+i).className='lvl'+(i===l?' on':'');
  genEx();}

/* ── TECLADO ── */
function buildPad(){_pad([7,8,9,'C',4,5,6,0,1,2,3,'OK']);}
function buildPadNext(){_pad([7,8,9,'C',4,5,6,0,1,2,3,'SIG']);}
function _pad(keys){
  var h='';for(var i=0;i<keys.length;i++){
    var k=keys[i],c='nk';
    if(k==='C')c+=' del';if(k==='OK')c+=' ok';if(k==='SIG')c+=' nxt';
    h+='<div class="'+c+'" onclick="pk(\''+k+'\')">'+(k==='SIG'?'Siguiente':k)+'</div>';}
  G('numpad').innerHTML=h;}

function actBox(id){
  if(actId){var o=G(actId);if(o){
    o.className=o.className.replace(/\s*on/g,'');}}
  actId=id;var nb=G(id);if(nb){nb.className+=' on';}}

function pk(k){
  if(k==='SIG'){genEx();return;}
  if(!actId)return;
  if(k==='OK'){checkAll();return;}
  var b=G(actId);if(!b)return;
  if(k==='C'){b.textContent='';return;}
  /* Cajas multi-dígito */
  var multi=(actId.indexOf('full')>-1||actId.indexOf('wide')>-1||
    actId.indexOf('coc')>-1||actId.indexOf('dNres')>-1||
    actId.indexOf('tab_')>-1||actId.indexOf('d1_')>-1||
    actId.indexOf('com_')>-1||actId.indexOf('p1_')>-1||
    actId.indexOf('p2_')>-1||actId.indexOf('rf_')>-1||
    actId.indexOf('m2_')>-1||actId.indexOf('m3_')>-1||
    actId.indexOf('m4_')>-1);
  if(multi){if(b.textContent.length<5)b.textContent+=k;}
  else{
    b.textContent=k;
    if(actId.indexOf('ans_')===0){
      var idx=parseInt(actId.replace('ans_',''),10);
      var nx='ans_'+(idx+1);if(G(nx)){actBox(nx);return;}}}}

/* ============================================================
   GENERADOR
   ============================================================ */
function genEx(){exp={};actId=null;comOn=false;buildPad();closeAyuda();
  var l=lvl;
  if(tag==='RAN'){
    rndLvl=l;
    var ts=(l<=2)?['SUM','RES','MUL']:['SUM','RES','MUL','DIV','COM'];
    _run(ts[Math.floor(Math.random()*ts.length)],l);
  }else{_run(tag,l);}}
function _run(t,l){
  if(t==='SUM')gSum(l);else if(t==='RES')gRes(l);
  else if(t==='MUL')gMul(l);else if(t==='DIV')gDiv(l);
  else if(t==='COM')gCom(l);}

/* ── SUMAS ── */
function gSum(l){
  var a,b;
  if(l===1){a=r(1,5);b=r(1,5);}
  else if(l===2){a=r(5,19);b=r(5,19);}
  else if(l===3){a=r(20,99);b=r(20,99);}
  else if(l===4){a=r(100,499);b=r(100,499);}
  else{a=r(500,9999);b=r(500,9999);}
  if(l===1)rendH(a,b,'+',a+b);else rendV(a,b,'+',a+b);}

/* ── RESTAS — siempre a >= b, resultado >= 0 ── */
function gRes(l){
  var a,b;
  if(l===1){b=r(1,4);a=r(b,b+4);}          /* a: b..b+4, max 8 */
  else if(l===2){b=r(1,9);a=r(b+1,b+20);}  /* siempre a>b */
  else if(l===3){b=r(10,49);a=r(b+1,b+50);}
  else if(l===4){b=r(50,199);a=r(b+1,b+300);}
  else{b=r(100,999);a=r(b+1,b+3000);}
  if(l===1)rendH(a,b,'-',a-b);else rendV(a,b,'-',a-b);}

/* ── MULTIPLICACIONES ── */
function gMul(l){
  if(l===1){gTabla();return;}
  var a,b;
  /* Niveles 2,3,4: misma estructura vertical que sumas/restas */
  if(l===2){a=r(2,9);b=r(2,9);rendV(a,b,'x',a*b);return;}
  if(l===3){a=r(10,99);b=r(2,9);rendV(a,b,'x',a*b);return;}
  if(l===4){a=r(100,999);b=r(2,9);rendV(a,b,'x',a*b);return;}
  /* Nivel 5: 2 cifras × 2 cifras, dos parciales */
  a=r(20,99);b=r(12,29);rendMul2(a,b);}

/* Nivel 5: misma tabla .vt que sumas/restas + filas parciales */
function rendMul2(A,B){
  var BU=B%10,BD=Math.floor(B/10);
  var P1=A*BU,P2=A*BD,RES=A*B;
  var sA=String(A).split('').reverse();
  var sB=String(B).split('').reverse();
  var sP1=String(P1).split('').reverse();
  var sP2=String(P2).split('').reverse();
  var sRES=String(RES).split('').reverse();
  /* cols = la anchura máxima que necesitamos */
  var cols=Math.max(sA.length,sB.length,sP1.length,sP2.length+1,sRES.length);

  exp={};
  for(var i=0;i<sP1.length;i++)exp['p1_'+i]=sP1[i];
  if(BD>0)for(var i=0;i<sP2.length;i++)exp['p2_'+i]=sP2[i];
  for(var i=0;i<sRES.length;i++)exp['rf_'+i]=sRES[i];

  var h='<table class="vt">';

  /* Fila carries: SOLO sobre columnas con dígito en A Y columna >= 1 (nunca unidades) */
  h+='<tr><td></td>';
  for(var c=cols-1;c>=0;c--){
    if(c>=1&&sA[c]!==undefined&&sA[c]!=='')
      h+='<td><div class="box carry" id="cy5_'+c+'" onclick="actBox(\'cy5_'+c+'\')">&nbsp;</div></td>';
    else
      h+='<td></td>';}
  h+='</tr>';

  /* Fila multiplicando (A) — colores valor posicional, igual que rendV */
  h+='<tr><td></td>';
  for(var c=cols-1;c>=0;c--)h+='<td style="color:'+vc(c)+'">'+(sA[c]||'')+'</td>';
  h+='</tr>';

  /* Fila multiplicador (B) — unidades en naranja, decenas en morado */
  h+='<tr class="vt-line"><td class="vt-sign">x</td>';
  for(var c=cols-1;c>=0;c--){
    var col=(c===0)?'var(--mul-pu)':(c===1)?'var(--mul-pd)':'var(--text)';
    h+='<td style="color:'+col+'">'+(sB[c]||'')+'</td>';}
  h+='</tr>';

  /* Fila parcial 1 (A × unidades B) — borde naranja */
  h+='<tr><td></td>';
  for(var c=cols-1;c>=0;c--){
    h+='<td>';
    if(c<sP1.length)
      h+='<div class="box" id="p1_'+c+'" onclick="actBox(\'p1_'+c+'\')" style="border:4px dashed var(--mul-pu);">&nbsp;</div>';
    h+='</td>';}
  h+='</tr>';

  /* Fila parcial 2 (A × decenas B) — borde morado, desplazada 1 col */
  if(BD>0){
    h+='<tr class="vt-line"><td class="vt-sign" style="color:var(--g);">+</td>';
    for(var c=cols-1;c>=0;c--){
      h+='<td>';
      if(c>0&&c-1<sP2.length)
        h+='<div class="box" id="p2_'+(c-1)+'" onclick="actBox(\'p2_'+(c-1)+'\')" style="border:4px dashed var(--mul-pd);">&nbsp;</div>';
      h+='</td>';}
    h+='</tr>';}

  /* Fila resultado final — borde gris */
  h+='<tr><td></td>';
  for(var c=cols-1;c>=0;c--){
    h+='<td>';
    if(c<sRES.length)
      h+='<div class="box" id="rf_'+c+'" onclick="actBox(\'rf_'+c+'\')" style="border:4px dashed var(--mul-res);background:#F8FAFC;">&nbsp;</div>';
    h+='</td>';}
  h+='</tr>';

  h+='</table>';
  G('exArea').innerHTML=h;
  scaleToFit();
  actBox('p1_0');}

/* ============================================================
   DIVISIONES
   ============================================================ */
function gDiv(l){
  var dsr,coc,dvd,rst;
  if(l===1){
    dsr=r(2,4);coc=r(2,5);dvd=dsr*coc;
    rendDiv1(dvd,dsr,coc);return;}
  if(l===2){dsr=r(2,5);dvd=r(10,49);}
  else if(l===3){dsr=r(2,9);dvd=r(20,99);}
  else if(l===4){dsr=r(3,9);dvd=r(50,199);}
  else{dsr=r(4,9);dvd=r(100,999);}
  coc=Math.floor(dvd/dsr);rst=dvd%dsr;
  rendDivN(dvd,dsr,coc,rst);}

/* ============================================================
   COMBINADAS
   
   Regla: nunca divisiones.
   Niveles 1-2: 1 paréntesis, +/−, números bajos.
   Nivel 3: 1 par + multiplicación.
   Nivel 4: 2 pars + multiplicación.
   Nivel 5: 2 pars + 2 multiplicaciones.
   
   La pantalla muestra SIEMPRE:
   
   [enunciado original - gris - mismo font-size]
   ···········································
   [etiqueta fase pequeña izq]
   [paso actual - negro - mismo font-size - con caja]
   
   El paso activo muestra el enunciado con el paréntesis
   REEMPLAZADO por la caja blanca (no se muestra su contenido).
   ============================================================ */
function gCom(l){
  var a,b,c,d,e,f,r1,r2,r3,r4,r5,steps=[];
  if(l===1){
    a=r(1,5);b=r(4,8);c=r(1,b-1); /* c < b para que b-c > 0 */
    r1=b-c;r2=a+r1;
    steps=[
      {lbl:'1. Parentesis ( )',orig:a+' + ('+b+'-'+c+')',
       pre:a+' + ',parInner:b+'-'+c,post:'',ans:String(r1)},
      {lbl:'3. Sumar',orig:a+' + '+r1,
       pre:'',parInner:null,post:'',ans:String(r2),plain:true}];}
  else if(l===2){
    a=r(2,8);b=r(5,14);c=r(1,b-1);r1=b-c;r2=a+r1;
    steps=[
      {lbl:'1. Parentesis ( )',orig:a+' + ('+b+'-'+c+')',
       pre:a+' + ',parInner:b+'-'+c,post:'',ans:String(r1)},
      {lbl:'3. Sumar',orig:a+' + '+r1,
       pre:'',parInner:null,post:'',ans:String(r2),plain:true}];}
  else if(l===3){
    a=r(1,5);b=r(2,4);c=r(4,10);d=r(1,c-1);
    r1=c-d;r2=b*r1;r3=a+r2;
    steps=[
      {lbl:'1. Parentesis ( )',orig:a+' + '+b+' x ('+c+'-'+d+')',
       pre:a+' + '+b+' x ',parInner:c+'-'+d,post:'',ans:String(r1)},
      {lbl:'2. Multiplicar',orig:a+' + '+b+' x '+r1,
       pre:a+' + ',parInner:null,mulPre:b+' x ',mulPost:'',ans:String(r2)},
      {lbl:'3. Sumar',orig:a+' + '+r2,
       pre:'',parInner:null,mulPre:a+' + ',mulPost:'',ans:String(r3)}];}
  else if(l===4){
    a=r(2,5);b=r(1,4);c=r(2,5);d=r(3,8);e=r(1,d-1);
    r1=b+c;r2=d-e;r3=a*r1;r4=r3+r2;
    steps=[
      {lbl:'1. Parentesis 1',orig:a+' x ('+b+'+'+c+') + ('+d+'-'+e+')',
       pre:a+' x ',parInner:b+'+'+c,post:' + ('+d+'-'+e+')',ans:String(r1)},
      {lbl:'1. Parentesis 2',orig:a+' x '+r1+' + ('+d+'-'+e+')',
       pre:a+' x '+r1+' + ',parInner:d+'-'+e,post:'',ans:String(r2)},
      {lbl:'2. Multiplicar',orig:a+' x '+r1+' + '+r2,
       pre:'',parInner:null,mulPre:a+' x ',mulPost:' + '+r2,ans:String(r3)},
      {lbl:'3. Sumar',orig:r3+' + '+r2,
       pre:'',parInner:null,mulPre:r3+' + ',mulPost:'',ans:String(r4)}];}
  else{
    a=r(3,6);b=r(2,5);c=r(2,5);d=r(4,9);e=r(1,d-1);f=r(2,4);
    r1=b+c;r2=d-e;r3=a*r1;r4=r2*f;r5=r3-r4;
    if(r5<0){r5=r3;r4=0;f=0;}
    steps=[
      {lbl:'1. Parentesis 1',orig:a+' x ('+b+'+'+c+') - ('+d+'-'+e+') x '+f,
       pre:a+' x ',parInner:b+'+'+c,post:' - ('+d+'-'+e+') x '+f,ans:String(r1)},
      {lbl:'1. Parentesis 2',orig:a+' x '+r1+' - ('+d+'-'+e+') x '+f,
       pre:a+' x '+r1+' - ',parInner:d+'-'+e,post:' x '+f,ans:String(r2)},
      {lbl:'2. Mult x'+a,orig:a+' x '+r1+' - '+r2+' x '+f,
       pre:'',parInner:null,mulPre:a+' x ',mulPost:' - '+r2+' x '+f,ans:String(r3)},
      {lbl:'2. Mult x'+f,orig:r3+' - '+r2+' x '+f,
       pre:'',parInner:null,mulPre:r2+' x ',mulPost:'',ans:String(r4)},
      {lbl:'3. Restar',orig:r3+' - '+r4,
       pre:'',parInner:null,mulPre:r3+' - ',mulPost:'',ans:String(r5)}];}

  var origStr=steps[0].orig;
  comD={steps:steps,curr:0,refLine:origStr};
  comOn=true;rendCom();}

function rendCom(){
  var step=comD.steps[comD.curr];
  exp={'com_ans':step.ans};

  var BOX='<div class="com-box" id="com_ans" onclick="actBox(\'com_ans\')"></div>';
  var stepHtml;
  if(step.parInner!==null){
    /* Paréntesis: pre + ( [caja] ) + post */
    stepHtml=step.pre+'( '+BOX+' )'+step.post;
  }else if(step.mulPre!==null&&step.mulPre!==undefined){
    /* Multiplicación/suma/resta: mulPre + [caja] + mulPost */
    stepHtml=step.mulPre+BOX+step.mulPost;
  }else{
    /* Fallback: orig + = + caja */
    stepHtml=step.orig+' = '+BOX;
  }

  var h='<div class="com-wrap">';
  /* Línea 1: referencia gris */
  h+='<div class="com-line ref">'+comD.refLine+'</div>';
  h+='<div class="com-sep"></div>';
  /* Etiqueta + paso en la MISMA línea visual:
     usamos un wrapper flex con la etiqueta a la izquierda y la expresión centrada */
  h+='<div style="display:-webkit-box;display:-webkit-flex;display:flex;';
  h+='-webkit-box-align:center;-webkit-align-items:center;align-items:center;';
  h+='-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;';
  h+='width:100%;position:relative;">';
  /* Etiqueta absoluta a la izquierda */
  h+='<div style="position:absolute;left:0;top:50%;margin-top:-16px;">';
  h+='<div class="com-lbl">'+step.lbl+'</div></div>';
  /* Expresión centrada */
  h+='<div class="com-line act">'+stepHtml+'</div>';
  h+='</div>';
  h+='</div>';
  G('exArea').innerHTML=h;actBox('com_ans');}

/* ============================================================
   RENDERIZADORES BASE (horizontal / vertical)
   ============================================================ */
function rendH(a,b,sign,res){
  exp={'full':String(res)};
  var h='<div class="h-row">'+a+' '+sign+' '+b+' = ';
  h+='<div class="box full" id="full" onclick="actBox(\'full\')"></div></div>';
  G('exArea').innerHTML=h;scaleToFit();actBox('full');}

function rendV(a,b,sign,res){
  var sA=String(a).split('').reverse(),sB=String(b).split('').reverse();
  var sR=String(res).split('').reverse(),cols=sR.length;
  for(var i=0;i<sR.length;i++)exp['ans_'+i]=sR[i];
  /* Fila carries: sobre cada columna donde A tiene dígito, NUNCA en unidades (c=0) */
  var h='<table class="vt"><tr><td></td>';
  for(var c=cols-1;c>=0;c--){
    if(c>=1&&sA[c]!==undefined&&sA[c]!=='')
      h+='<td><div class="box carry" id="cy'+c+'" onclick="actBox(\'cy'+c+'\')">&nbsp;</div></td>';
    else
      h+='<td></td>';}
  h+='</tr><tr><td></td>';
  for(var c=cols-1;c>=0;c--)h+='<td style="color:'+vc(c)+'">'+(sA[c]||'')+'</td>';
  h+='</tr><tr class="vt-line"><td class="vt-sign">'+sign+'</td>';
  for(var c=cols-1;c>=0;c--)h+='<td style="color:'+vc(c)+'">'+(sB[c]||'')+'</td>';
  h+='</tr><tr><td></td>';
  for(var c=cols-1;c>=0;c--)h+='<td><div class="box" id="ans_'+c+'" onclick="actBox(\'ans_'+c+'\')">&nbsp;</div></td>';
  h+='</tr></table>';
  G('exArea').innerHTML=h;
  scaleToFit();
  actBox('ans_0');}
function vc(i){if(i===0)return'var(--col-u)';if(i===1)return'var(--col-d)';if(i===2)return'var(--col-c)';if(i===3)return'var(--col-um)';return'var(--text)';}

/* Escala el contenido del ex-area para que quepa siempre */
function scaleToFit(){
  var area=G('exArea');
  var child=area.firstElementChild;
  if(!child)return;
  /* Reset escala previa */
  child.style.webkitTransform='scale(1)';
  child.style.transform='scale(1)';
  child.style.webkitTransformOrigin='center center';
  child.style.transformOrigin='center center';
  /* Medir espacio disponible vs tamaño del contenido */
  var aw=area.offsetWidth-24, ah=area.offsetHeight-24;
  var cw=child.offsetWidth,   ch=child.offsetHeight;
  if(cw<=0||ch<=0)return;
  var scaleW=aw/cw, scaleH=ah/ch;
  var scale=Math.min(scaleW,scaleH,1); /* nunca ampliar, solo reducir */
  if(scale<0.98){
    child.style.webkitTransform='scale('+scale+')';
    child.style.transform='scale('+scale+')';}}

/* ============================================================
   COMPROBACIÓN
   ============================================================ */
function checkAll(){
  var ok=true;
  for(var key in exp){
    var b=G(key);if(!b){ok=false;continue;}
    var v=b.textContent.replace(/\s/g,'');
    if(v!==exp[key]){
      ok=false;
      (function(bx){var oc=bx.className.replace(/ err/g,'');
        bx.className=oc+' err';
        setTimeout(function(){bx.className=oc;},520);})(b);
    }else{b.className=b.className.replace(/ ok/g,'')+' ok';}}

  if(ok){
    flash('green');showStar();confetti();
    if(!comOn)addPt();
    setTimeout(function(){
      if(tag==='MUL'&&lvl===1){
        /* Tablas: mostrar siguiente */
        var nx=G('tab_next');
        if(nx)nx.textContent=tabD.base+' x '+(tabD.factor+1)+' = '+(tabD.base*(tabD.factor+1));
      }else if(comOn){
        advCom();
      }else{genEx();}
    },1200);
  }else{flash('red');}}

function advCom(){
  var step=comD.steps[comD.curr];
  if(step.parInner!==null){
    /* Reemplazar (inner) por el resultado en el refLine */
    var old='('+step.parInner+')';
    comD.refLine=comD.refLine.replace(old,step.ans);
  }else if(step.mulPre!==null&&step.mulPre!==undefined){
    /* El resultado reemplaza la sub-expresión: mulPre+resultado+mulPost */
    /* Buscamos mulPre+[número]+mulPost en el refLine y lo reemplazamos */
    /* Simplificado: el refLine ya es el orig del paso, lo actualizamos directo */
    comD.refLine=step.mulPre+step.ans+step.mulPost;
  }else{
    comD.refLine=step.orig+' = '+step.ans;
  }
  comD.curr++;
  if(comD.curr<comD.steps.length){
    rendCom();
  }else{
    comOn=false;addPt();
    setTimeout(function(){genEx();},600);}}

/* ── EFECTOS ── */
function flash(c){var ov=G('fov');ov.className='flash-ov '+c+' show';
  setTimeout(function(){ov.className='flash-ov '+c;},320);}
function showStar(){var el=document.createElement('div');el.className='star-pop';
  el.textContent='*';document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},700);}
function confetti(){var cs=['#FF5C93','#7C5CE8','#22C97A','#3498db','#f1c40f','#FF7675'];
  for(var i=0;i<36;i++){var cf=document.createElement('div');cf.className='cfp';
    cf.style.left=(Math.random()*100)+'vw';
    cf.style.backgroundColor=cs[Math.floor(Math.random()*cs.length)];
    cf.style.animationDuration=(Math.random()*1.5+1.5)+'s';
    cf.style.animationDelay=(Math.random()*0.5)+'s';
    document.body.appendChild(cf);
    (function(c2){setTimeout(function(){if(c2.parentNode)c2.parentNode.removeChild(c2);},3600);})(cf);}}
function showPts(txt){var el=document.createElement('div');el.className='pts-pop';
  el.textContent=txt;document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},1500);}
</script>
