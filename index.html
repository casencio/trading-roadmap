<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Financiero</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

        /* System Color Scheme Integration */
        :root {
            --bg: #000000; 
            --bg-alt: #050505; 
            --card: #0a0a0a; 
            --border: #1a1a1a;
            --main: #ffffff; 
            --muted: #636366; 
            --subtle: #424245;
            --grid-color: #1a1a1a;
            --hero-bg: linear-gradient(135deg, #0a0a0a 0%, #111111 100%);
            --hero-grad-top: #ffffff;
            --hero-grad-bot: #8e8e93;
            
            --blue: #0a84ff; 
            --green: #30d158; 
            --orange: #ff9f0a; 
            --red: #ff453a; 
            --purple: #bf5af2; 
            --teal: #00c7be; 
            --gray: #86868b;
            /* Tonos suaves (menos saturados) para los KPI de P&L */
            --pnl-pos: #5cb27e;
            --pnl-neg: #cf6f66;
            
            --font-display: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --gap: 12px;
            
            /* Sistema de espaciado jerárquico */
            --space-xs: 6px;    /* entre value y label de mismo grupo */
            --space-sm: 12px;   /* entre items relacionados */
            --space-md: 20px;   /* entre título y contenido */
            --space-lg: 24px;   /* padding interno de cajas */
            --space-xl: 32px;   /* entre secciones grandes */
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f5f5f7; 
                --bg-alt: #ffffff; 
                --card: #ffffff; 
                --border: #e5e5ea;
                --main: #000000; 
                --muted: #8e8e93; 
                --subtle: #aeaea3;
                --grid-color: #e5e5ea;
                --hero-bg: linear-gradient(135deg, #ffffff 0%, #fafafa 100%);
                --hero-grad-top: #1d1d1f;
                --hero-grad-bot: #6e6e73;
                
                --blue: #007aff; 
                --green: #34c759; 
                --orange: #ff9500; 
                --red: #ff3b30; 
                --purple: #af52de; 
                --teal: #5856d6; 
                --gray: #a1a1a6; /* Gris más claro para Light Mode */
                --pnl-pos: #3f9a62;
                --pnl-neg: #c75f56;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--main); 
            font-family: var(--font-display); 
            padding: 0;
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 20px; }
        
        /* ===== NAV HEADER & FOOTER ===== */
        .nav-container {
            padding: var(--space-lg) 0;
            background: var(--bg);
        }
        .site-header { border-bottom: 1px solid var(--border); margin-bottom: var(--space-xl); }
        .site-footer { margin-top: auto; border-top: 1px solid var(--border); }
        .nav-pills { 
            display: flex; 
            gap: var(--space-sm); 
            justify-content: center; 
        }
        .nav-link {
            color: var(--muted);
            text-decoration: none;
            padding: var(--space-sm) 18px;
            border-radius: 4px;
            border: 1px solid var(--border);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
            background: var(--card);
        }
        
        /* ===== SECTION TITLE ===== */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: var(--space-md);
        }
        .section-header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.015em; }
        .status-text { color: var(--subtle); font-size: 11px; font-family: var(--font-display); font-weight: 500; text-transform: lowercase;}

        /* ===== CARDS GENERALES ===== */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: var(--space-lg); margin-bottom: var(--gap); }
        .card-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: var(--space-md); letter-spacing: 0.08em; }

        /* ===== HERO GRID (Patrimonio grande + 2 KPIs) ===== */
        .hero-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: var(--gap);
            margin-bottom: var(--gap);
        }
        .hero-main, .kpi-box {
            padding: var(--space-md);
            margin-bottom: 0;
            min-width: 0;
        }
        .hero-main {
            background: var(--hero-bg);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .kpi-box {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hero-main h2 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: var(--space-sm); }
        .hero-value { 
            font-size: 38px; 
            font-weight: 700; 
            font-family: var(--font-mono); 
            letter-spacing: -0.02em; 
            line-height: 1;
            background: linear-gradient(180deg, var(--hero-grad-top) 0%, var(--hero-grad-bot) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        
        /* ===== KPI BOXES ===== */
        
        .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: var(--space-sm); font-weight: 600; }
        .kpi-val { font-size: 30px; font-family: var(--font-mono); font-weight: 700; letter-spacing: -0.01em; line-height: 1; }
        .kpi-val.positive { color: var(--pnl-pos); }
        .kpi-val.negative { color: var(--pnl-neg); }
        .kpi-val.neutral { color: var(--muted); }

        /* ===== CHARTS & TABLES ===== */
        .canvas-container { position: relative; height: 280px; width: 100%; }
        .canvas-bar { position: relative; height: 280px; width: 100%; }
        .scroll-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }
        .chart-container-dynamic { height: 280px; position: relative; min-width: 100%; }

        .table-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: var(--gap); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { padding: var(--space-sm) 16px; color: var(--muted); font-size: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); text-align: left; letter-spacing: 0.08em; font-weight: 600; background: var(--bg-alt); }
        td { padding: var(--space-sm) 16px; border-bottom: 1px solid var(--border); }
        .num { font-family: var(--font-mono); text-align: right; }
        .tag { display: inline-block; padding: 4px 8px; border-radius: 2px; font-size: 9px; font-weight: 600; text-transform: uppercase; }

        .viz-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--gap); margin-bottom: var(--gap); }
        .viz-grid .card { margin-bottom: 0; }

        /* ===== TRACKER ALINEACIÓN ===== */
        .tracker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gap); }
        .tracker-item { background: var(--bg-alt); border: 1px solid var(--border); border-radius: 4px; padding: var(--space-md); }
        .tracker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-sm); }
        .tracker-name { font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .tracker-pct { font-size: 11px; font-family: var(--font-mono); font-weight: 600; }
        .tracker-bar-bg { width: 100%; height: 6px; background: var(--border); border-radius: 3px; position: relative; margin-bottom: var(--space-xs); }
        .tracker-fill { height: 100%; border-radius: 3px; position: absolute; left: 0; top: 0; }
        .tracker-target { font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; font-weight: 500; }

        /* ===== EVOLUCIÓN POR ACTIVO (toggle + leyenda) ===== */
        .card-title-row { display: flex; justify-content: space-between; align-items: center; }
        .chart-toggle { display: flex; gap: 4px; }
        .toggle-btn {
            background: var(--bg-alt);
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1.2;
        }
        .toggle-btn.active { background: var(--main); color: var(--bg); border-color: var(--main); }
        .chart-legend { display: flex; flex-wrap: wrap; gap: var(--space-md); margin-bottom: var(--space-md); }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
        .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; flex-shrink: 0; }

        /* ===== RESPONSIVE ARCHITECTURE ===== */
        @media (max-width: 1024px) {
            .hero-grid { grid-template-columns: 1.8fr 1fr 1fr; }
            .tracker-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .nav-container { padding: var(--gap) 0; }
            .site-header { margin-bottom: var(--space-md); }
            .nav-pills { width: 100%; flex-wrap: wrap; }
            .nav-link { flex: 1; text-align: center; font-size: 11px; padding: var(--space-sm); }

            /* Mobile: Patrimonio a la izquierda (alto), P&L € arriba-dcha y P&L % abajo-dcha */
            .hero-grid {
                grid-template-columns: 1.4fr 1fr;
                grid-template-rows: auto auto;
                gap: var(--gap);
            }
            .hero-main {
                grid-column: 1;
                grid-row: 1 / span 2;
                padding: var(--space-md);
                justify-content: flex-start;
            }
            .hero-main .hero-value {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .hero-grid > .kpi-box:nth-child(2) { grid-column: 2; grid-row: 1; padding: var(--space-sm) var(--space-md); }
            .hero-grid > .kpi-box:nth-child(3) { grid-column: 2; grid-row: 2; padding: var(--space-sm) var(--space-md); }
            .kpi-label { margin-bottom: var(--space-xs); }

            .hero-value { font-size: 36px; }
            .kpi-val { font-size: 18px; }

            .viz-grid { grid-template-columns: 1fr; }
            .tracker-grid { grid-template-columns: 1fr; }
            .col-hide-mobile { display: none; }
        }
    </style>
</head>
<body>

<header class="nav-container site-header">
    <div class="container">
        <nav class="nav-pills">
            <a href="cartera.html" class="nav-link">Cartera</a>
            <a href="calc-tp-sl.html" class="nav-link">Calc</a>
            <a href="hoja-de-ruta.html" class="nav-link">Roadmap</a>
           <a href="kids/nakabanco/naka-banco.html" class="nav-link">Banco</a>
        </nav>
    </div>
</header>

<main class="container">
    <div class="section-header">
        <h1>Core Financiero</h1>
        <div class="status-text" id="status-text">Sincronizando...</div>
    </div>

    <div class="hero-grid">
        <div class="card hero-main">
            <h2>Patrimonio Neto</h2>
            <div class="hero-value" id="k-tot">--</div>
        </div>
        <div class="card kpi-box">
            <div class="kpi-label">P&amp;L &euro;</div>
            <div class="kpi-val" id="k-pnl-eur">--</div>
        </div>
        <div class="card kpi-box">
            <div class="kpi-label">P&amp;L %</div>
            <div class="kpi-val" id="k-pnl-pct">--</div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Evolución Histórica</div>
        <div class="scroll-wrapper" id="chartScroll">
            <div class="chart-container-dynamic" id="chartContainer">
                <canvas id="c-line"></canvas>
            </div>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Activo</th>
                    <th class="col-hide-mobile">Clase</th>
                    <th class="num">Capital</th>
                    <th class="num">Peso</th>
                    <th class="num col-hide-mobile">Objetivo</th>
                    <th class="num">Rend.</th>
                </tr>
            </thead>
            <tbody id="t-body"></tbody>
        </table>
    </div>

    <div class="card">
        <div class="card-title card-title-row">
            <span>Evolución por Activo</span>
            <div class="chart-toggle" id="evo-toggle">
                <button class="toggle-btn active" data-mode="abs" type="button">€</button>
                <button class="toggle-btn" data-mode="pct" type="button">%</button>
            </div>
        </div>
        <div class="chart-legend" id="assets-legend"></div>
        <div class="scroll-wrapper" id="chartScrollAssets">
            <div class="chart-container-dynamic" id="chartContainerAssets">
                <canvas id="c-line-assets"></canvas>
            </div>
        </div>
    </div>

    <div class="viz-grid">
        <div class="card">
            <div class="card-title">Distribución</div>
            <div class="canvas-container"><canvas id="c-donut"></canvas></div>
        </div>
        <div class="card">
            <div class="card-title">Rendimiento</div>
            <div class="canvas-bar"><canvas id="c-bar"></canvas></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Alineación vs Objetivos</div>
        <div class="tracker-grid" id="tracker-grid"></div>
    </div>
</main>

<footer class="nav-container site-footer">
    <div class="container">
        <nav class="nav-pills">
            <a href="cartera.html" class="nav-link">Cartera</a>
            <a href="calc-tp-sl.html" class="nav-link">Calc</a>
            <a href="hoja-de-ruta.html" class="nav-link">Roadmap</a>
            <a href="kids/nakabanco/naka-banco.html" class="nav-link">Banco</a>
        </nav>
    </div>
</footer>

<script>
    const URL_APP = "https://script.google.com/macros/s/AKfycbzTm3AzkRmWxyY_USwkw9UC7QMnhb_WVzLYPSU3ZXsJzH6fmPlhsgYW0M5yKDNXdZKZtg/exec";
    
    // Objetivos del núcleo DCA. Base 60/20/10/5/5(Trade); quitado Trade y rebalanceado
    // proporcionalmente al 100% (método del mayor resto). Cambia solo estos números si quieres.
    const CONFIG = {
        Liquidez:  { label: 'Fondo de Liquidez', target: 0 },
        Indexados: { label: 'Núcleo', target: 63 },
        Acciones:  { label: 'Inversiones', target: 21 },
        Oro:       { label: 'Refugio', target: 11 },
        Crypto:    { label: 'Independencia', target: 5 }
    };

    // Obtenemos los colores calculados por CSS en tiempo real
    const getVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    const isLight = () => window.matchMedia('(prefers-color-scheme: light)').matches;

    const fmtMoney = (n) => new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);
    const fmtPct = (n) => n.toFixed(1) + '%';
    const fmtDate = (iso) => {
        const d = new Date(iso);
        return isNaN(d.getTime()) ? iso : `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}`;
    };

    let rawData = [];
    let evoMode = 'abs'; // 'abs' = € absoluto · 'pct' = crecimiento % base 100
    let charts = { donut: null, bar: null, line: null, lineAssets: null };

    // Red de seguridad: detecta si los rendimientos vienen como fracción (0,091) o entero (9,1).
    // Si el máximo |rend| de todo el histórico es <= 1.5, son fracciones -> escala x100.
    function detectRendScale(data) {
        const assets = ['Indexados', 'Acciones', 'Oro', 'Crypto'];
        let maxAbs = 0;
        data.forEach(row => assets.forEach(a => {
            const r = Math.abs(parseFloat(row[a + '_Rend']) || 0);
            if (r > maxAbs) maxAbs = r;
        }));
        return (maxAbs > 0 && maxAbs <= 1.5) ? 100 : 1;
    }

    // Escucha de cambio de tema (Dark/Light) en tiempo real
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
        if (rawData.length > 0) render(rawData);
    });

    async function init() {
        const status = document.getElementById("status-text");
        const cached = localStorage.getItem('finanzas_cache_v10');
        if (cached) { rawData = JSON.parse(cached); render(rawData); }

        try {
            const res = await fetch(URL_APP);
            const data = await res.json();
            if(data && data.length > 0) {
                rawData = data;
                localStorage.setItem('finanzas_cache_v10', JSON.stringify(data));
                render(data);
                status.innerText = `Cierre actual: ${fmtDate(data[data.length-1].Mes)}`;
            }
        } catch(e) { status.innerText = "Modo Offline"; }
    }

    function render(data) {
        const curr = data[data.length - 1];
        const assets = ['Indexados', 'Acciones', 'Oro', 'Crypto'];
        const rendScale = detectRendScale(data);
        
        let invT = 0; assets.forEach(a => invT += parseFloat(curr[a + '_Cap']) || 0);
        const liq = parseFloat(curr.Liquidez) || 0;
        const total = liq + invT;

        // P&L totales actuales (último mes) desde el JSON: PnL_Eur (col N) y PnL_Pct (col O)
        const pnlEur = parseFloat(curr.PnL_Eur) || 0;
        const pnlPct = (parseFloat(curr.PnL_Pct) || 0) * rendScale;

        document.getElementById('k-tot').innerText = fmtMoney(total);

        const eurEl = document.getElementById('k-pnl-eur');
        eurEl.innerText = `${pnlEur >= 0 ? '+' : ''}${fmtMoney(pnlEur)}`;
        eurEl.className = `kpi-val ${pnlEur > 0 ? 'positive' : pnlEur < 0 ? 'negative' : 'neutral'}`;

        const pctEl = document.getElementById('k-pnl-pct');
        pctEl.innerText = `${pnlPct >= 0 ? '+' : ''}${fmtPct(pnlPct)}`;
        pctEl.className = `kpi-val ${pnlPct > 0 ? 'positive' : pnlPct < 0 ? 'negative' : 'neutral'}`;

        const tbody = document.getElementById('t-body');
        tbody.innerHTML = `<tr>
            <td><span class="tag" style="background:${getVar('--gray')}33;color:${getVar('--gray')}">Liquidez</span></td>
            <td class="col-hide-mobile" style="color:var(--muted)">Fondo de Liquidez</td>
            <td class="num" style="color:${getVar('--gray')}">${fmtMoney(liq)}</td><td class="num">--</td><td class="num col-hide-mobile">--</td>
            <td class="num" style="color:var(--muted)">0.0%</td>
        </tr>`;

        assets.forEach(a => {
            const cap = parseFloat(curr[a+'_Cap']) || 0;
            const rend = (parseFloat(curr[a+'_Rend']) || 0) * rendScale;
            const pct = invT > 0 ? (cap/invT)*100 : 0;
            const color = getVar(`--${a.toLowerCase() === 'indexados' ? 'blue' : a.toLowerCase() === 'acciones' ? 'purple' : a.toLowerCase() === 'oro' ? 'orange' : a.toLowerCase() === 'crypto' ? 'green' : 'teal'}`);
            
            tbody.innerHTML += `<tr>
                <td><span class="tag" style="background:${color}33;color:${color}">${a}</span></td>
                <td class="col-hide-mobile" style="color:var(--muted)">${CONFIG[a].label}</td>
                <td class="num" style="color:${color}">${fmtMoney(cap)}</td>
                <td class="num">${fmtPct(pct)}</td>
                <td class="num col-hide-mobile" style="color:var(--muted)">${fmtPct(CONFIG[a].target)}</td>
                <td class="num" style="color:${rend>=0? getVar('--green'):getVar('--red')}">${rend>0?'+':''}${fmtPct(rend)}</td>
            </tr>`;
        });

        document.getElementById('tracker-grid').innerHTML = assets.map(a => {
            const cap = parseFloat(curr[a+'_Cap']) || 0;
            const pct = invT > 0 ? (cap/invT)*100 : 0;
            const target = CONFIG[a].target;
            const isOver = pct > target;
            const fill = target > 0 ? Math.min((pct/target)*100, 100) : 0;
            const color = getVar(`--${a.toLowerCase() === 'indexados' ? 'blue' : a.toLowerCase() === 'acciones' ? 'purple' : a.toLowerCase() === 'oro' ? 'orange' : a.toLowerCase() === 'crypto' ? 'green' : 'teal'}`);
            
            return `<div class="tracker-item">
                <div class="tracker-header">
                    <span class="tracker-name" style="color:${color}">${a}</span>
                    <span class="tracker-pct" style="color:${isOver?getVar('--red'):getVar('--main')}">${pct.toFixed(1)}%</span>
                </div>
                <div class="tracker-bar-bg">
                    <div class="tracker-fill" style="width:${fill}%;background:${isOver?getVar('--red'):color}"></div>
                </div>
                <div class="tracker-target">
                    <span>Obj: ${target}%</span>
                    <span>${isOver?'Excedido':''}</span>
                </div>
            </div>`;
        }).join('');

        draw(data, curr, assets, invT, total, liq, rendScale);
    }

    function draw(all, curr, assets, invT, total, liq, rendScale) {
        Chart.register(ChartDataLabels);
        const fM = { family: "'JetBrains Mono'", size: 10, weight: 500 };
        const textMain = getVar('--main');
        const textMuted = getVar('--muted');
        const gridLine = getVar('--grid-color');

        const getChartColor = (asset) => {
            if (asset === 'Liquidez') return getVar('--gray');
            if (asset === 'Indexados') return getVar('--blue');
            if (asset === 'Acciones') return getVar('--purple');
            if (asset === 'Oro') return getVar('--orange');
            if (asset === 'Crypto') return getVar('--green');
            if (asset === 'Trading') return getVar('--teal');
        };

        if(charts.line) charts.line.destroy();
        const container = document.getElementById('chartContainer');
        if(container) container.style.width = Math.max(100, all.length * 15) + '%'; 

        charts.line = new Chart(document.getElementById('c-line'), {
            type: 'line',
            data: {
                labels: all.map(d => fmtDate(d.Mes)),
                datasets: [{
                    data: all.map(d => {
                        let t = parseFloat(d.Liquidez)||0;
                        assets.forEach(a => t += parseFloat(d[a+'_Cap'])||0);
                        return t;
                    }),
                    borderColor: textMain, borderWidth: 1.5, fill: true, 
                    backgroundColor: isLight() ? 'rgba(0,0,0,0.02)' : 'rgba(255,255,255,0.02)', 
                    tension: 0.4, pointRadius: 2, pointBackgroundColor: textMain
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, events: [],
                plugins: {
                    legend: { display: false },
                    datalabels: { align: 'top', offset: 8, color: textMuted, backgroundColor: isLight() ? '#ffffff' : '#0a0a0a', padding: 2, formatter: (v) => (v/1000).toFixed(1)+'k', font: { ...fM, size: 9 } }
                },
                scales: {
                    y: { position: 'right', grid: { color: gridLine }, ticks: { color: textMuted, font: fM, callback: v => v/1000+'k' } },
                    x: { grid: { display: false }, ticks: { color: textMuted, font: fM } }
                }
            }
        });
        const scroll = document.getElementById('chartScroll'); scroll.scrollLeft = scroll.scrollWidth;

        drawAssetsEvolution(all);

        if(charts.donut) charts.donut.destroy();
        const donutLabels = ['Liquidez', ...assets];
        const donutData = [liq, ...assets.map(a => parseFloat(curr[a+'_Cap'])||0)];
        const donutColors = donutLabels.map(getChartColor);

        charts.donut = new Chart(document.getElementById('c-donut'), {
            type: 'doughnut', 
            data: { 
                labels: donutLabels, 
                datasets: [{ data: donutData, backgroundColor: donutColors, borderWidth: 0 }]
            },
            options: { 
                responsive: true, maintainAspectRatio: false, cutout: '50%', layout: { padding: 35 }, events: [],
                plugins: { 
                    legend: { display: false }, 
                    datalabels: { 
                        color: textMain, align: 'end', anchor: 'end', 
                        font: { size: 10, family: 'JetBrains Mono' }, 
                        formatter: (v, ctx) => v > 0 ? `${donutLabels[ctx.dataIndex]}\n${fmtPct((v/total)*100)}` : '' 
                    }
                }
            }
        });

        if(charts.bar) charts.bar.destroy();
        // Media del rendimiento de cada activo SOLO sobre los meses en que estuvo invertido (cap>0).
        const avgRend = (a) => {
            let sum = 0, n = 0;
            all.forEach(d => {
                if ((parseFloat(d[a+'_Cap'])||0) > 0) { sum += (parseFloat(d[a+'_Rend'])||0); n++; }
            });
            return n > 0 ? +(((sum/n) * rendScale).toFixed(2)) : 0;
        };
        // Media del P&L % total (col O) sobre todos los meses con cartera (Total_In>0).
        const avgTotal = () => {
            let sum = 0, n = 0;
            all.forEach(d => {
                if ((parseFloat(d.Total_In)||0) > 0) { sum += (parseFloat(d.PnL_Pct)||0); n++; }
            });
            return n > 0 ? +(((sum/n) * rendScale).toFixed(2)) : 0;
        };
        const barLabels = [...assets, 'Total'];
        const rs = [...assets.map(avgRend), avgTotal()];
        charts.bar = new Chart(document.getElementById('c-bar'), {
            type: 'bar', 
            data: { 
                labels: barLabels, 
                datasets: [{ 
                    data: rs, 
                    backgroundColor: rs.map(r => r >= 0 ? getVar('--green') : getVar('--red')), 
                    borderRadius: 4,
                    categoryPercentage: 1,
                    barPercentage: 0.62
                }]
            },
            options: { 
                indexAxis: 'y', responsive: true, maintainAspectRatio: false, events: [],
                layout: { padding: { left: 0, right: 44, top: 6, bottom: 6 } },
                plugins: { 
                    legend: { display: false }, 
                    datalabels: { 
                        anchor: 'end', align: 'right', 
                        color: (ctx) => ctx.dataset.data[ctx.dataIndex] >= 0 ? getVar('--green') : getVar('--red'), 
                        formatter: v => (v>0?'+':'')+v+'%', font: fM 
                    }
                },
                scales: { 
                    x: { grid: { display: false }, ticks: { display: false }, suggestedMax: Math.max(...rs)+3, border: { display: false } }, 
                    y: { grid: { display: false }, ticks: { color: textMuted, font: fM, padding: 4 }, border: { display: false } }
                }
            }
        });
    }
    function drawAssetsEvolution(all) {
        Chart.register(ChartDataLabels);
        const mode = evoMode; // congelamos el modo de este render (evita lecturas diferidas)
        const fM = { family: "'JetBrains Mono'", size: 10, weight: 500 };
        const textMuted = getVar('--muted');
        const gridLine = getVar('--grid-color');

        // Núcleo DCA: todo menos Trading. Cada activo conoce su capital (€) y su rendimiento (%).
        const rendScale = detectRendScale(all);
        const core = [
            { key: 'Liquidez',  cap: d => parseFloat(d.Liquidez)||0,      rend: () => 0,                              color: getVar('--gray')   },
            { key: 'Indexados', cap: d => parseFloat(d.Indexados_Cap)||0, rend: d => parseFloat(d.Indexados_Rend)||0, color: getVar('--blue')   },
            { key: 'Acciones',  cap: d => parseFloat(d.Acciones_Cap)||0,  rend: d => parseFloat(d.Acciones_Rend)||0,  color: getVar('--purple') },
            { key: 'Oro',       cap: d => parseFloat(d.Oro_Cap)||0,       rend: d => parseFloat(d.Oro_Rend)||0,       color: getVar('--orange') },
            { key: 'Crypto',    cap: d => parseFloat(d.Crypto_Cap)||0,    rend: d => parseFloat(d.Crypto_Rend)||0,    color: getVar('--green')  }
        ];

        // Leyenda HTML estática (no scrollea con la gráfica, se reconstruye por tema)
        document.getElementById('assets-legend').innerHTML = core.map(s =>
            `<span class="legend-item"><span class="legend-dot" style="background:${s.color}"></span>${s.key}</span>`
        ).join('');

        const datasets = core.map(s => {
            let vals;
            if (mode === 'pct') {
                // % = rendimiento real del activo cada mes (solo cuando hay posición; antes arrastraba el DCA)
                vals = all.map(d => s.cap(d) > 0 ? +((s.rend(d) * rendScale).toFixed(2)) : null);
            } else {
                // € = capital absoluto
                vals = all.map(s.cap);
            }
            return {
                label: s.key, data: vals,
                borderColor: s.color, backgroundColor: s.color,
                borderWidth: 1.5, fill: false, tension: 0.4,
                pointRadius: 2, pointBackgroundColor: s.color, spanGaps: true
            };
        });

        if (charts.lineAssets) charts.lineAssets.destroy();
        const container = document.getElementById('chartContainerAssets');
        if (container) container.style.width = Math.max(100, all.length * 15) + '%';

        charts.lineAssets = new Chart(document.getElementById('c-line-assets'), {
            type: 'line',
            data: { labels: all.map(d => fmtDate(d.Mes)), datasets },
            options: {
                responsive: true, maintainAspectRatio: false, events: [],
                plugins: {
                    legend: { display: false },
                    datalabels: { display: false }
                },
                scales: {
                    y: {
                        position: 'right', grid: { color: gridLine },
                        ticks: { color: textMuted, font: fM,
                            callback: v => mode === 'pct' ? v + '%' : v / 1000 + 'k' }
                    },
                    x: { grid: { display: false }, ticks: { color: textMuted, font: fM } }
                }
            }
        });
        const sc = document.getElementById('chartScrollAssets'); sc.scrollLeft = sc.scrollWidth;
    }

    document.querySelectorAll('#evo-toggle .toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            evoMode = btn.dataset.mode;
            document.querySelectorAll('#evo-toggle .toggle-btn').forEach(b => b.classList.toggle('active', b === btn));
            if (rawData.length > 0) drawAssetsEvolution(rawData);
        });
    });

    init();
</script>
</body>
</html>
