<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- iOS PWA / Fullscreen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wallet">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">

<title>Wallet | CHENSIO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  --bg-base: #000000;
  --bg-card: #111111;
  --bg-hover: #1c1c1e;
  --border: #2c2c2e;
  --border-light: #38383a;
  --text-main: #f5f5f7;
  --text-muted: #86868b;
  --text-dim: #48484a;
  --blue: #0a84ff;
  --green: #30d158;
  --amber: #ff9f0a;
  --red: #ff453a;
  --purple: #bf5af2;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

@media (prefers-color-scheme: light) {
  :root {
    --bg-base: #f2f2f7;
    --bg-card: #ffffff;
    --bg-hover: #f4f5f7;
    --border: #d1d1d6;
    --border-light: #e5e5ea;
    --text-main: #1c1c1e;
    --text-muted: #6e6e73;
    --text-dim: #aeaeae;
    --blue: #007aff;
    --green: #34c759;
    --amber: #ff9500;
    --red: #ff3b30;
    --purple: #af52de;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }

body {
  font-family: var(--font-sans);
  background: var(--bg-base);
  color: var(--text-main);
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  /* Fix: prevent layout shift on input focus in iOS */
  height: 100%;
  overflow-y: scroll;
  -webkit-overflow-scrolling: touch;
  padding-top: calc(var(--safe-top) + 12px);
  padding-bottom: calc(var(--safe-bottom) + 20px);
  padding-left: 12px;
  padding-right: 12px;
}

.container {
  max-width: 620px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── HEADER ── */
.header-container {
  display: grid;
  grid-template-columns: 70px 1fr 70px;
  align-items: center;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.header-container h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.03em;
  text-align: center;
}
.btn-volver {
  background: var(--bg-hover);
  color: var(--text-main);
  text-decoration: none;
  padding: 5px 10px;
  border-radius: 7px;
  font-weight: 600;
  font-size: 11px;
  border: 1px solid var(--border-light);
  text-align: center;
  display: inline-block;
}
#syncStatus {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 500;
  text-align: right;
  white-space: nowrap;
  justify-self: end;
}

/* ── CARDS ── */
.card {
  background: var(--bg-card);
  border-radius: 14px;
  padding: 14px;
  border: 1px solid var(--border);
}

.card-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* ── CAPITAL & DCA ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-box {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-hover);
  border: 1px solid var(--border-light);
  padding: 0 14px;
  border-radius: 10px;
  height: 48px;
}
.stat-box label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

/* Fix: iOS input zoom prevention — font-size must be ≥ 16px on mobile */
.stat-box input {
  text-align: right;
  font-size: 16px;
  width: 100px;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-main);
  font-weight: 700;
  font-family: var(--font-mono);
  /* Prevent zoom on focus */
  touch-action: manipulation;
}
.stat-box input#dcaInput { color: var(--text-main); }

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }

/* ── BRÚJULA DE CARTERA ── */
.brujula-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
}
.brujula-type {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.03em;
  text-transform: uppercase;
  line-height: 1;
}
.brujula-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}
.brujula-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 10px;
}

/* Spectrum bar */
.spectrum-wrap { margin: 10px 0 4px; }
.spectrum-label-row {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.spectrum-bar {
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(to right, var(--blue), var(--green), var(--amber), var(--red));
  position: relative;
}
.spectrum-cursor {
  position: absolute;
  top: -4px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--text-main);
  border: 2px solid var(--bg-card);
  transform: translateX(-50%);
  transition: left 0.4s ease;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

.profiles-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 10px;
}
.profile-pill {
  text-align: center;
  padding: 5px 4px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--bg-hover);
  cursor: default;
  transition: 0.2s;
}
.profile-pill.active {
  border-color: currentColor;
}
.profile-pill .p-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
.profile-pill .p-range { font-size: 9px; color: var(--text-muted); margin-top: 1px; }

/* ── DRAG & DROP ── */
.asset-row.dragging { opacity: 0.35; background: var(--bg-hover); }
.tier-block.drag-target { box-shadow: 0 0 0 2px var(--blue); border-color: var(--blue); }
.drag-handle {
  cursor: grab;
  color: var(--text-dim);
  font-size: 13px;
  padding: 0 2px;
  user-select: none;
  touch-action: none;
  flex-shrink: 0;
}
.drag-handle:active { cursor: grabbing; }

/* ── PERF BADGE ── */
.perf-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--font-mono);
  padding: 2px 6px;
  border-radius: 5px;
  white-space: nowrap;
}
.perf-up   { background: rgba(48,209,88,0.12);  color: var(--green); }
.perf-down { background: rgba(255,69,58,0.12);  color: var(--red);   }
.perf-flat { background: var(--bg-hover);        color: var(--text-muted); }

.analyzer-warn {
  background: rgba(255,69,58,0.1);
  border: 1px solid rgba(255,69,58,0.3);
  color: var(--red);
  padding: 8px 10px;
  border-radius: 8px;
  margin-top: 8px;
  font-size: 11px;
  font-weight: 600;
  line-height: 1.4;
}

/* ── TIERS ── */
.tier-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 10px;
  /* color accent on both sides — set via inline style for left, right via box-shadow */
}
.tier-block:last-child { margin-bottom: 0; }

.tier-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: var(--bg-hover);
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.tier-header h2 {
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 0;
}
.tier-header h2 .tier-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tier-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.tier-amounts { text-align: right; }
.tier-eur { font-size: 13px; font-weight: 600; font-family: var(--font-mono); }
.tier-dca { font-size: 10px; font-family: var(--font-mono); margin-top: 1px; }

.tier-pct-box {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--bg-card);
  padding: 0 8px;
  border-radius: 7px;
  border: 1px solid var(--border-light);
  height: 32px;
}
.tier-pct-box input {
  width: 36px;
  text-align: right;
  background: transparent;
  border: none;
  color: var(--text-main);
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font-mono);
  outline: none;
  touch-action: manipulation;
  /* Prevent iOS zoom */
  font-size: max(16px, 14px);
}
.tier-pct-box span { font-size: 11px; color: var(--text-muted); font-weight: 600; }

/* ── ASSET ROWS ── */
.asset-list { padding: 2px 10px; }

.asset-row {
  display: grid;
  grid-template-columns: 18px 62px 60px 1fr auto;
  align-items: center;
  gap: 6px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  cursor: default;
}
.asset-row:last-child { border-bottom: none; }

/* Inputs — font-size ≥ 16px prevents iOS zoom */
.a-input, .a-select {
  background: var(--bg-hover);
  border: 1px solid var(--border-light);
  color: var(--text-main);
  font-family: var(--font-sans);
  font-size: 16px;
  height: 36px;
  border-radius: 7px;
  outline: none;
  padding: 0 8px;
  width: 100%;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
}
.a-select {
  font-size: 11px;
  color: var(--text-muted);
  padding: 0 4px;
}
.a-input:focus, .a-select:focus { border-color: var(--blue); }
.a-input.mono {
  font-family: var(--font-mono);
  font-weight: 700;
  text-transform: uppercase;
  text-align: center;
  font-size: 13px;
  letter-spacing: 0.02em;
}

.a-pct-box {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--bg-hover);
  border: 1px solid var(--border-light);
  border-radius: 7px;
  padding: 0 6px;
  height: 36px;
}
.a-pct-box input {
  width: 32px;
  text-align: right;
  background: transparent;
  border: none;
  color: var(--text-main);
  font-size: 13px;
  font-family: var(--font-mono);
  font-weight: 600;
  outline: none;
  touch-action: manipulation;
  font-size: max(16px, 13px);
}
.a-pct-box span { font-size: 10px; color: var(--text-muted); font-weight: 700; }

.a-financial {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
}
.a-right {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 6px;
}
.a-eur {
  font-size: 16px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--text-main);
  letter-spacing: -0.02em;
  white-space: nowrap;
}
.a-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}
.a-dca { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); }

.semaforo {
  font-size: 8px;
  font-weight: 700;
  padding: 2px 5px;
  border-radius: 4px;
  text-transform: uppercase;
  white-space: nowrap;
  display: inline-block;
  letter-spacing: 0.03em;
}
.sem-bien { background: rgba(48,209,88,0.15); color: var(--green); }
.sem-mbien { background: rgba(10,132,255,0.15); color: var(--blue); }
.sem-normal { background: rgba(134,134,139,0.15); color: var(--text-muted); }
.sem-mmal { background: rgba(255,159,10,0.15); color: var(--amber); }
.sem-mal { background: rgba(255,69,58,0.15); color: var(--red); }

.btn-add {
  width: 100%;
  padding: 8px;
  background: none;
  border: none;
  color: var(--blue);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-top: 1px solid var(--border);
  touch-action: manipulation;
}

/* ── BOTTOM GRID ── */
.grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: stretch; }

.chart-wrap { position: relative; height: 130px; display: flex; justify-content: center; }

#sectorList { display: flex; flex-direction: column; gap: 8px; }

/* ── QUANTS ── */
.q-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.q-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: var(--bg-hover);
  border-radius: 8px;
  border: 1px solid var(--border);
  gap: 6px;
}
.q-lbl { font-size: 11px; color: var(--text-muted); font-weight: 500; line-height: 1.3; }
.q-val { font-size: 15px; font-weight: 600; font-family: var(--font-mono); }
.q-right { text-align: right; flex-shrink: 0; }

/* ── MOBILE ── */
@media (max-width: 580px) {
  .grid-2col { grid-template-columns: 1fr; }
  .q-list { grid-template-columns: 1fr; }
  .profiles-grid { grid-template-columns: repeat(3, 1fr); }

  /* Asset row en mobile: 2 líneas */
  .asset-row {
    grid-template-columns: 18px 56px 52px 1fr;
    grid-template-rows: auto auto;
    padding: 8px 0;
    gap: 5px;
  }
  .asset-row .drag-handle { grid-column: 1; grid-row: 1; }
  .asset-row .a-input.mono { grid-column: 2; grid-row: 1; }
  .asset-row .a-pct-box { grid-column: 3; grid-row: 1; }
  .asset-row .a-select { grid-column: 4; grid-row: 1; font-size: 13px; }
  .asset-row .a-financial {
    grid-column: 1 / span 4;
    grid-row: 2;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-hover);
    padding: 5px 10px;
    border-radius: 6px;
  }
  .asset-row .a-meta { align-items: flex-start; }
  .asset-row .a-right { flex-direction: row; align-items: center; gap: 6px; }
  .asset-row .a-eur { font-size: 15px; }
}
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header-container">
    <a href="https://casencio.github.io/trading-roadmap/" class="btn-volver">← Volver</a>
    <h1>Wallet</h1>
    <div id="syncStatus">Cargando…</div>
  </div>

  <!-- CAPITAL & DCA -->
  <div class="stat-grid">
    <div class="stat-box">
      <label>Capital</label>
      <input type="number" id="capitalInput" value="10000" step="100" inputmode="decimal">
    </div>
    <div class="stat-box">
      <label>DCA / mes</label>
      <input type="number" id="dcaInput" value="500" step="50" inputmode="decimal">
    </div>
  </div>

  <!-- TIERS -->
  <div id="tiersContainer"></div>

  <!-- BRÚJULA -->
  <div class="card">
    <div class="card-title">Brújula de Cartera</div>
    <div class="brujula-header">
      <div class="brujula-type" id="recap-typology">—</div>
      <div class="brujula-badge" id="recap-badge"></div>
    </div>
    <div class="brujula-desc" id="recap-desc">—</div>

    <div class="spectrum-wrap">
      <div class="spectrum-label-row">
        <span>Conservadora</span>
        <span>Moderada</span>
        <span>Agresiva</span>
      </div>
      <div class="spectrum-bar">
        <div class="spectrum-cursor" id="spectrumCursor" style="left: 50%"></div>
      </div>
    </div>

    <div class="profiles-grid" id="profilesGrid"></div>
    <div class="analyzer-warn" id="recap-warn" style="display:none;"></div>
  </div>

  <!-- MACRO + SECTORES -->
  <div class="grid-2col">
    <div class="card">
      <div class="card-title">Macrolocalización</div>
      <div class="chart-wrap"><canvas id="tierChart"></canvas></div>
      <div id="customLegend" style="display:flex; flex-direction:column; gap:5px; margin-top:10px;"></div>
    </div>
    <div class="card" style="display:flex; flex-direction:column;">
      <div class="card-title">Distribución Sectorial</div>
      <div id="sectorList" style="flex:1; display:flex; flex-direction:column; justify-content:space-between; gap:0;"></div>
    </div>
  </div>

  <!-- QUANTS -->
  <div class="card">
    <div class="card-title">Riesgo Esperado & Estructura</div>
    <div class="q-list">
      <div class="q-item">
        <div class="q-lbl">Volatilidad Anual</div>
        <div class="q-right">
          <div class="q-val" id="q-vol">—</div>
          <div class="semaforo" id="sem-vol" style="margin-top:3px;"></div>
        </div>
      </div>
      <div class="q-item">
        <div class="q-lbl">Caída Máxima Est.</div>
        <div class="q-right">
          <div class="q-val" id="q-mdd">—</div>
          <div class="semaforo" id="sem-dd" style="margin-top:3px;"></div>
        </div>
      </div>
      <div class="q-item">
        <div class="q-lbl">Correlación Interna</div>
        <div class="q-right">
          <div class="q-val" id="q-cor">—</div>
          <div class="semaforo" id="sem-cor" style="margin-top:3px;"></div>
        </div>
      </div>
      <div class="q-item">
        <div class="q-lbl">CAGR Esperado</div>
        <div class="q-right">
          <div class="q-val" id="q-cagr">—</div>
          <div class="semaforo sem-mbien" style="margin-top:3px;">Estimado</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script>
// =============================================
// SECTOR DATA
// =============================================
const SECTOR_DATA = {
  "Quality (Alto ROIC)":        { v: 0.18, a: 0.015, b: 0.90, c: 0.55 },
  "Growth (>20% revenue)":      { v: 0.32, a: 0.025, b: 1.30, c: 0.80 },
  "Semiconductores / Hardware": { v: 0.38, a: 0.035, b: 1.60, c: 0.85 },
  "Software / Cloud SaaS":      { v: 0.30, a: 0.025, b: 1.40, c: 0.80 },
  "Energía / Infraestructura":  { v: 0.22, a: 0.010, b: 0.80, c: 0.30 },
  "Pagos / Finanzas":           { v: 0.20, a: 0.012, b: 0.85, c: 0.45 },
  "Salud / Biotech":            { v: 0.28, a: 0.020, b: 1.10, c: 0.35 },
  "Consumo / Retail":           { v: 0.22, a: 0.010, b: 0.95, c: 0.50 },
  "Bitcoin / Cripto":           { v: 0.65, a: 0.050, b: 2.20, c: 0.20 },
  "Oro / Commodities":          { v: 0.15, a: 0.005, b: 0.40, c: 0.10 },
  "Indexado / ETF Global":      { v: 0.16, a: 0.008, b: 0.95, c: 0.70 },
  "Especulativo / Small Cap":   { v: 0.50, a: 0.040, b: 1.80, c: 0.60 },
  "Otros":                      { v: 0.20, a: 0.005, b: 1.00, c: 0.60 }
};
const SECTORS = Object.keys(SECTOR_DATA);

// =============================================
// PORTFOLIO PROFILE TYPOLOGIES
// Based on Fidelity / Schwab / institutional standards
// =============================================
const TYPOLOGIES = [
  {
    id: "muy-conservadora",
    label: "Muy Conservadora",
    short: "Muy Cons.",
    color: "#5e5ce6",
    riskScore: [0, 15],
    description: "Capital preservation first. Mínima exposición a activos volátiles. Adecuada para horizontes cortos o aversión extrema al riesgo.",
    criteria: (s) => s <= 15
  },
  {
    id: "conservadora",
    label: "Conservadora",
    short: "Conserv.",
    color: "#0a84ff",
    riskScore: [15, 30],
    description: "Prioridad a la estabilidad con algo de crecimiento. Típico en perfiles cercanos a la jubilación o con baja tolerancia a caídas.",
    criteria: (s) => s > 15 && s <= 30
  },
  {
    id: "moderada",
    label: "Moderada",
    short: "Moderada",
    color: "#30d158",
    riskScore: [30, 50],
    description: "Balance entre crecimiento y protección. Tolera caídas temporales a cambio de retornos superiores a largo plazo.",
    criteria: (s) => s > 30 && s <= 50
  },
  {
    id: "growth",
    label: "Growth",
    short: "Growth",
    color: "#ff9f0a",
    riskScore: [50, 70],
    description: "Orientada al crecimiento con capacidad de aguantar volatilidad significativa. Perfil típico de inversor de 35-50 años con horizonte largo.",
    criteria: (s) => s > 50 && s <= 70
  },
  {
    id: "agresiva",
    label: "Agresiva",

    riskScore: [70, 88],

    criteria: (s) => s > 70 && s <= 88
  },
  {

    label: "Especulativa",

    riskScore: [88, 100],

    criteria: (s) => s > 88
  }
];

// =============================================
// STATE
// =============================================
let state = { capital: 10000, dca: 500, tiers: [] };
let tierChartInstance = null;
let saveTimeout = null;
let isInitialLoad = true;

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxlj_Inxx7hDGp6FTSZwRNTmbfOPw7jFDPseim7hcpBIuyJ1wCeQEuvKOFyd_3iD6_tA/exec';
const CACHE_KEY = 'cartera_cache_v2';
const TIER_COLORS = ['#0a84ff', '#30d158', '#ff9f0a', '#ff453a', '#bf5af2', '#5e5ce6'];

// =============================================
// UTILS
// =============================================
const fmt = (n) => new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);

function getSem(val, thresholds) {
  if (val > thresholds[3]) return { s: "CRÍTICO", c: "sem-mal" };
  if (val > thresholds[2]) return { s: "SUBÓPTIMO", c: "sem-mmal" };
  if (val > thresholds[1]) return { s: "ADECUADO", c: "sem-normal" };
  if (val > thresholds[0]) return { s: "FAVORABLE", c: "sem-mbien" };
  return { s: "ÓPTIMO", c: "sem-bien" };
}

function getAssetSemaforo(eur) {
  if (eur <= 0) return null;
  if (eur < 50) return { t: "CRÍTICO", c: "sem-mal" };
  if (eur < 100) return { t: "SUBÓPTIMO", c: "sem-mmal" };
  if (eur < 200) return { t: "OK", c: "sem-normal" };
  return { t: "ÓPTIMO", c: "sem-bien" };
}

// =============================================
// CALCULATIONS
// =============================================
function calculateQuant(globalWeights) {
  let vSum = 0, aSum = 0, bSum = 0, cSum = 0;
  globalWeights.forEach(a => {
    const d = SECTOR_DATA[a.tag] || SECTOR_DATA["Otros"];
    vSum += Math.pow(a.weight * d.v, 2);
    aSum += a.weight * d.a;
    bSum += a.weight * d.b;
    cSum += a.weight * d.c;
  });
  const vol = Math.sqrt(vSum) * 1.3;
  const maxDD = vol * 1.7;
  const expectedCAGR = 0.04 + (bSum * 0.05) + aSum;
  return { vol, maxDD, corr: cSum, expectedCAGR };
}

function computeRiskScore(globalWeights, sectorWeights) {
  // Score 0-100 based on weighted volatility of portfolio
  let vSum = 0;
  globalWeights.forEach(a => {
    const d = SECTOR_DATA[a.tag] || SECTOR_DATA["Otros"];
    vSum += a.weight * d.v;
  });
  // Map 0-0.65 vol range to 0-100 score
  return Math.min(100, Math.round((vSum / 0.55) * 100));
}

function getTypology(riskScore, sectorWeights) {
  // Check concentration first
  const maxFactor = Math.max(...Object.values(sectorWeights || { o: 0 }));
  if (maxFactor > 0.65) {
    return {
      typology: TYPOLOGIES[5], // especulativa
      warn: `Concentración crítica: un solo factor supone el ${(maxFactor * 100).toFixed(0)}% de tu cartera. No estás diversificado.`,
      riskScore: Math.max(riskScore, 90)
    };
  }
  const t = TYPOLOGIES.find(t => t.criteria(riskScore)) || TYPOLOGIES[3];
  return { typology: t, warn: null, riskScore };
}

// =============================================
// BALANCING
// =============================================
function autoBalanceTiers(cIdx, newVal) {
  const diff = newVal - state.tiers[cIdx].pctTarget;
  state.tiers[cIdx].pctTarget = newVal;
  const others = state.tiers.filter((_, i) => i !== cIdx);
  const sumOthers = others.reduce((s, t) => s + t.pctTarget, 0);
  if (sumOthers > 0) {
    others.forEach(t => { t.pctTarget = Math.max(0, t.pctTarget - (diff * (t.pctTarget / sumOthers))); });
  } else {
    others.forEach(t => t.pctTarget = Math.max(0, (100 - newVal) / others.length));
  }
}

function autoBalanceInternals(tIdx, changedAIdx, newVal) {
  const t = state.tiers[tIdx];
  if (t.assets.length <= 1) { if (t.assets.length === 1) t.assets[0].pctInternal = 100; return; }
  const diff = newVal - t.assets[changedAIdx].pctInternal;
  t.assets[changedAIdx].pctInternal = newVal;
  const others = t.assets.filter((_, i) => i !== changedAIdx);
  const sumOthers = others.reduce((s, a) => s + a.pctInternal, 0);
  if (sumOthers > 0) {
    others.forEach(a => { a.pctInternal = Math.max(0, a.pctInternal - (diff * (a.pctInternal / sumOthers))); });
  } else {
    others.forEach(a => a.pctInternal = Math.max(0, (100 - newVal) / others.length));
  }
}

// =============================================
// RENDER
// =============================================
function render() {
  const cap = parseFloat(document.getElementById('capitalInput').value) || 0;
  const dca = parseFloat(document.getElementById('dcaInput').value) || 0;
  state.capital = cap;
  state.dca = dca;

  let globalWeights = [], sectorWeights = {};
  const cont = document.getElementById('tiersContainer');
  cont.innerHTML = '';

  state.tiers.forEach((tier, tIdx) => {
    const tierEur = cap * (tier.pctTarget / 100);
    const tDca = dca * (tier.pctTarget / 100);
    const color = tier.color || TIER_COLORS[tIdx % TIER_COLORS.length];

    let html = `
      <div class="tier-block" data-tier-idx="${tIdx}" style="border-left: 3px solid ${color}; border-right: 3px solid ${color};">
        <div class="tier-header">
          <h2>
            <div class="tier-dot" style="background:${color}"></div>
            ${tier.name}
          </h2>
          <div class="tier-right">
            <div class="tier-amounts">
              <div class="tier-eur">${fmt(tierEur)}</div>
              <div class="tier-dca" style="color:var(--text-muted)">+${fmt(tDca)}/m</div>
            </div>
            <div class="tier-pct-box">
              <input type="number" inputmode="decimal" value="${Math.round(tier.pctTarget)}"
                onchange="updateTier(${tIdx}, this.value)">
              <span>%</span>
            </div>
          </div>
        </div>
        <div class="asset-list">
    `;

    // Sort assets by weight descending for display
    const sortedAssets = [...tier.assets]
      .map((a, i) => ({ ...a, _origIdx: i }))
      .sort((a, b) => b.pctInternal - a.pctInternal);

    sortedAssets.forEach((a, _si) => {
      const aIdx = a._origIdx; // keep original index for mutations
      const aEur = tierEur * (a.pctInternal / 100);
      const absW = (tier.pctTarget / 100) * (a.pctInternal / 100);
      globalWeights.push({ weight: absW, tag: a.tag });
      sectorWeights[a.tag] = (sectorWeights[a.tag] || 0) + absW;

      const aDca = dca * absW;
      const fStatus = getAssetSemaforo(aEur);

      const perf = a.perf != null ? a.perf : null;
      let perfHtml = '';
      if (perf !== null && perf !== undefined) {
        const pct = Math.round(perf * 100);
        if (perf > 0.005)       perfHtml = `<span class="perf-badge perf-up">▲ ${pct}%</span>`;
        else if (perf < -0.005) perfHtml = `<span class="perf-badge perf-down">▼ ${Math.abs(pct)}%</span>`;
        else                    perfHtml = `<span class="perf-badge perf-flat">—</span>`;
      }

      html += `
        <div class="asset-row"
          draggable="true"
          data-tier="${tIdx}"
          data-asset="${aIdx}">
          <span class="drag-handle" title="Arrastrar">⠿</span>
          <input type="text" value="${a.ticker}"
            onchange="updateA(${tIdx},${aIdx},'ticker',this.value)"
            placeholder="TCK" class="a-input mono" autocomplete="off" autocorrect="off" spellcheck="false">

          <div class="a-pct-box">
            <input type="number" inputmode="decimal" value="${Math.round(a.pctInternal)}"
              onchange="changeA(${tIdx},${aIdx},this.value)">
            <span>%</span>
          </div>

          <select onchange="updateA(${tIdx},${aIdx},'tag',this.value)" class="a-select">
            ${SECTORS.map(s => `<option ${a.tag === s ? 'selected' : ''}>${s}</option>`).join('')}
          </select>

          <div class="a-financial">
            <div class="a-meta">
              <div class="a-dca">+${fmt(aDca)}/m</div>
              ${fStatus ? `<span class="semaforo ${fStatus.c}">${fStatus.t}</span>` : ''}
            </div>
            <div class="a-right">
              ${perfHtml}
              <div class="a-eur">${fmt(aEur)}</div>
            </div>
          </div>
        </div>
      `;
    });

    html += `<button onclick="addA(${tIdx})" class="btn-add" style="color:${color}">+ Añadir activo</button></div></div>`;
    cont.innerHTML += html;
  });

  // Init drag & drop after DOM is updated
  initDrag();

  // ── QUANTS ──
  const q = calculateQuant(globalWeights);
  const sV = getSem(q.vol, [0.12, 0.18, 0.25, 0.35]);
  const sD = getSem(q.maxDD, [0.15, 0.25, 0.35, 0.45]);
  const sC = getSem(q.corr, [0.4, 0.55, 0.7, 0.85]);

  document.getElementById('q-vol').textContent = (q.vol * 100).toFixed(1) + '%';
  document.getElementById('sem-vol').className = 'semaforo ' + sV.c;
  document.getElementById('sem-vol').textContent = sV.s;

  document.getElementById('q-mdd').textContent = '-' + (q.maxDD * 100).toFixed(1) + '%';
  document.getElementById('sem-dd').className = 'semaforo ' + sD.c;
  document.getElementById('sem-dd').textContent = sD.s;

  document.getElementById('q-cor').textContent = q.corr.toFixed(2);
  document.getElementById('sem-cor').className = 'semaforo ' + sC.c;
  document.getElementById('sem-cor').textContent = sC.s;

  document.getElementById('q-cagr').textContent = (q.expectedCAGR * 100).toFixed(1) + '%';

  // ── TYPOLOGY & BRÚJULA ──
  const riskScore = computeRiskScore(globalWeights, sectorWeights);
  const { typology, warn, riskScore: finalScore } = getTypology(riskScore, sectorWeights);

  document.getElementById('recap-typology').textContent = typology.label;
  document.getElementById('recap-typology').style.color = typology.color;

  const badge = document.getElementById('recap-badge');
  badge.textContent = `Score ${finalScore}/100`;
  badge.style.background = typology.color + '22';
  badge.style.color = typology.color;

  document.getElementById('recap-desc').textContent = typology.description;

  // Spectrum cursor
  const cursorPct = Math.min(95, Math.max(5, finalScore));
  document.getElementById('spectrumCursor').style.left = cursorPct + '%';

  // Profile pills
  const grid = document.getElementById('profilesGrid');
  grid.innerHTML = TYPOLOGIES.map(t => {
    const isActive = t.id === typology.id;
    return `<div class="profile-pill ${isActive ? 'active' : ''}" style="${isActive ? `color:${t.color}; border-color:${t.color}; background:${t.color}18;` : ''}">
      <div class="p-name" style="${isActive ? `color:${t.color}` : ''}">${t.short}</div>
      <div class="p-range">${t.riskScore[0]}–${t.riskScore[1]}</div>
    </div>`;
  }).join('');

  const warnEl = document.getElementById('recap-warn');
  if (warn) { warnEl.style.display = 'block'; warnEl.textContent = warn; }
  else { warnEl.style.display = 'none'; }

  // ── SECTOR LIST ──
  const sList = document.getElementById('sectorList');
  sList.innerHTML = '';
  const sectorEntries = Object.entries(sectorWeights)
    .sort((a, b) => b[1] - a[1])
    .filter(([, w]) => w >= 0.005);

  sectorEntries.forEach(([s, w]) => {
    const p = Math.round(w * 100) + '%';
    sList.innerHTML += `
      <div style="display:flex; align-items:center; gap:8px;">
        <div style="width:100px; font-size:10px; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-shrink:0;" title="${s}">${s}</div>
        <div style="flex:1; background:var(--bg-hover); border-radius:3px; height:5px; overflow:hidden;">
          <div style="width:${p}; background:var(--blue); height:100%; border-radius:3px;"></div>
        </div>
        <div style="width:30px; text-align:right; font-size:11px; font-weight:600; flex-shrink:0;">${p}</div>
      </div>`;
  });

  // ── DONUT CHART ──
  const rootStyles = getComputedStyle(document.documentElement);
  const cardBg = rootStyles.getPropertyValue('--bg-card').trim() || '#111';
  const ctx = document.getElementById('tierChart');
  if (tierChartInstance) tierChartInstance.destroy();
  tierChartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: state.tiers.map(t => t.name),
      datasets: [{
        data: state.tiers.map(t => t.pctTarget),
        backgroundColor: state.tiers.map((t, i) => t.color || TIER_COLORS[i % TIER_COLORS.length]),
        borderColor: cardBg,
        borderWidth: 3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '76%',
      events: [], plugins: { legend: { display: false }, tooltip: { enabled: false } }
    }
  });

  const legend = document.getElementById('customLegend');
  legend.innerHTML = state.tiers.map((t, i) => {
    const c = t.color || TIER_COLORS[i % TIER_COLORS.length];
    return `<div style="display:flex; align-items:center; justify-content:space-between; font-size:11px;">
      <div style="display:flex; align-items:center; gap:5px;">
        <div style="width:8px; height:8px; border-radius:2px; background:${c};"></div>
        <span style="color:var(--text-muted);">${t.name}</span>
      </div>
      <span style="font-weight:600;">${Math.round(t.pctTarget)}%</span>
    </div>`;
  }).join('');

}

// =============================================
// STATE MUTATIONS — only these trigger save
// =============================================
function updateTier(t, v) { autoBalanceTiers(t, parseFloat(v) || 0); render(); triggerAutoSave(); }
function changeA(t, a, v) {
  const val = parseFloat(v) || 0;
  if (val === 0) {
    // Auto-delete: remove asset and redistribute
    state.tiers[t].assets.splice(a, 1);
    const assets = state.tiers[t].assets;
    if (assets.length > 0) {
      const sum = assets.reduce((s, a) => s + a.pctInternal, 0);
      if (sum > 0) assets.forEach(a => a.pctInternal = (a.pctInternal / sum) * 100);
      else assets.forEach(a => a.pctInternal = 100 / assets.length);
    }
  } else {
    autoBalanceInternals(t, a, val);
  }
  render(); triggerAutoSave();
}
function updateA(t, a, f, v) { state.tiers[t].assets[a][f] = f === 'ticker' ? v.toUpperCase() : v; render(); triggerAutoSave(); }

function addA(t) {
  const assets = state.tiers[t].assets;
  const existingTotal = assets.reduce((s, a) => s + a.pctInternal, 0);
  const newShare = existingTotal / (assets.length + 1);
  assets.forEach(a => { a.pctInternal = a.pctInternal * (1 - newShare / existingTotal); });
  assets.push({ ticker: "?", pctInternal: newShare, tag: "Otros", perf: null, entryPrice: null });
  render(); triggerAutoSave();
}

function remA(t, a) {
  state.tiers[t].assets.splice(a, 1);
  const assets = state.tiers[t].assets;
  if (assets.length > 0) {
    const eq = 100 / assets.length;
    assets.forEach(a => a.pctInternal = eq);
  }
  render(); triggerAutoSave();
}

// =============================================
// DRAG & DROP ENGINE
// =============================================
let drag = { tIdx: null, aIdx: null, el: null };

function initDrag() {
  const rows = document.querySelectorAll('.asset-row[draggable]');
  const tierBlocks = document.querySelectorAll('.tier-block');

  rows.forEach(row => {
    // Desktop
    row.addEventListener('dragstart', e => {
      drag.tIdx = +row.dataset.tier;
      drag.aIdx = +row.dataset.asset;
      drag.el = row;
      setTimeout(() => row.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
    });

    // Touch
    const handle = row.querySelector('.drag-handle');
    if (!handle) return;
    handle.addEventListener('touchstart', e => {
      drag.tIdx = +row.dataset.tier;
      drag.aIdx = +row.dataset.asset;
      drag.el = row;
      row.classList.add('dragging');
    }, { passive: true });
    handle.addEventListener('touchend', e => {
      row.classList.remove('dragging');
      const touch = e.changedTouches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const destBlock = target?.closest('.tier-block');
      document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
      if (destBlock) {
        const destTIdx = +destBlock.dataset.tierIdx;
        if (!isNaN(destTIdx)) dropAsset(destTIdx);
      }
    }, { passive: true });
    handle.addEventListener('touchmove', e => {
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const block = el?.closest('.tier-block');
      document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
      if (block) block.classList.add('drag-target');
    }, { passive: true });
  });

  // Desktop drop targets — tier blocks
  tierBlocks.forEach(block => {
    block.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
      block.classList.add('drag-target');
    });
    block.addEventListener('dragleave', e => {
      if (!block.contains(e.relatedTarget)) block.classList.remove('drag-target');
    });
    block.addEventListener('drop', e => {
      e.preventDefault();
      block.classList.remove('drag-target');
      const destTIdx = +block.dataset.tierIdx;
      if (!isNaN(destTIdx)) dropAsset(destTIdx);
    });
  });
}

function dropAsset(destTIdx) {
  const srcTIdx = drag.tIdx;
  const srcAIdx = drag.aIdx;
  if (srcTIdx === null || destTIdx === srcTIdx) { drag = { tIdx: null, aIdx: null, el: null }; return; }

  const srcTier = state.tiers[srcTIdx];
  const destTier = state.tiers[destTIdx];
  const asset = { ...srcTier.assets[srcAIdx] };

  // 1. Remove from source (same as changeA to 0)
  srcTier.assets.splice(srcAIdx, 1);
  if (srcTier.assets.length > 0) {
    const sum = srcTier.assets.reduce((s, a) => s + a.pctInternal, 0);
    srcTier.assets.forEach(a => a.pctInternal = sum > 0 ? (a.pctInternal / sum) * 100 : 100 / srcTier.assets.length);
  }

  // 2. Add to dest (same as addA logic)
  const existing = destTier.assets;
  const existingTotal = existing.reduce((s, a) => s + a.pctInternal, 0);
  const newShare = existingTotal / (existing.length + 1);
  existing.forEach(a => { a.pctInternal = a.pctInternal * (1 - newShare / (existingTotal || 1)); });
  asset.pctInternal = newShare || 100;
  existing.push(asset);

  drag = { tIdx: null, aIdx: null, el: null };
  render(); triggerAutoSave();
}

// =============================================
// CACHE
// =============================================
function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch (e) {}
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

function applyState(data) {
  data.tiers.forEach((t, i) => {
    t.color = TIER_COLORS[i % TIER_COLORS.length];
    t.assets.forEach(a => {
      if (a.perf === undefined) a.perf = null;
    });
  });
  state = data;
  document.getElementById('capitalInput').value = state.capital;
  document.getElementById('dcaInput').value = state.dca;
}

// =============================================
// SYNC
// =============================================
function setStatus(text, color) {
  const el = document.getElementById('syncStatus');
  el.textContent = text;
  el.style.color = color || 'var(--text-muted)';
}

let saveDebounce = null;
function triggerAutoSave() {
  if (isInitialLoad) return;
  setStatus("Editando…", "var(--amber)");
  clearTimeout(saveDebounce);
  saveDebounce = setTimeout(() => {
    saveCache(state);
    saveToSheets();
  }, 3000); // 3s after last edit — enough to avoid over-syncing, fast enough to feel responsive
}

async function loadFromSheets() {
  // 1. Show cached data immediately
  const cached = loadCache();
  if (cached && cached.data && cached.data.tiers) {
    applyState(cached.data);
    render();
  }

  // 2. Attach listeners
  document.getElementById('capitalInput').addEventListener('input', () => { render(); triggerAutoSave(); });
  document.getElementById('dcaInput').addEventListener('input', () => { render(); triggerAutoSave(); });

  // 3. Try to fetch fresh data
  setStatus("Sincronizando…", "var(--text-muted)");
  try {
    const response = await fetch(SCRIPT_URL + '?t=' + Date.now());
    const data = await response.json();
    if (data && data.tiers) {
      applyState(data);
      saveCache(data);
      setStatus("Sincronizado ✓", "var(--green)");
      render();
    } else {
      setStatus("Sin datos ⚠", "var(--amber)");
    }
  } catch (err) {
    setStatus(cached ? "Cache local ⚠" : "Sin conexión ✕", cached ? "var(--amber)" : "var(--red)");
  } finally {
    setTimeout(() => { isInitialLoad = false; }, 300);
  }
}

async function saveToSheets() {
  setStatus("Guardando…", "var(--blue)");
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(state),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    });
    setStatus("Guardado ✓", "var(--green)");
    saveCache(state);
  } catch (err) {
    setStatus("Error ✕", "var(--red)");
  }
}

// ── Theme change re-render ──
window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => render());

// ── Boot ──
loadFromSheets();
</script>

function doGet(e) {
  const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Cartera");
  if (!sheet) return ContentService.createTextOutput(JSON.stringify({ error: "No existe la pestaña Cartera" })).setMimeType(ContentService.MimeType.JSON);

  const capital = parseFloat(sheet.getRange("B1").getValue()) || 0;
  const dca     = parseFloat(sheet.getRange("D1").getValue()) || 0;
  let state = { capital, dca, tiers: [] };

  const lastRow = sheet.getLastRow();
  if (lastRow >= 4) {
    const rows = sheet.getRange(4, 1, lastRow - 3, 11).getValues();
    let tiersMap = {};
    rows.forEach(row => {
      const tierId = row[0];
      if (!tierId) return;
      if (!tiersMap[tierId]) {
        tiersMap[tierId] = { id: tierId, name: row[1], pctTarget: parseFloat(row[2]) || 0, assets: [] };
        state.tiers.push(tiersMap[tierId]);
      }
      if (row[4] && row[4].toString().trim() !== "") {
        const perf = row[10] !== "" && row[10] !== null ? parseFloat(row[10]) : null;
        tiersMap[tierId].assets.push({
          ticker:     row[4],
          pctInternal: parseFloat(row[5]) || 0,
          tag:        row[7] || "Otros",
          entryPrice: parseFloat(row[8]) || null,
          perf:       isNaN(perf) ? null : perf
        });
      }
    });
  }
  return ContentService.createTextOutput(JSON.stringify(state)).setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  try {
    const state = JSON.parse(e.postData.contents);
    const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Cartera");
    if (!sheet) throw new Error("No existe la pestaña Cartera");

    sheet.getRange("B1").setValue(state.capital);
    sheet.getRange("D1").setValue(state.dca);

    // Read existing rows (A–K) to preserve I, J, K for known tickers
    const lastRow = sheet.getLastRow();
    let existing = {}; // ticker -> { entryPrice, jFormula, kFormula }
    if (lastRow >= 4) {
      const existingData    = sheet.getRange(4, 1, lastRow - 3, 9).getValues();
      const existingFormulas = sheet.getRange(4, 1, lastRow - 3, 11).getFormulas();
      existingData.forEach((row, i) => {
        const ticker = (row[4] || "").toString().trim();
        if (ticker) {
          existing[ticker] = {
            entryPrice: row[8] || null,
            jFormula:   existingFormulas[i][9]  || null, // col J (index 9)
            kFormula:   existingFormulas[i][10] || null  // col K (index 10)
          };
        }
      });
    }

    // Clear A–K from row 4 down
    if (lastRow >= 4) {
      sheet.getRange(4, 1, lastRow - 3, 11).clearContent();
    }

    // Build new rows
    let newRows = [];
    if (state.tiers && state.tiers.length > 0) {
      state.tiers.forEach(tier => {
        const tierCapital = state.capital * (tier.pctTarget / 100);
        if (tier.assets && tier.assets.length > 0) {
          tier.assets.forEach(asset => {
            const assetCapital = tierCapital * (asset.pctInternal / 100);
            const ticker = (asset.ticker || "").trim();
            newRows.push([
              tier.id, tier.name, tier.pctTarget, tierCapital,
              ticker, asset.pctInternal, assetCapital, asset.tag || "Otros",
              "", "", "" // I, J, K — handled separately below
            ]);
          });
        } else {
          newRows.push([tier.id, tier.name, tier.pctTarget, tierCapital, "", 0, 0, "", "", "", ""]);
        }
      });
    }

    if (newRows.length > 0) {
      // Write A–H first
      sheet.getRange(4, 1, newRows.length, 8).setValues(newRows.map(r => r.slice(0, 8)));
      SpreadsheetApp.flush();

      // Now handle I, J, K per row
      newRows.forEach((row, i) => {
        const ticker  = (row[4] || "").toString().trim();
        const rowNum  = 4 + i;
        const colI    = sheet.getRange(rowNum, 9);
        const colJ    = sheet.getRange(rowNum, 10);
        const colK    = sheet.getRange(rowNum, 11);

        if (!ticker || ticker === "?") return;

        const prev = existing[ticker];

        if (prev && prev.entryPrice) {
          // Ticker known — restore I as static value, J and K as original formulas
          colI.setValue(prev.entryPrice);
          if (prev.jFormula) colJ.setFormula(prev.jFormula);
          if (prev.kFormula) colK.setFormula(prev.kFormula);
        } else {
          // New ticker — get entry price: evaluate GOOGLEFINANCE once, write as static value in I
          const jFormula = `=IFERROR(IF(GOOGLEFINANCE(E${rowNum};"currency")="GBX";GOOGLEFINANCE(E${rowNum};"price")/100;GOOGLEFINANCE(E${rowNum};"price"));"")`;
          colJ.setFormula(jFormula);
          SpreadsheetApp.flush(); // force evaluation
          const currentPrice = colJ.getValue();
          colJ.clearContent();   // remove temp formula from J

          if (currentPrice && !isNaN(currentPrice) && currentPrice > 0) {
            colI.setValue(currentPrice); // freeze entry price in I
          }

          // Now write permanent J and K formulas
          colJ.setFormula(jFormula);
          colK.setFormula(`=IFERROR((J${rowNum}-I${rowNum})/I${rowNum};"")`);
        }
      });
    }

    return ContentService.createTextOutput(JSON.stringify({ status: 'success' })).setMimeType(ContentService.MimeType.JSON);
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({ status: 'error', message: error.toString() })).setMimeType(ContentService.MimeType.JSON);
  }
}
