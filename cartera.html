<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet | CHENSIO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  --bg-base: #000000; --bg-card: #000000; --bg-hover: #1c1c1e;
  --border: #38383a; --border-light: #48484a;
  --text-main: #f5f5f7; --text-muted: #86868b; --text-dim: #515154;
  --blue: #0a84ff; --green: #30d158; --amber: #ff9f0a; --red: #ff453a;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg-base: #f2f2f7; --bg-card: #ffffff; --bg-hover: #f4f5f7;
    --border: #d1d1d6; --border-light: #e5e5ea;
    --text-main: #1c1c1e; --text-muted: #8e8e93; --text-dim: #aeaeae;
    --blue: #007aff; --green: #34c759; --amber: #ff9500; --red: #ff3b30;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background-color: var(--bg-base); color: var(--text-main); line-height: 1.4; padding: 16px 12px; -webkit-font-smoothing: antialiased; transition: background-color 0.3s ease, color 0.3s ease; }

.container { max-width: 620px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

/* 1. Header Ultra-Compacto y Centrado */
.header-container { display: grid; grid-template-columns: 80px 1fr 80px; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.header-container h1 { margin: 0; font-size: 22px; letter-spacing: -0.02em; font-weight: 700; text-align: center; }
.btn-volver { background: var(--bg-hover); color: var(--text-main); text-decoration: none; padding: 6px 10px; border-radius: 6px; font-weight: 600; font-size: 12px; border: 1px solid var(--border); transition: 0.2s; text-align: center; justify-self: start; }
.btn-volver:hover { background: var(--border-light); }
#syncStatus { font-size: 11px; color: var(--text-muted); font-weight: 500; text-align: right; justify-self: end; white-space: nowrap; }

.card { background: var(--bg-card); border-radius: 14px; padding: 16px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
@media (prefers-color-scheme: dark) { .card { box-shadow: 0 4px 15px rgba(0,0,0,0.4); } }

.card-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

/* Capital & DCA en Línea Horizontal */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-box { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); border: 1px solid var(--border); padding: 10px 14px; border-radius: 10px; height: 44px; }
.stat-box label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin: 0; }
.stat-box input { text-align: right; font-size: 15px; width: 90px; background: transparent; border: none; outline: none; color: var(--text-main); font-weight: 700; font-family: var(--font-mono); }
.stat-box input#dcaInput { color: var(--green); }

input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

/* Tiers y Listas de Activos */
.tier-block { margin-bottom: 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.tier-block:last-child { margin-bottom: 0; }
.tier-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--bg-hover); border-bottom: 1px solid var(--border); height: 46px; }
.tier-header h2 { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; margin: 0; }

.asset-list { padding: 4px 12px; }
.asset-row { display: flex; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px dashed var(--border); }
.asset-row:last-child { border-bottom: none; }

/* Tamaños fijos optimizados para Inputs y Selects */
.a-input, .a-select { background: var(--bg-hover); border: 1px solid var(--border-light); color: var(--text-main); font-family: var(--font-sans); font-size: 13px; height: 38px; border-radius: 6px; outline: none; transition: 0.2s; padding: 0 10px; }
.a-input:focus, .a-select:focus { border-color: var(--blue); }
.a-input.mono { font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; text-align: center; }

.a-tck-input { width: 65px; }
.a-pct-container { display: flex; align-items: center; gap: 2px; background: var(--bg-hover); border: 1px solid var(--border-light); border-radius: 6px; padding: 0 8px; height: 38px; }
.a-pct-container input { width: 38px; text-align: right; background: transparent; border: none; color: var(--text-main); font-size: 13px; font-family: var(--font-mono); font-weight: 600; outline: none; }
.a-tag-select { flex: 1; min-width: 120px; }

/* Contenedor Financiero y Semáforos */
.a-financial-container { display: flex; align-items: center; gap: 10px; justify-content: flex-end; min-width: 200px; }
.semaforo { font-size: 9px; font-weight: 700; padding: 3px 6px; border-radius: 5px; text-transform: uppercase; white-space: nowrap; display: inline-block; }
.sem-bien { background: rgba(48,209,88,0.15); color: var(--green); }
.sem-mbien { background: rgba(10,132,255,0.15); color: var(--blue); }
.sem-normal { background: rgba(134,134,139,0.15); color: var(--text-muted); }
.sem-mmal { background: rgba(255,159,10,0.15); color: var(--amber); }
.sem-mal { background: rgba(255,69,58,0.15); color: var(--red); }
.sem-desc { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.4; }

.btn-add { width: 100%; padding: 8px; background: none; border: none; color: var(--blue); font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.02em; }
.btn-add:hover { background: rgba(10,132,255,0.05); }
.a-del-btn { background: transparent; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; padding: 6px; transition: 0.2s; }
.a-del-btn:hover { color: var(--red); }

/* 4. Macro & Sectors Grid Alineados */
.grid-row-4 { display: grid; grid-template-columns: 1fr 1.2fr; gap: 16px; align-items: stretch; }
.grid-row-4 > .card { display: flex; flex-direction: column; }
.grid-row-4 > .card > div:last-child { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.chart-container { position: relative; height: 140px; width: 100%; display: flex; justify-content: center; }
#sectorList { display: flex; flex-direction: column; justify-content: space-between; height: 100%; gap: 6px; }

/* Quants */
.q-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.q-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--bg-hover); border-radius: 8px; border: 1px solid var(--border); }
.q-lbl { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.q-val { font-size: 14px; font-weight: 600; font-family: var(--font-mono); }
.num-font { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.analyzer-warn { background: rgba(255,69,58,0.1); border: 1px solid var(--red); color: var(--red); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 12px; font-weight: 600; }

/* Ajustes Críticos para Mobile (Layout Compacto sin distorsión) */
@media (max-width: 600px) {
  .container { gap: 12px; }
  .grid-row-4 { grid-template-columns: 1fr; gap: 12px; }
  .q-list { grid-template-columns: 1fr; gap: 8px; }
  
  /* Conversión controlada de las filas de activos para que mantengan proporciones estéticas */
  .asset-row { display: grid; grid-template-columns: 65px 65px 1fr 24px; grid-template-rows: auto auto; gap: 6px; padding: 10px 0; position: relative; }
  .a-tck-input { grid-column: 1; grid-row: 1; width: 100%; }
  .a-pct-container { grid-column: 2; grid-row: 1; width: 100%; }
  .a-tag-select { grid-column: 3; grid-row: 1; width: 100%; }
  .a-del-btn { grid-column: 4; grid-row: 1; align-self: center; justify-self: center; }
  
  /* Segunda línea interna del activo (Valores numéricos y Semáforos comprimidos) */
  .a-financial-container { grid-column: 1 / span 4; grid-row: 2; display: flex; justify-content: space-between; align-items: center; background: var(--bg-hover); padding: 6px 10px; border-radius: 6px; min-width: 0; width: 100%; margin-top: 2px; }
}
</style>
</head>
<body>

<div class="container">
  
  <div class="header-container">
    <a href="https://casencio.github.io/trading-roadmap/" class="btn-volver">VOLVER</a>
    <h1>Wallet</h1>
    <span id="syncStatus">Conectando...</span>
  </div>

  <div class="stat-grid">
    <div class="stat-box">
      <label>Capital</label>
      <input type="number" id="capitalInput" class="num-font" value="10000" step="100">
    </div>
    <div class="stat-box">
      <label>DCA</label>
      <input type="number" id="dcaInput" class="num-font" value="500" step="50">
    </div>
  </div>

  <div id="tiersContainer"></div>
  
  <div class="card">
    <div class="card-title">BRÚJULA DE PERFIL DE CARTERA</div>
    <div id="recap-tipology" style="font-size:22px; font-weight:800; letter-spacing:-0.02em; text-transform:uppercase; margin-bottom:4px;">—</div>
    <div id="recap-desc" class="sem-desc">—</div>
    <div id="recap-warn" class="analyzer-warn" style="display:none;"></div>
  </div>

  <div class="grid-row-4">
    <div class="card">
      <div class="card-title">MACROLOCALIZACIÓN</div>
      <div class="chart-container"><canvas id="tierChart"></canvas></div>
      <div id="customLegend" style="display: flex; flex-direction: column; gap: 6px; margin-top: 12px;"></div>
    </div>

    <div class="card">
      <div class="card-title">DISTRIBUCIÓN SECTORIAL</div>
      <div><div id="sectorList"></div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">RIESGO ESPERADO & ESTRUCTURA</div>
    <div class="q-list">
      <div class="q-item">
        <div class="q-lbl">Volatilidad (Fluctuación)</div>
        <div style="text-align:right"><div class="q-val" id="q-vol">—</div><div class="semaforo" id="sem-vol" style="margin-top:2px;"></div></div>
      </div>
      <div class="q-item">
        <div class="q-lbl">Caída Máxima Estimada</div>
        <div style="text-align:right"><div class="q-val" id="q-mdd">—</div><div class="semaforo" id="sem-dd" style="margin-top:2px;"></div></div>
      </div>
      <div class="q-item">
        <div class="q-lbl">Diversificación Real</div>
        <div style="text-align:right"><div class="q-val" id="q-cor">—</div><div class="semaforo" id="sem-cor" style="margin-top:2px;"></div></div>
      </div>
    </div>
  </div>

</div>

<script>
const SECTOR_DATA = {
  "Quality (Alto ROIC / Foso)": { v: 0.18, a: 0.015, b: 0.9, c: 0.60 },
  "Growth (Crecimiento >20%)": { v: 0.32, a: 0.025, b: 1.3, c: 0.80 },
  "Semiconductores / Hardware": { v: 0.38, a: 0.035, b: 1.6, c: 0.85 },
  "Software / Cloud SaaS": { v: 0.30, a: 0.025, b: 1.4, c: 0.80 },
  "Energía / Infraestructura": { v: 0.22, a: 0.010, b: 0.8, c: 0.30 },
  "Bitcoin / Cripto": { v: 0.65, a: 0.050, b: 2.2, c: 0.20 },
  "Otros": { v: 0.20, a: 0.005, b: 1.0, c: 0.60 }
};
const SECTORS = Object.keys(SECTOR_DATA);

let state = { capital: 10000, dca: 500, tiers: [] };
let tierChartInstance = null;

const fmt = (n) => new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);

function getSem(val, thresholds) {
  if (val > thresholds[3]) return { s: "CRÍTICO", c: "sem-mal" };
  if (val > thresholds[2]) return { s: "SUBÓPTIMO", c: "sem-mmal" };
  if (val > thresholds[1]) return { s: "ADECUADO", c: "sem-normal" };
  if (val > thresholds[0]) return { s: "FAVORABLE", c: "sem-mbien" };
  return { s: "ÓPTIMO", c: "sem-bien" };
}

function getTierFriction(eur) {
  if (eur <= 0) return null;
  if (eur < 50) return { t: "CRÍTICO", c: "sem-mal" };
  if (eur < 100) return { t: "SUBÓPTIMO", c: "sem-mmal" };
  return { t: "ÓPTIMO", c: "sem-bien" };
}

function calculateQuant(globalWeights, sectorWeights) {
  let vSum=0, aSum=0, bSum=0, cSum=0;
  globalWeights.forEach(a => {
    let d = SECTOR_DATA[a.tag] || SECTOR_DATA["Otros"];
    vSum += Math.pow(a.weight * d.v, 2); aSum += (a.weight * d.a); bSum += (a.weight * d.b); cSum += (a.weight * d.c);
  });
  let vol = Math.sqrt(vSum) * 1.3, maxDD = vol * 1.7, expectedCAGR = 0.045 + (bSum * 0.05) + aSum;
  let maxFactorPct = Math.max(...Object.values(sectorWeights || {o:0}));
  return { vol, maxDD, corr: cSum, expectedCAGR, probBeat: 0.4 + (aSum*5), maxFactorPct };
}

function getTypology(t1, t2, t3, maxFactor) {
  if (maxFactor > 0.6) return { label: "CONCENTRACIÓN CRÍTICA", color: "var(--red)", d: "Error Retail detectado: Tu cartera depende de un solo factor (>60%). No estás diversificado." };
  let label = "Balanceada", color = "var(--text-muted)";
  if (t1 >= 60) { label = "Defensiva"; color = "var(--blue)"; if(t1 >= 80) label = "Muy Defensiva"; }
  else if (t2 >= 60) { label = "Growth"; color = "var(--green)"; if(t2 >= 80) label = "Muy Agresiva"; }
  return { label, color, d: "Estructura alineada con rangos de gestión institucional." };
}

function autoBalanceTiers(cIdx, newVal) {
  let diff = newVal - state.tiers[cIdx].pctTarget;
  state.tiers[cIdx].pctTarget = newVal;
  let others = state.tiers.filter((_, i) => i !== cIdx);
  let sumOthers = others.reduce((s, t) => s + t.pctTarget, 0);
  if (sumOthers > 0) {
    others.forEach(t => { t.pctTarget = Math.max(0, t.pctTarget - (diff * (t.pctTarget / sumOthers))); });
  } else {
    others.forEach(t => t.pctTarget = Math.max(0, (100 - newVal) / others.length));
  }
}

function autoBalanceInternals(tIdx, changedAIdx, newVal) {
  let t = state.tiers[tIdx];
  if (t.assets.length <= 1) { if(t.assets.length===1) t.assets[0].pctInternal = 100; return; }
  let diff = newVal - t.assets[changedAIdx].pctInternal;
  t.assets[changedAIdx].pctInternal = newVal;
  let others = t.assets.filter((_, i) => i !== changedAIdx);
  let sumOthers = others.reduce((s, a) => s + a.pctInternal, 0);
  if (sumOthers > 0) {
    others.forEach(a => { a.pctInternal = Math.max(0, a.pctInternal - (diff * (a.pctInternal / sumOthers))); });
  } else {
    others.forEach(a => a.pctInternal = Math.max(0, (100 - newVal) / others.length));
  }
}

function render() {
  const cap = parseFloat(document.getElementById('capitalInput').value) || 0;
  const dca = parseFloat(document.getElementById('dcaInput').value) || 0;
  state.capital = cap; state.dca = dca;
  
  let globalWeights = [], sectorWeights = {};
  const cont = document.getElementById('tiersContainer');
  cont.innerHTML = '';
  
  state.tiers.forEach((tier, tIdx) => {
    const tierEur = cap * (tier.pctTarget / 100);
    const tDca = dca * (tier.pctTarget / 100);
    const tierFrict = getTierFriction(tierEur);
    
    let tier_html = `
      <div class="tier-block" style="border-left: 4px solid ${tier.color};">
        <div class="tier-header">
          <h2><div style="width: 12px; height: 12px; border-radius: 50%; background:${tier.color}"></div>${tier.name}</h2>
          <div style="display:flex; align-items:center; gap:12px;">
            ${tierFrict && tier.pctTarget > 0 ? `<div class="semaforo ${tierFrict.c}">${tierFrict.t}</div>` : ''}
            <div style="text-align:right;">
              <div class="num-font" style="color:var(--text-main); font-size:13px; font-weight: 600;">${fmt(tierEur)}</div>
              <div class="num-font" style="font-size:10px; color:${tier.color}">+${fmt(tDca)}/m</div>
            </div>
            <div style="display: flex; align-items: center; gap: 2px; background: var(--bg-card); padding: 4px 6px; border-radius: 6px; border: 1px solid var(--border); height:34px;">
              <input type="number" class="num-font" value="${tier.pctTarget.toFixed(1)}" onchange="updateTier(${tIdx}, this.value)" style="width: 38px; text-align: right; background: transparent; border: none; color: var(--text-main); font-size: 14px; font-weight: 700; outline: none;">
              <span style="font-weight: 700; color: var(--text-muted); font-size: 11px;">%</span>
            </div>
          </div>
        </div>
        <div class="asset-list">
    `;

    tier.assets.forEach((a, aIdx) => {
      const aEur = tierEur * (a.pctInternal / 100), absW = (tier.pctTarget/100)*(a.pctInternal/100);
      globalWeights.push({ weight: absW, tag: a.tag });
      sectorWeights[a.tag] = (sectorWeights[a.tag] || 0) + absW;
      
      const fStatus = aEur > 0 && aEur < 100 ? (aEur < 50 ? {t:'CRÍTICO', c:'sem-mal'} : {t:'SUBÓPTIMO', c:'sem-mmal'}) : null;
      
      tier_html += `
        <div class="asset-row">
          <input type="text" value="${a.ticker}" onchange="updateA(${tIdx},${aIdx},'ticker',this.value)" placeholder="TCK" class="a-input mono a-tck-input">
          
          <div class="a-pct-container">
            <input type="number" value="${a.pctInternal.toFixed(1)}" onchange="changeA(${tIdx},${aIdx},this.value)">
            <span style="font-size: 11px; color: var(--text-muted); font-weight:700;">%</span>
          </div>
          
          <select onchange="updateA(${tIdx},${aIdx},'tag',this.value)" class="a-select a-tag-select">
            ${SECTORS.map(s => `<option ${a.tag===s?'selected':''}>${s}</option>`).join('')}
          </select>
          
          <div class="a-financial-container">
            <span class="num-font" style="font-size: 13px; font-weight: 600; color: var(--text-main);">${fmt(aEur)}</span>
            <span class="num-font" style="font-size: 10px; color: var(--green);">+${fmt(dca*(tier.pctTarget/100)*(a.pctInternal/100))}/m</span>
            ${fStatus ? `<span class="semaforo ${fStatus.c}">${fStatus.t}</span>`: '<span style="width:1px; height:1px;"></span>'}
          </div>
          
          <button onclick="remA(${tIdx},${aIdx})" class="a-del-btn">✕</button>
        </div>
      `;
    });
    tier_html += `<button onclick="addA(${tIdx})" class="btn-add">+ Añadir Activo</button></div></div>`;
    cont.innerHTML += tier_html;
  });

  const q = calculateQuant(globalWeights, sectorWeights);
  const sV = getSem(q.vol, [0.12, 0.18, 0.25, 0.35]), sD = getSem(q.maxDD, [0.15, 0.25, 0.35, 0.45]), sC = getSem(q.corr, [0.4, 0.55, 0.7, 0.85]);
  
  document.getElementById('q-vol').textContent = (q.vol*100).toFixed(1)+'%'; document.getElementById('sem-vol').className = 'semaforo '+sV.c; document.getElementById('sem-vol').textContent = sV.s;
  document.getElementById('q-mdd').textContent = '-'+(q.maxDD*100).toFixed(1)+'%'; document.getElementById('sem-dd').className = 'semaforo '+sD.c; document.getElementById('sem-dd').textContent = sD.s;
  document.getElementById('q-cor').textContent = q.corr.toFixed(2); document.getElementById('sem-cor').className = 'semaforo '+sC.c; document.getElementById('sem-cor').textContent = sC.s;

  const t = getTypology(state.tiers[0]?state.tiers[0].pctTarget:0, state.tiers[1]?state.tiers[1].pctTarget:0, state.tiers[2]?state.tiers[2].pctTarget:0, q.maxFactorPct);
  document.getElementById('recap-tipology').textContent = t.label; document.getElementById('recap-tipology').style.color = t.color;
  document.getElementById('recap-desc').textContent = t.d;
  
  const warnEl = document.getElementById('recap-warn');
  if(q.maxFactorPct > 0.6) {
    warnEl.style.display = 'block'; warnEl.textContent = t.d;
  } else { warnEl.style.display = 'none'; }
  
  const sList = document.getElementById('sectorList'); sList.innerHTML = '';
  Object.entries(sectorWeights).sort((a,b)=>b[1]-a[1]).forEach(([s,w]) => {
    if(w<0.01) return;
    const p = (w*100).toFixed(1) + '%';
    sList.innerHTML += `<div style="display: flex; align-items: center; gap: 8px;">
      <div style="width: 120px; font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${s}">${s}</div>
      <div style="flex: 1; background: var(--bg-hover); border-radius: 4px; height: 6px; overflow: hidden;">
        <div style="width: ${p}; background: var(--blue); height: 100%; border-radius: 4px;"></div>
      </div>
      <div style="width: 38px; text-align: right; font-size: 11px; font-weight: 600; color: var(--text-main);">${p}</div>
    </div>`;
  });

  const rootStyles = getComputedStyle(document.documentElement);
  let cardBg = rootStyles.getPropertyValue('--bg-card').trim() || '#000000';

  const ctx = document.getElementById('tierChart');
  if (tierChartInstance) tierChartInstance.destroy();
  tierChartInstance = new Chart(ctx, { 
    type: 'doughnut', 
    data: { labels: state.tiers.map(t=>t.name), datasets: [{ data: state.tiers.map(t=>t.pctTarget), backgroundColor: state.tiers.map(t=>t.color), borderColor: cardBg, borderWidth: 3 }] }, 
    options: { responsive: true, maintainAspectRatio: false, cutout: '76%', events: [], plugins: { legend: { display: false }, tooltip: { enabled: false } } }
  });

  const legendContainer = document.getElementById('customLegend');
  legendContainer.innerHTML = '';
  state.tiers.forEach(t => {
    if(t.pctTarget > 0) {
      legendContainer.innerHTML += `<div style="display: flex; align-items: center; justify-content: space-between; font-size: 12px;">
        <div style="display: flex; align-items: center; gap: 6px;"><div style="width: 10px; height: 10px; border-radius: 2px; background: ${t.color};"></div><span style="color: var(--text-muted);">${t.name}</span></div>
        <span style="font-weight: 600; color: var(--text-main);">${t.pctTarget.toFixed(1)}%</span>
      </div>`;
    }
  });

  triggerAutoSave();
}

function updateTier(t, v) { autoBalanceTiers(t, parseFloat(v)||0); render(); }
function changeA(t, a, v) { autoBalanceInternals(t, a, parseFloat(v)||0); render(); }
function updateA(t, a, f, v) { state.tiers[t].assets[a][f] = v; render(); }
function addA(t) { state.tiers[t].assets.push({ ticker:"?", pctInternal:0, tag:"Otros" }); let assets=state.tiers[t].assets; assets.forEach(a=>a.pctInternal=100/assets.length); render(); }
function remA(t, a) { state.tiers[t].assets.splice(a,1); let assets=state.tiers[t].assets; assets.forEach(as=>as.pctInternal=assets.length?100/assets.length:0); render(); }

// ==========================================
// CONEXIÓN SCRIPT GOOGLE SHEETS
// ==========================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyGqcI8Xef9xZzM7levoXR-1DsfT213kwpPThKgHewHVIJYHOnLxI4A8Do50ELKXdw1/exec';
let saveTimeout;
let isInitialLoad = true;

function triggerAutoSave() {
  if (isInitialLoad) return; 
  clearTimeout(saveTimeout);
  const status = document.getElementById('syncStatus');
  if(status) { status.textContent = "Esperando..."; status.style.color = "var(--amber)"; }
  saveTimeout = setTimeout(() => { saveToSheets(); }, 2000);
}

async function loadFromSheets() {
  const status = document.getElementById('syncStatus');
  try {
    if(status) { status.textContent = "Conectando..."; status.style.color = "var(--text-muted)"; }
    const response = await fetch(SCRIPT_URL);
    const data = await response.json();
    if (data && data.tiers) {
      const defaultColors = ['#0a84ff', '#30d158', '#ff9f0a', '#ff453a', '#bf5af2', '#5e5ce6'];
      data.tiers.forEach((t, i) => { t.color = defaultColors[i % defaultColors.length]; });
      state = data;
      document.getElementById('capitalInput').value = state.capital;
      document.getElementById('dcaInput').value = state.dca;
      if(status) { status.textContent = "Sincronizado ✅"; status.style.color = "var(--green)"; }
    }
  } catch (error) {
    console.error("Error al cargar:", error);
    if(status) { status.textContent = "Modo Local ❌"; status.style.color = "var(--red)"; }
    document.getElementById('capitalInput').value = state.capital;
    document.getElementById('dcaInput').value = state.dca;
  }
  
  document.getElementById('capitalInput').addEventListener('input', render);
  document.getElementById('dcaInput').addEventListener('input', render);
  render();
  setTimeout(() => { isInitialLoad = false; }, 500);
}

async function saveToSheets() {
  const status = document.getElementById('syncStatus');
  try {
    if(status) { status.textContent = "Guardando... ⏳"; status.style.color = "var(--blue)"; }
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(state), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
    if(status) { status.textContent = "Guardado ✅"; status.style.color = "var(--green)"; }
  } catch (error) {
    if(status) { status.textContent = "Error ❌"; status.style.color = "var(--red)"; }
  }
}

window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => { render(); });

loadFromSheets();
</script>
