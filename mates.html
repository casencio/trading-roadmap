<title>Mates</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
:root {
  --o:#FF5C93; --o-soft:#FFE4EF; --o-dark:#D93D73;
  --g:#7C5CE8; --g-soft:#EDE4FF; --g-dark:#5A3DC0;
  --ok:#22C97A; --ok-dark:#17A05F; --err:#FF4757;
  --bg:#F7F4FF; --white:#FFFFFF; --text:#2D2D2D;
  --gray:#C8C8D8; --gray-lt:#EBEBF5;
  --col-u:#3498db; --col-d:#e74c3c; --col-c:#2ecc71;
  --shad:rgba(100,80,180,0.13);
  /* colores plantilla multiplicación */
  --mul-a-bg:#FFF9C4; --mul-a-bd:#D4B800;   /* amarillo: multiplicando */
  --mul-b-bg:#B2EBF2; --mul-b-bd:#00ACC1;   /* azul: multiplicador */
  --mul-p1-bg:#FFE0B2; --mul-p1-bd:#E65100; /* naranja: parcial 1 (unidades) */
  --mul-p2-bg:#B3E5FC; --mul-p2-bd:#0277BD; /* azul claro: parcial 2 (decenas) */
  --mul-r-bg:#C8E6C9;  --mul-r-bd:#388E3C;  /* verde: resultado */
}
html,body { margin:0;padding:0;width:100%;height:100%;overflow:hidden;
  font-family:'Nunito','Helvetica Neue',Arial,sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent; }
.app-wrap { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  height:100%;width:100%;box-sizing:border-box; }

/* TOP BAR */
.top-bar { background:var(--white);box-shadow:0 2px 10px var(--shad);
  padding:8px 10px;-webkit-flex-shrink:0;flex-shrink:0;z-index:10;position:relative; }
.main-row { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center; }
.ops-group { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-wrap:wrap;flex-wrap:wrap;margin-right:6px; }
.op-btn { padding:6px 12px;margin:2px 3px 2px 0;border-radius:30px;
  font-size:14px;font-weight:900;color:var(--gray);background:var(--gray-lt);
  cursor:pointer;-webkit-transition:all 0.15s;transition:all 0.15s;white-space:nowrap; }
.op-btn.active { background:var(--g);color:var(--white); }
.spacer { -webkit-box-flex:1;-webkit-flex:1;flex:1; }
.sisters-group { display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-shrink:0;flex-shrink:0; }
.sister-btn { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  padding:6px 11px 6px 7px;border-radius:30px;margin-left:5px;
  background:var(--gray-lt);font-size:14px;font-weight:900;color:var(--gray);cursor:pointer;
  -webkit-transition:all 0.15s;transition:all 0.15s; }
.sister-btn .av { width:22px;height:22px;border-radius:50%;background:var(--gray);
  color:var(--white);font-size:12px;font-weight:900;text-align:center;line-height:22px;
  margin-right:5px;-webkit-flex-shrink:0;flex-shrink:0; }
.sister-btn .pts { font-size:11px;font-weight:800;background:var(--white);
  border-radius:20px;padding:1px 6px;margin-left:5px; }
.sister-btn.act-o { background:var(--o-soft);color:var(--o); }
.sister-btn.act-o .av { background:var(--o); }
.sister-btn.act-o .pts { color:var(--o); }
.sister-btn.act-g { background:var(--g-soft);color:var(--g); }
.sister-btn.act-g .av { background:var(--g); }
.sister-btn.act-g .pts { color:var(--g); }

/* NIVELES */
.nav-levels { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  background:var(--g);padding:6px 10px;-webkit-flex-shrink:0;flex-shrink:0; }
.lvl-btn { width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.2);
  color:var(--white);font-size:17px;font-weight:900;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  margin:0 4px;cursor:pointer;-webkit-transition:all 0.15s;transition:all 0.15s; }
.lvl-btn.active { background:var(--white);color:var(--g);box-shadow:0 3px 10px rgba(0,0,0,0.2); }

/* ZONA EJERCICIO */
.exercise-area { -webkit-box-flex:1;-webkit-flex:1;flex:1;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  padding:8px 12px;width:100%;box-sizing:border-box;overflow:hidden;position:relative; }

/* TIPOGRAFÍA OPERACIONES */
.huge-row { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  -webkit-flex-wrap:wrap;flex-wrap:wrap;
  font-size:80px;font-weight:900;line-height:1; }
.ctx-row { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  -webkit-flex-wrap:wrap;flex-wrap:wrap;
  font-size:38px;font-weight:800;color:#b0a8cc;line-height:1;margin:6px 0; }

/* CAJAS */
.box { display:inline-block;width:76px;height:80px;line-height:80px;
  border:4px dashed var(--gray);border-radius:16px;background:var(--white);
  font-size:58px;font-weight:900;text-align:center;vertical-align:middle;
  box-sizing:border-box;-webkit-transition:all 0.15s;transition:all 0.15s; }
.box.static { border:4px solid var(--gray-lt);background:var(--gray-lt);color:var(--text); }
.box.carry { width:34px;height:34px;border-radius:50%;border:3px solid var(--gray);
  line-height:34px;font-size:19px;color:var(--o); }
.box.full { width:120px;margin:0 8px; }
.box.wide { width:96px;margin:0 5px; }
.box.active { border-color:var(--o);border-style:solid;background:var(--o-soft);
  -webkit-transform:scale(1.06);transform:scale(1.06);
  box-shadow:0 4px 18px rgba(255,92,147,0.28); }
.box.carry.active { border-color:var(--o);border-style:solid;background:var(--o-soft); }
.box.success { border-color:var(--ok);border-style:solid;color:var(--ok);background:#edfbf3; }
.box.error { border-color:var(--err);border-style:solid;background:#ffeeee;
  -webkit-animation:shake 0.4s;animation:shake 0.4s; }

@-webkit-keyframes shake {
  0%,100%{-webkit-transform:translateX(0);}20%{-webkit-transform:translateX(-9px);}
  40%{-webkit-transform:translateX(9px);}60%{-webkit-transform:translateX(-6px);}
  80%{-webkit-transform:translateX(6px);} }
@keyframes shake {
  0%,100%{transform:translateX(0);}20%{transform:translateX(-9px);}
  40%{transform:translateX(9px);}60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);} }

/* TABLAS VERTICALES (sumas/restas nivel 2+) */
.math-table { border-collapse:collapse;margin:0 auto; }
.math-table td { width:78px;height:80px;text-align:center;vertical-align:bottom;
  font-size:58px;font-weight:900; }
.op-sign { color:var(--g);font-size:58px !important;text-align:right;padding-right:14px; }
.line-bottom td { border-bottom:6px solid var(--text);padding-bottom:4px; }

/* ============================================================
   MULTIPLICACIÓN PLANTILLA TIPO CENTRO DISCALCULIA
   Fiel a la foto: cuadrados amarillos (multiplicando), 
   cuadrados azules (multiplicador), carries cuadraditos pequeños,
   círculos beige (parcial x unidades), círculos azules (parcial x decenas),
   cuadrados verdes (resultado)
   ============================================================ */
.mul-wrap { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  width:100%;max-width:520px; }

/* Fila carry: cuadraditos pequeños alineados con las columnas */
.mul-carry-row { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:flex-end;-webkit-justify-content:flex-end;justify-content:flex-end;
  width:100%;margin-bottom:2px; }
.mul-carry-sq { width:30px;height:30px;border:2px solid var(--gray);border-radius:5px;
  background:var(--white);font-size:17px;font-weight:900;text-align:center;line-height:30px;
  margin:0 4px;color:var(--o);display:inline-block;cursor:pointer;box-sizing:border-box; }
.mul-carry-sq.active { border-color:var(--o);background:var(--o-soft); }

/* Fila números: cuadrados amarillos (A) × cuadrados azules (B) */
.mul-nums-row { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:flex-end;-webkit-justify-content:flex-end;justify-content:flex-end;
  width:100%;margin-bottom:4px; }
.mul-sq { width:58px;height:60px;line-height:60px;border-radius:10px;
  font-size:40px;font-weight:900;text-align:center;margin:0 3px;
  display:inline-block;box-sizing:border-box; }
.mul-sq.a { background:var(--mul-a-bg);border:3px solid var(--mul-a-bd);color:#5a4a00; }
.mul-sq.b { background:var(--mul-b-bg);border:3px solid var(--mul-b-bd);color:#003d47; }
.mul-x { font-size:50px;font-weight:900;color:var(--text);margin:0 8px 0 4px; }
.mul-line { border-top:5px solid var(--text);margin:4px 0;width:100%; }

/* Filas parciales: círculos beige (row 0) y azules (row 1) */
.mul-partial-row { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  width:100%;margin-bottom:5px; }
.mul-circ { width:56px;height:56px;border-radius:50%;
  font-size:34px;font-weight:900;text-align:center;line-height:56px;
  margin:0 3px;display:inline-block;box-sizing:border-box;
  -webkit-transition:all 0.12s;transition:all 0.12s; }
.mul-circ.p1 { background:var(--mul-p1-bg);border:3px solid var(--mul-p1-bd);color:#5a2000; }
.mul-circ.p2 { background:var(--mul-p2-bg);border:3px solid var(--mul-p2-bd);color:#003060; }
.mul-circ.empty { background:var(--gray-lt);border:3px dashed var(--gray);color:var(--gray); }
.mul-circ.inp { cursor:pointer; }
.mul-circ.inp.active { border-color:var(--o);background:var(--o-soft);color:var(--text);
  -webkit-transform:scale(1.1);transform:scale(1.1); }
.mul-circ.success { border-color:var(--ok);background:#edfbf3;color:var(--ok); }
.mul-circ.error { border-color:var(--err);background:#ffeeee;
  -webkit-animation:shake 0.4s;animation:shake 0.4s; }
/* El cero fijo del parcial 2 */
.mul-circ.zero { background:var(--mul-p2-bg);border:3px solid var(--mul-p2-bd);
  color:#88aacc;font-size:28px; }

/* Carry de los parciales (cuadraditos pequeños encima) */
.mul-pcarry-row { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  width:100%;margin-bottom:1px; }
.mul-pcarry { width:30px;height:30px;border:2px solid var(--gray);border-radius:5px;
  background:var(--white);font-size:15px;font-weight:900;text-align:center;line-height:30px;
  margin:0 5px;color:var(--o);display:inline-block;cursor:pointer;box-sizing:border-box; }
.mul-pcarry.active { border-color:var(--o);background:var(--o-soft); }

/* Resultado final: cuadrados verdes */
.mul-result-row { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  width:100%; }
.mul-plus { font-size:44px;font-weight:900;color:var(--g);margin-right:6px; }
.mul-res-sq { width:58px;height:60px;line-height:60px;border-radius:10px;
  font-size:38px;font-weight:900;text-align:center;margin:0 3px;
  display:inline-block;box-sizing:border-box; }
.mul-res-sq.filled { background:var(--mul-r-bg);border:3px solid var(--mul-r-bd);color:#1a4a1a; }
.mul-res-sq.inp { background:var(--white);border:4px dashed var(--gray);cursor:pointer;
  -webkit-transition:all 0.12s;transition:all 0.12s; }
.mul-res-sq.inp.active { border-color:var(--o);background:var(--o-soft);border-style:solid; }
.mul-res-sq.success { border-color:var(--ok);border-style:solid;background:#edfbf3;color:var(--ok); }
.mul-res-sq.error { border-color:var(--err);border-style:solid;background:#ffeeee;
  -webkit-animation:shake 0.4s;animation:shake 0.4s; }

/* DIVISIONES */
.div-wrapper { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  width:100%;max-width:500px; }
.div-top { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  background:var(--g-soft);border:3px solid var(--g);border-radius:22px;
  padding:10px 20px;margin-bottom:16px; }
.div-top-n { font-size:56px;font-weight:900;color:var(--o);margin:0 5px; }
.div-top-s { font-size:50px;font-weight:900;color:var(--g);margin:0 3px; }
.div-top-eq { font-size:46px;font-weight:900;color:var(--text);margin:0 5px; }
.div-work { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:flex-start;-webkit-align-items:flex-start;align-items:flex-start; }
.div-left { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-align:flex-end;-webkit-align-items:flex-end;align-items:flex-end;margin-right:10px; }
.div-digits { display:-webkit-box;display:-webkit-flex;display:flex;margin-bottom:8px; }
.div-dbox { width:54px;height:58px;line-height:58px;background:#f0ecff;
  border:3px solid var(--g);border-radius:10px;font-size:38px;font-weight:900;
  color:var(--g-dark);text-align:center;margin:0 2px; }
.div-calc-row { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-bottom:5px; }
.div-calc-label { font-size:15px;font-weight:900;color:var(--gray);width:38px;text-align:right;margin-right:5px; }
.div-calc-box { width:50px;height:54px;line-height:54px;border:3px dashed var(--gray);
  border-radius:10px;background:var(--white);font-size:34px;font-weight:900;
  text-align:center;margin:0 2px; }
.div-line-h { border-top:4px solid var(--gray);margin:5px 0;width:100%; }
.div-resto-row { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-top:4px; }
.div-resto-label { font-size:16px;font-weight:900;color:var(--o);margin-right:8px; }
.div-right { border-left:6px solid var(--text);border-bottom:6px solid var(--text);
  padding:8px 10px 12px 12px;min-width:80px; }
.div-right-num { font-size:42px;font-weight:900;color:var(--g);text-align:center;margin-bottom:6px; }
.div-tabla-line { border-top:3px solid var(--gray);margin-bottom:4px; }
.div-hint { font-size:11px;color:var(--gray);font-weight:800;text-align:center; }

/* Botón ayuda + panel */
.ayuda-btn { display:inline-block;padding:5px 14px;border-radius:20px;
  background:var(--o-soft);color:var(--o);font-size:14px;font-weight:900;
  border:2px solid var(--o);cursor:pointer;margin-bottom:10px;
  -webkit-transition:all 0.15s;transition:all 0.15s; }
.ayuda-panel { position:fixed;right:8px;top:50%;margin-top:-170px;
  width:128px;background:var(--white);border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.18);border:2px solid var(--g);
  z-index:200;padding:10px 8px;display:none; }
.ayuda-panel.show { display:block; }
.ayuda-title { font-size:13px;font-weight:900;color:var(--g);text-align:center;margin-bottom:5px; }
.ayuda-nav { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;margin-bottom:5px; }
.ayuda-arrow { width:26px;height:26px;border-radius:50%;background:var(--g-soft);
  color:var(--g);font-size:16px;font-weight:900;text-align:center;line-height:26px;cursor:pointer; }
.ayuda-base-num { font-size:19px;font-weight:900;color:var(--g);margin:0 8px; }
.ayuda-rows { font-size:12px;font-weight:800;line-height:1.65;text-align:center; }
.ayuda-rows b { color:var(--o); }
.ayuda-close { display:block;text-align:center;margin-top:6px;
  font-size:12px;font-weight:900;color:var(--gray);cursor:pointer; }

/* ============================================================
   COMBINADAS — nueva UX
   Enunciado arriba (mismo tamaño que el paso), paso abajo.
   Siempre alineados columna a columna.
   ============================================================ */
.com-wrap { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  width:100%;max-width:560px; }

/* Línea de operación — usada tanto para enunciado como para paso */
.com-line { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  -webkit-flex-wrap:wrap;flex-wrap:wrap;
  font-size:62px;font-weight:900;line-height:1.1;margin:4px 0; }
/* Enunciado original: mismo tamaño pero gris cuando ya es referencia */
.com-line.ref { color:#b0a8cc;font-size:52px; }
/* Separador entre enunciado y paso */
.com-sep { width:80%;border-top:3px dashed var(--gray-lt);margin:6px 0; }

/* Token dentro de la línea — número, signo o paréntesis */
.com-tok { display:inline-block;text-align:center;vertical-align:middle; }
/* Paréntesis resaltado (paso 1): color naranja, ligeramente más grande */
.com-tok.par-active { color:var(--o); }
/* Paréntesis ya resuelto: gris */
.com-tok.par-done { color:var(--gray); }
/* Bloque tapable (paréntesis completo) que se convierte en caja */
.com-par-block { display:inline-block;vertical-align:middle;cursor:pointer;
  padding:2px 6px;border-radius:12px;
  border:3px solid transparent;
  -webkit-transition:all 0.15s;transition:all 0.15s; }
.com-par-block:active { background:var(--o-soft);border-color:var(--o); }
.com-par-block.selected { background:var(--o-soft);border-color:var(--o); }

/* Etiqueta de fase, justo a la izquierda de la línea de paso */
.com-phase-label { font-size:16px;font-weight:900;color:var(--g);
  background:var(--g-soft);border-radius:20px;padding:3px 12px;
  margin-bottom:5px;text-align:center; }

/* TABLAS MULTIPLICAR (nivel 1 mult) */
.tabla-wrap { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;width:100%; }
.tabla-ctx { font-size:38px;font-weight:800;color:#b0a8cc;margin:6px 0; }
.tabla-main { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  font-size:72px;font-weight:900;background:var(--white);border-radius:26px;
  padding:14px 28px;box-shadow:0 6px 28px var(--shad);margin:8px 0; }

/* TECLADO */
.numpad-wrap { background:var(--white);box-shadow:0 -2px 14px var(--shad);
  padding:7px 8px 10px 8px;-webkit-flex-shrink:0;flex-shrink:0; }
.numpad { display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-wrap:wrap;flex-wrap:wrap;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  max-width:460px;margin:0 auto; }
.num-key { width:85px;height:56px;margin:4px;background:var(--gray-lt);
  border-radius:14px;box-shadow:0 4px 0 #d0c8e8;font-size:28px;font-weight:900;
  color:var(--text);display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  cursor:pointer;-webkit-transition:-webkit-transform 0.08s,box-shadow 0.08s;
  transition:transform 0.08s,box-shadow 0.08s; }
.num-key:active { -webkit-transform:translateY(4px);transform:translateY(4px);box-shadow:0 0 0 #d0c8e8; }
.num-key.key-del { background:#ffe4ef;color:var(--o);box-shadow:0 4px 0 #f0c0d0;font-size:20px; }
.num-key.key-ok  { background:var(--ok);color:var(--white);box-shadow:0 4px 0 var(--ok-dark);width:184px;font-size:20px; }
.num-key.key-next{ background:var(--g);color:var(--white);box-shadow:0 4px 0 var(--g-dark);width:184px;font-size:18px; }

/* EFECTOS */
.cfp { position:fixed;top:-30px;width:13px;height:13px;border-radius:3px;
  pointer-events:none;z-index:999;
  -webkit-animation:cffall 2.2s linear forwards;animation:cffall 2.2s linear forwards; }
@-webkit-keyframes cffall { to{-webkit-transform:translateY(110vh) rotate(540deg);opacity:0;} }
@keyframes cffall { to{transform:translateY(110vh) rotate(540deg);opacity:0;} }
.flash-ov { position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;
  z-index:500;opacity:0;-webkit-transition:opacity 0.12s;transition:opacity 0.12s; }
.flash-ov.green { background:rgba(34,201,122,0.2); }
.flash-ov.red   { background:rgba(255,71,87,0.2); }
.flash-ov.show  { opacity:1; }
.pts-pop { position:fixed;left:50%;top:28%;font-size:56px;font-weight:900;color:var(--ok);
  text-shadow:0 3px 14px rgba(0,0,0,0.18);pointer-events:none;z-index:998;
  -webkit-transform:translateX(-50%);transform:translateX(-50%);
  -webkit-animation:ptspop 1.3s ease-out forwards;animation:ptspop 1.3s ease-out forwards; }
@-webkit-keyframes ptspop {
  0%{opacity:0;-webkit-transform:translateX(-50%) scale(0.4);}
  25%{opacity:1;-webkit-transform:translateX(-50%) translateY(-14px) scale(1.25);}
  65%{opacity:1;-webkit-transform:translateX(-50%) translateY(-36px) scale(1);}
  100%{opacity:0;-webkit-transform:translateX(-50%) translateY(-65px) scale(0.85);} }
@keyframes ptspop {
  0%{opacity:0;transform:translateX(-50%) scale(0.4);}
  25%{opacity:1;transform:translateX(-50%) translateY(-14px) scale(1.25);}
  65%{opacity:1;transform:translateX(-50%) translateY(-36px) scale(1);}
  100%{opacity:0;transform:translateX(-50%) translateY(-65px) scale(0.85);} }
.star-pop { position:fixed;left:50%;top:50%;font-size:88px;pointer-events:none;z-index:997;
  -webkit-transform:translate(-50%,-50%) scale(0);transform:translate(-50%,-50%) scale(0);
  -webkit-animation:starout 0.65s ease-out forwards;animation:starout 0.65s ease-out forwards; }
@-webkit-keyframes starout {
  0%{-webkit-transform:translate(-50%,-50%) scale(0);opacity:1;}
  60%{-webkit-transform:translate(-50%,-50%) scale(1.4);opacity:1;}
  100%{-webkit-transform:translate(-50%,-50%) scale(1.1);opacity:0;} }
@keyframes starout {
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  60%{transform:translate(-50%,-50%) scale(1.4);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1.1);opacity:0;} }
</style>

<body>
<div class="app-wrap">
  <div class="top-bar">
    <div class="main-row">
      <div class="ops-group">
        <div class="op-btn active" id="op_SUM" onclick="setTag('SUM')">Sumas</div>
        <div class="op-btn" id="op_RES" onclick="setTag('RES')">Restas</div>
        <div class="op-btn" id="op_MUL" onclick="setTag('MUL')">Mult</div>

        </div>

  <div class="nav-levels">

</div>

</div>

<script>
// ============================================================
// UTIL ES5
// ============================================================
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function $(id){return document.getElementById(id);}

// ============================================================
// COOKIES
// ============================================================
function setCookie(name,val,hours){
  var d=new Date();d.setTime(d.getTime()+hours*3600000);
  document.cookie=name+'='+encodeURIComponent(val)+';expires='+d.toUTCString()+';path=/';
}
function getCookie(name){
  var n=name+'=',ca=document.cookie.split(';');
  for(var i=0;i<ca.length;i++){
    var c=ca[i];while(c.charAt(0)===' ')c=c.substring(1);
    if(c.indexOf(n)===0)return decodeURIComponent(c.substring(n.length));
  }return null;
}

var currentSister='olivia',currentTag='SUM',currentLevel=1;
var scores={olivia:0,gala:0};
var expectedAnswers={},activeBoxId=null;
var comData={},tablaData={};
var comInProgress=false,randomLvlUsed=1;
var ptsTable={1:1,2:2,3:3,4:5,5:8};
var ayudaBase=2;

window.onload=function(){loadScores();renderNumpad();generateExercise();};

// SCORES
// ============================================================
function loadScores(){
  var raw=getCookie('mates_scores');
  if(raw){try{var p=JSON.parse(raw);
    if(typeof p.olivia==='number')scores.olivia=p.olivia;
    if(typeof p.gala==='number')scores.gala=p.gala;
  }catch(e){}}
  updateScoreUI();
}
function saveScores(){setCookie('mates_scores',JSON.stringify(scores),24);}
function addPoint(){
  var lvl=(currentTag==='RAN')?randomLvlUsed:currentLevel;
  var pts=ptsTable[lvl]||1;
  scores[currentSister]+=pts;saveScores();updateScoreUI();showPtsPopup('+'+pts+' pts');
}
function updateScoreUI(){$('pts_olivia').textContent=scores.olivia;$('pts_gala').textContent=scores.gala;}

function switchSister(s){
  currentSister=s;
  $('btn_olivia').className='sister-btn'+(s==='olivia'?' act-o':'');
  $('btn_gala').className='sister-btn'+(s==='gala'?' act-g':'');
}
function setTag(tag){
  currentTag=tag;
  var tags=['SUM','RES','MUL','DIV','COM','RAN'];
  for(var i=0;i<tags.length;i++)$('op_'+tags[i]).className='op-btn'+(tags[i]===tag?' active':'');
  generateExercise();
}
function setLevel(lvl){
  currentLevel=lvl;
  for(var i=1;i<=5;i++)$('lvl_'+i).className='lvl-btn'+(i===lvl?' active':'');
  generateExercise();
}

// ============================================================
// TECLADO
// ============================================================
function renderNumpad(){_buildPad([7,8,9,'C',4,5,6,0,1,2,3,'OK']);}
function renderNumpadNext(){_buildPad([7,8,9,'C',4,5,6,0,1,2,3,'SIG']);}
function _buildPad(keys){
  var html='';
  for(var i=0;i<keys.length;i++){
    var k=keys[i],cls='num-key';
    if(k==='C')cls+=' key-del';
    if(k==='OK')cls+=' key-ok';
    if(k==='SIG')cls+=' key-next';
    html+='<div class="'+cls+'" onclick="pressKey(\''+k+'\')">'+(k==='SIG'?'Siguiente':k)+'</div>';
  }
  $('numpadArea').innerHTML=html;
}

function activateBox(id){
  if(activeBoxId){
    var old=$(activeBoxId);
    if(old)old.className=old.className.replace(/\s*active/g,'');
  }
  activeBoxId=id;
  var nb=$(id);if(nb)nb.className+=' active';
}

function pressKey(k){
  if(k==='SIG'){generateExercise();return;}
  if(!activeBoxId)return;
  if(k==='OK'){checkAnswers();return;}
  var box=$(activeBoxId);if(!box)return;
  if(k==='C'){box.textContent='';return;}
  var multi=(activeBoxId.indexOf('full')>-1||activeBoxId.indexOf('wide')>-1||
             activeBoxId.indexOf('coc')>-1||activeBoxId.indexOf('res')>-1||
             activeBoxId.indexOf('tab_')>-1||activeBoxId.indexOf('mres_')>-1);
  if(multi){if(box.textContent.length<5)box.textContent+=k;}
  else{
    box.textContent=k;
    // Auto-avance en cajas de un dígito
    if(activeBoxId.indexOf('ans_')===0){
      var idx=parseInt(activeBoxId.replace('ans_',''),10);
      var nxt='ans_'+(idx+1);if($(nxt)){activateBox(nxt);return;}
    }
    if(activeBoxId.indexOf('mc_')===0){
      var parts=activeBoxId.split('_');
      var row=parseInt(parts[1],10),col=parseInt(parts[2],10);
      var nxtId='mc_'+row+'_'+(col+1);
      if(!$(nxtId))nxtId='mc_'+(row+1)+'_0';
      if($(nxtId)){activateBox(nxtId);return;}
    }
  }
}

// ============================================================
// GENERADOR
// ============================================================
function generateExercise(){
  expectedAnswers={};activeBoxId=null;comInProgress=false;
  renderNumpad();hideAyuda();
  var lvl=currentLevel;
  if(currentTag==='RAN'){
    randomLvlUsed=lvl;
    var tipos=(lvl<=2)?['SUM','RES','MUL']:['SUM','RES','MUL','DIV','COM'];
    _runTag(tipos[Math.floor(Math.random()*tipos.length)],lvl);
  }else{_runTag(currentTag,lvl);}
}
function _runTag(tag,lvl){
  if(tag==='SUM')genSuma(lvl);
  else if(tag==='RES')genResta(lvl);
  else if(tag==='MUL')genMult(lvl);
  else if(tag==='DIV')genDiv(lvl);
  else if(tag==='COM')genCom(lvl);
}

// ============================================================
// SUMAS / RESTAS
// ============================================================
function genSuma(lvl){
  var a,b;
  if(lvl===1){a=rand(1,5);b=rand(1,5);}
  else if(lvl===2){a=rand(5,19);b=rand(5,19);}
  else if(lvl===3){a=rand(20,99);b=rand(20,99);}
  else if(lvl===4){a=rand(100,499);b=rand(100,499);}
  else{a=rand(500,9999);b=rand(500,9999);}
  if(lvl===1)renderHoriz(a,b,'+',a+b);else renderVertical(a,b,'+',a+b);
}
function genResta(lvl){
  var a,b;
  if(lvl===1){b=rand(1,4);a=rand(b,b+4);}
  else if(lvl===2){a=rand(10,29);b=rand(1,a);}
  else if(lvl===3){a=rand(30,99);b=rand(10,a);}
  else if(lvl===4){a=rand(100,499);b=rand(50,a);}
  else{a=rand(500,9999);b=rand(100,a);}
  if(lvl===1)renderHoriz(a,b,'-',a-b);else renderVertical(a,b,'-',a-b);
}

// ============================================================
// MULTIPLICACIONES
// Nivel 1 = Tablas (horizontal con contexto)
// Nivel 2 = horizontal 1 dígito x 1 dígito
// Nivel 3 = vertical N x 1 dígito
// Nivel 4-5 = plantilla discalculia (2 dígitos x 2 dígitos)
// ============================================================
function genMult(lvl){
  if(lvl===1){genTabla();return;}
  var a,b;
  if(lvl===2){a=rand(2,9);b=rand(2,9);}
  else if(lvl===3){a=rand(10,99);b=rand(2,9);}
  else if(lvl===4){a=rand(20,99);b=rand(10,19);}
  else{a=rand(20,99);b=rand(12,29);}
  if(lvl===2)renderHoriz(a,b,'x',a*b);
  else if(lvl===3)renderVertical(a,b,'x',a*b);
  else renderMulPlantilla(a,b);
}

function genTabla(){
  tablaData.base=rand(2,5);tablaData.factor=rand(2,10);
  tablaData.result=tablaData.base*tablaData.factor;renderTabla();
}
function renderTabla(){
  var b=tablaData.base,f=tablaData.factor,r=tablaData.result;
  expectedAnswers={'tab_ans':String(r)};
  var html='<div class="tabla-wrap">';
  html+='<div class="tabla-ctx">'+(f>1?b+' x '+(f-1)+' = '+(b*(f-1)):'&nbsp;')+'</div>';
  html+='<div class="tabla-main">'+b+' x '+f+' = ';
  html+='<div class="box full" id="tab_ans" onclick="activateBox(\'tab_ans\')"></div></div>';
  html+='<div class="tabla-ctx" id="tab_next">'+b+' x '+(f+1)+' = ?</div>';
  html+='</div>';
  $('exerciseArea').innerHTML=html;
  renderNumpadNext();activateBox('tab_ans');
}

// ============================================================
// MUL PLANTILLA (niveles 4-5) — fiel a la foto del centro
// A x B donde B es 2 dígitos (ej. 75 x 19)
// Fila amarilla: dígitos de A
// Fila azul: dígitos de B (el multiplicador)
// Parcial 1 (círculos beige): A x unidades(B)
// Parcial 2 (círculos azules): A x decenas(B) — desplazado, primer círculo = 0
// Resultado (cuadrados verdes): suma de parciales
// Carries (cuadraditos) encima de cada fila de círculos
// ============================================================
function renderMulPlantilla(a,b){
  var bU=b%10,bD=Math.floor(b/10);
  var p1=a*bU,p2=a*bD,res=a*b;
  var strA=String(a),strB=String(b);
  var strP1=String(p1).split('').reverse();
  var strP2=String(p2).split('').reverse();
  var strRes=String(res).split('').reverse();
  // Columnas totales = max de todos los resultados + 1 (por desplazamiento p2)
  var cols=Math.max(strP1.length,strP2.length+1,strRes.length);

  // Respuestas esperadas
  for(var i=0;i<strP1.length;i++)expectedAnswers['mc_0_'+i]=strP1[i];
  for(var i=0;i<strP2.length;i++)expectedAnswers['mc_1_'+i]=strP2[i];
  for(var i=0;i<strRes.length;i++)expectedAnswers['mres_'+i]=strRes[i];

  var html='<div class="mul-wrap">';

  // ---- Carries de las filas de números (encima de los amarillos) ----
  html+='<div class="mul-carry-row">';
  for(var c=cols-1;c>=0;c--){
    html+='<div class="mul-carry-sq" id="cA_'+c+'" onclick="activateBox(\'cA_'+c+'\')">&nbsp;</div>';
  }
  html+='</div>';

  // ---- Fila A (amarillo) + × + Fila B (azul) ----
  html+='<div class="mul-nums-row">';
  for(var i=0;i<strA.length;i++)html+='<div class="mul-sq a">'+strA[i]+'</div>';
  html+='<span class="mul-x">x</span>';
  for(var i=0;i<strB.length;i++)html+='<div class="mul-sq b">'+strB[i]+'</div>';
  html+='</div>';
  html+='<div class="mul-line"></div>';

  // ---- Carries fila parcial 1 ----
  html+='<div class="mul-pcarry-row">';
  // Espacio a la izquierda para alinear con los círculos
  var leftPad=cols-strP1.length;
  for(var c=0;c<leftPad;c++)html+='<div style="width:62px;display:inline-block;"></div>';
  for(var c=strP1.length-1;c>=0;c--){
    html+='<div class="mul-pcarry" id="cp1_'+c+'" onclick="activateBox(\'cp1_'+c+'\')">&nbsp;</div>';
  }
  html+='</div>';

  // ---- Parcial 1: círculos beige (A x unidades B) ----
  html+='<div class="mul-partial-row">';
  // Casillas vacías a la izquierda
  for(var c=cols-1;c>=0;c--){
    if(c<strP1.length){
      html+='<div class="mul-circ p1 inp" id="mc_0_'+c+'" onclick="activateBox(\'mc_0_'+c+'\')">&nbsp;</div>';
    }else{
      html+='<div class="mul-circ empty">&nbsp;</div>';
    }
  }
  html+='</div>';

  // ---- Carries fila parcial 2 (solo si hay decenas) ----
  if(bD>0){
    html+='<div class="mul-pcarry-row">';
    // El parcial 2 ocupa strP2.length+1 posiciones (la +1 es el cero)
    var leftPad2=cols-(strP2.length+1);
    for(var c=0;c<leftPad2;c++)html+='<div style="width:62px;display:inline-block;"></div>';
    // Carries sobre los dígitos del parcial 2 (sin el cero)
    for(var c=strP2.length-1;c>=0;c--){
      html+='<div class="mul-pcarry" id="cp2_'+c+'" onclick="activateBox(\'cp2_'+c+'\')">&nbsp;</div>';
    }
    // Espacio sobre el cero
    html+='<div style="width:62px;display:inline-block;"></div>';
    html+='</div>';

    // ---- Parcial 2: círculos azules (A x decenas B), desplazado ----
    html+='<div class="mul-partial-row">';
    for(var c=cols-1;c>=0;c--){
      if(c===0){
        // Cero fijo (desplazamiento)
        html+='<div class="mul-circ zero">0</div>';
      }else if(c-1<strP2.length){
        html+='<div class="mul-circ p2 inp" id="mc_1_'+(c-1)+'" onclick="activateBox(\'mc_1_'+(c-1)+'\')">&nbsp;</div>';
      }else{
        html+='<div class="mul-circ empty">&nbsp;</div>';
      }
    }
    html+='</div>';
  }

  // ---- Línea suma final ----
  html+='<div class="mul-line"></div>';

  // ---- Resultado: cuadrados verdes ----
  html+='<div class="mul-result-row">';
  html+='<span class="mul-plus">+</span>';
  for(var c=cols-1;c>=0;c--){
    if(c<strRes.length){
      html+='<div class="mul-res-sq inp" id="mres_'+c+'" onclick="activateBox(\'mres_'+c+'\')">&nbsp;</div>';
    }else{
      html+='<div class="mul-res-sq filled">&nbsp;</div>';
    }
  }
  html+='</div>';

  html+='</div>';
  $('exerciseArea').innerHTML=html;
  // Activar primer círculo del parcial 1
  activateBox('mc_0_'+(strP1.length-1));
}

// ============================================================
// DIVISIONES
// ============================================================
function genDiv(lvl){
  var divisor,cociente,dividendo,resto;
  if(lvl===1){
    divisor=rand(2,4);cociente=rand(2,4);dividendo=divisor*cociente;
    renderDivHorizConAyuda(dividendo,divisor,cociente);return;
  }
  if(lvl===2){divisor=rand(2,5);dividendo=rand(10,49);}
  else if(lvl===3){divisor=rand(2,9);dividendo=rand(20,99);}
  else if(lvl===4){divisor=rand(3,9);dividendo=rand(50,200);}
  else{divisor=rand(4,9);dividendo=rand(100,999);}
  cociente=Math.floor(dividendo/divisor);resto=dividendo%divisor;
  renderDivPlantilla(dividendo,divisor,cociente,resto);
}

// ============================================================
// OPERACIONES COMBINADAS — nueva UX
//
// La idea:
// - comData.original = string del enunciado completo
// - comData.steps = array de pasos
// - Cada paso tiene:
//     inst: 1/2/3 (qué regla aplica)
//     label: texto de la fase ("1. Parentesis", etc.)
//     tokens: array de tokens del enunciado en ese momento
//       Cada token: { type:'num'/'op'/'par', text, parIdx (si es par) }
//     parIdx: índice del paréntesis activo (null si no toca elegir)
//     exp: resultado esperado del elemento activo
//
// Flujo:
// 1. Se muestra enunciado original arriba (grande)
// 2. Si el paso tiene paréntesis para elegir, se muestran resaltados y clickables
// 3. Al tocar un paréntesis → aparece caja para escribir resultado
// 4. OK correcto → enunciado sube como referencia gris, paso resuelto baja
// 5. Siguiente paso: referencia anterior arriba, nueva expresión abajo
// ============================================================

// comData:
// { original, steps:[], curr, refLine:'', tokens:[] }
// step: { inst, label, expr (string), pars:[{start,end,inner,exp}], activeParIdx }

function genCom(lvl){
  var steps=[];
  var a,b,c,d,e,f;

  if(lvl===1){
    // 2+( 5-3 ) → solo 1 par, suma/resta, nums 1-8
    a=rand(1,5);b=rand(4,8);c=rand(1,3);
    var r1=b-c,r2=a+r1;
    steps=[
      {inst:1,label:'1. Parentesis ( )',
       expr:a+' + ( '+b+' - '+c+' )',
       pars:[{inner:b+' - '+c,exp:String(r1)}]},
      {inst:3,label:'3. Sumar y restar',
       expr:a+' + '+r1,pars:[]},
    ];
    steps[1].exp=String(r2);
  } else if(lvl===2){
    a=rand(2,7);b=rand(5,12);c=rand(2,5);
    var r1=b-c,r2=a+r1;
    steps=[
      {inst:1,label:'1. Parentesis ( )',
       expr:a+' + ( '+b+' - '+c+' )',
       pars:[{inner:b+' - '+c,exp:String(r1)}]},
      {inst:3,label:'3. Sumar y restar',expr:a+' + '+r1,pars:[],exp:String(r2)},
    ];
  } else if(lvl===3){
    a=rand(1,5);b=rand(2,4);c=rand(4,9);d=rand(1,4);
    var r1=c-d,r2=b*r1,r3=a+r2;
    steps=[
      {inst:1,label:'1. Parentesis ( )',
       expr:a+' + '+b+' x ( '+c+' - '+d+' )',
       pars:[{inner:c+' - '+d,exp:String(r1)}]},
      {inst:2,label:'2. Multiplicar',expr:a+' + '+b+' x '+r1,pars:[],exp:String(r2),
       activeOp:{pre:a+' + ',op:'x',left:String(b),right:String(r1),post:''}},
      {inst:3,label:'3. Sumar y restar',expr:a+' + '+r2,pars:[],exp:String(r3)},
    ];
  } else if(lvl===4){
    // dos paréntesis
    a=rand(2,6);b=rand(1,4);c=rand(2,6);d=rand(3,8);e=rand(1,3);
    var r1=b+c,r2=d-e,r3=a*r1+r2;
    steps=[
      {inst:1,label:'1. Parentesis ( )',
       expr:a+' x ( '+b+' + '+c+' ) + ( '+d+' - '+e+' )',
       pars:[{inner:b+' + '+c,exp:String(r1)},{inner:d+' - '+e,exp:String(r2)}]},
      {inst:2,label:'2. Multiplicar',expr:a+' x '+r1+' + '+r2,pars:[],exp:String(a*r1)},
      {inst:3,label:'3. Sumar y restar',expr:(a*r1)+' + '+r2,pars:[],exp:String(r3)},
    ];
  } else {
    // nivel 5: dos pars + dos multiplicaciones
    a=rand(3,7);b=rand(2,5);c=rand(2,5);d=rand(4,9);e=rand(2,4);f=rand(2,5);
    var r1=b+c,r2=d-e,r3=a*r1,r4=r2*f;
    var r5=r3-r4;if(r5<0){f=1;r4=r2*f;r5=r3-r4;}
    steps=[
      {inst:1,label:'1. Parentesis ( )',
       expr:a+' x ( '+b+' + '+c+' ) - ( '+d+' - '+e+' ) x '+f,
       pars:[{inner:b+' + '+c,exp:String(r1)},{inner:d+' - '+e,exp:String(r2)}]},
      {inst:2,label:'2. Multiplicar (x'+a+')',expr:a+' x '+r1+' - '+r2+' x '+f,pars:[],exp:String(r3)},
      {inst:2,label:'2. Multiplicar (x'+f+')',expr:r3+' - '+r2+' x '+f,pars:[],exp:String(r4)},
      {inst:3,label:'3. Restar',expr:r3+' - '+r4,pars:[],exp:String(r5)},
    ];
  }

  comData={steps:steps,curr:0,refLine:'',activeParIdx:null};
  comInProgress=true;
  renderComStep();
}

function renderComStep(){
  var step=comData.steps[comData.curr];
  var html='<div class="com-wrap">';

  // Línea de referencia (enunciado original o paso anterior resuelto)
  if(comData.refLine){
    html+='<div class="com-line ref">'+comData.refLine+'</div>';
    html+='<div class="com-sep"></div>';
  }

  // Etiqueta de fase (a la izquierda del paso)
  html+='<div class="com-phase-label">'+step.label+'</div>';

  // Si el paso tiene paréntesis para resolver:
  if(step.pars && step.pars.length>0){
    // Aún no se ha tocado ningún paréntesis → mostrarlos todos resaltados y clickables
    if(comData.activeParIdx===null){
      expectedAnswers={};
      html+=buildComLineWithPars(step.expr,step.pars,null,false);
      if(step.pars.length>1){
        html+='<div style="font-size:16px;font-weight:800;color:var(--g);margin-top:8px;">Toca el parentesis que quieres resolver</div>';
      }else{
        // 1 solo par: activar directamente
        html+='</div>';
        $('exerciseArea').innerHTML=html;
        comSelectPar(0);return;
      }
    } else {
      // Un paréntesis seleccionado → mostrar línea con caja en ese par
      var parObj=step.pars[comData.activeParIdx];
      expectedAnswers={'ans_full':parObj.exp};
      html+=buildComLineWithPars(step.expr,step.pars,comData.activeParIdx,true);
    }
  } else {
    // Paso sin paréntesis: expresión directa con caja
    expectedAnswers={'ans_full':step.exp};
    html+='<div class="com-line">'+step.expr+' = <div class="box full" id="ans_full" onclick="activateBox(\'ans_full\')"></div></div>';
  }

  html+='</div>';
  $('exerciseArea').innerHTML=html;

  if(comData.activeParIdx!==null || (step.pars&&step.pars.length===0)){
    activateBox('ans_full');
  }
}

// Construye la línea de la expresión con los paréntesis resaltados/clickables
// selectedIdx: índice del par seleccionado (null = todos clickables)
// showBox: si true, el par seleccionado se reemplaza por la caja
function buildComLineWithPars(expr,pars,selectedIdx,showBox){
  // Localizar los paréntesis en el string y sustituirlos por spans/cajas
  var result=expr;
  // Hacemos la sustitución de atrás hacia adelante para no desplazar índices
  // Buscamos '( inner )' para cada par
  var html='<div class="com-line">';
  // Trabajamos token a token: buscamos ( ... ) en el expr
  var remaining=expr;
  var parFoundIdx=0;
  var out='';
  var i=0;
  while(i<remaining.length){
    if(remaining[i]==='('){
      var close=remaining.indexOf(')',i);
      if(close>-1){
        var inner=remaining.substring(i+1,close); // incluye espacios
        var pIdx=parFoundIdx;parFoundIdx++;
        var isSelected=(selectedIdx===pIdx);
        var isDone=(selectedIdx!==null&&pIdx<selectedIdx);
        if(showBox&&isSelected){
          // Reemplazar por la caja
          out+='<div class="box full" id="ans_full" onclick="activateBox(\'ans_full\')"></div>';
        } else if(isDone){
          // Paréntesis ya resuelto: gris
          out+='<span class="com-tok par-done">( '+inner.trim()+' )</span>';
        } else {
          // Paréntesis pendiente: naranja, clickable
          out+='<span class="com-par-block'+(isSelected?' selected':'')+'" onclick="comSelectPar('+pIdx+')"><span class="com-tok par-active">( '+inner.trim()+' )</span></span>';
        }
        i=close+1;
      } else {i++;out+=remaining[i-1];}
    } else {out+=remaining[i];i++;}
  }
  html+=out+'</div>';
  return html;
}

// El usuario toca un paréntesis
function comSelectPar(pIdx){
  comData.activeParIdx=pIdx;
  renderComStep();
}

// ============================================================
// CHECK
// ============================================================
function checkAnswers(){
  var allOk=true;
  for(var key in expectedAnswers){
    var box=$(key);if(!box){allOk=false;continue;}
    var val=box.textContent.replace(/\s/g,'');
    if(val!==expectedAnswers[key]){
      allOk=false;
      (function(b){
        var oc=b.className.replace(/ error/g,'');
        b.className=oc+' error';
        setTimeout(function(){b.className=oc;},520);
      })(box);
    }else{box.className=box.className.replace(/ success/g,'')+' success';}
  }
  if(allOk){
    flashScreen('green');showStar();throwConfetti();
    if(!comInProgress)addPoint();
    setTimeout(function(){
      if(currentTag==='MUL'&&currentLevel===1){
        var nxt=$('tab_next');
        if(nxt)nxt.textContent=tablaData.base+' x '+(tablaData.factor+1)+' = '+(tablaData.base*(tablaData.factor+1));
      } else if(comInProgress){
        advanceCom();
      } else {
        generateExercise();
      }
    },1200);
  }else{flashScreen('red');}
}

function advanceCom(){
  var step=comData.steps[comData.curr];

  if(step.pars&&step.pars.length>0&&comData.activeParIdx!==null){
    // Hemos resuelto un paréntesis: sustituirlo en la expr y ver si quedan más
    var parObj=step.pars[comData.activeParIdx];
    // Reemplazar '( inner )' por el resultado en el expr
    var inner=parObj.inner;
    step.expr=step.expr.replace('( '+inner+' )',parObj.exp);
    // Marcar ese par como hecho (lo eliminamos del array)
    step.pars.splice(comData.activeParIdx,1);
    comData.activeParIdx=null;
    if(step.pars.length>0){
      // Quedan más paréntesis en este paso
      renderComStep();return;
    }
    // Todos los paréntesis de este paso resueltos: guardar como refLine y avanzar
    comData.refLine=step.expr;
    comData.curr++;
  } else {
    // Paso sin paréntesis completado
    comData.refLine=step.expr+' = '+step.exp;
    comData.curr++;
  }

  if(comData.curr<comData.steps.length){
    comData.activeParIdx=null;
    renderComStep();
  } else {
    comInProgress=false;addPoint();
    setTimeout(function(){generateExercise();},600);
  }
}

// ============================================================
// RENDERIZADORES BASE
// ============================================================
function renderHoriz(a,b,sign,res){
  expectedAnswers={'ans_full':String(res)};
  var html='<div class="huge-row">'+a+' '+sign+' '+b+' = ';
  html+='<div class="box full" id="ans_full" onclick="activateBox(\'ans_full\')"></div></div>';
  $('exerciseArea').innerHTML=html;activateBox('ans_full');
}
function renderVertical(a,b,sign,res){
  var strA=String(a).split('').reverse(),strB=String(b).split('').reverse();
  var strR=String(res).split('').reverse(),cols=strR.length;
  for(var i=0;i<strR.length;i++)expectedAnswers['ans_'+i]=strR[i];
  var html='<table class="math-table"><tr><td></td>';
  for(var c=cols-1;c>=0;c--){
    if(c===0)html+='<td></td>';
    else html+='<td><div class="box carry" id="carry_'+c+'" onclick="activateBox(\'carry_'+c+'\')">&nbsp;</div></td>';
  }
  html+='</tr><tr><td></td>';
  for(var c=cols-1;c>=0;c--)html+='<td style="color:'+colColor(c)+'">'+(strA[c]||'')+'</td>';
  html+='</tr><tr class="line-bottom"><td class="op-sign">'+sign+'</td>';
  for(var c=cols-1;c>=0;c--)html+='<td style="color:'+colColor(c)+'">'+(strB[c]||'')+'</td>';
  html+='</tr><tr><td></td>';
  for(var c=cols-1;c>=0;c--)html+='<td><div class="box" id="ans_'+c+'" onclick="activateBox(\'ans_'+c+'\')">&nbsp;</div></td>';
  html+='</tr></table>';
  $('exerciseArea').innerHTML=html;activateBox('ans_0');
}
function colColor(i){
  if(i===0)return 'var(--col-u)';if(i===1)return 'var(--col-d)';
  if(i===2)return 'var(--col-c)';return 'var(--text)';
}

// ============================================================
// FEEDBACK
// ============================================================
function flashScreen(color){
  var ov=$('flashOv');ov.className='flash-ov '+color+' show';
  setTimeout(function(){ov.className='flash-ov '+color;},320);
}
function showStar(){
  var el=document.createElement('div');el.className='star-pop';el.textContent='*';
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},800);
}
function throwConfetti(){
  var colors=['#FF5C93','#7C5CE8','#22C97A','#3498db','#f1c40f','#FF7675'];
  for(var i=0;i<38;i++){
    var cf=document.createElement('div');cf.className='cfp';
    cf.style.left=(Math.random()*100)+'vw';
    cf.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
    cf.style.animationDuration=(Math.random()*1.5+1.5)+'s';
    cf.style.animationDelay=(Math.random()*0.5)+'s';
    document.body.appendChild(cf);
    (function(c){setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},3600);})(cf);
  }
}
function showPtsPopup(txt){
  var el=document.createElement('div');el.className='pts-pop';el.textContent=txt;
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},1500);
}
